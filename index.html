<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JJay線上測驗 - 專業雙螢幕版</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

    <style>
        .no-round { border-radius: 2px !important; }
        .break-avoid { break-inside: avoid; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        input, textarea, button { font-size: 16px !important; }
        .locked-btn { cursor: not-allowed; opacity: 0.5; filter: grayscale(100%); }
        
        /* ★ 強化文字排版：確保 Word 貼上的題號不跑掉 ★ */
        .ql-container { font-size: 16px; font-family: inherit; border: none !important; }
        .ql-editor { 
            min-height: 200px; 
            max-height: 60vh; 
            overflow-y: auto; 
            line-height: 1.6;
            padding: 20px !important;
        }
        
        /* 修正清單與題號縮排 */
        .ql-editor ol, .ql-editor ul { padding-left: 1.5em !important; }
        .ql-editor li { padding-left: 0.5em !important; margin-bottom: 0.5em; }
        
        .ql-toolbar { border-radius: 2px 2px 0 0; background-color: #f8fafc; border-color: #e2e8f0 !important; }
        .ql-container.ql-snow { border-radius: 0 0 2px 2px; border-color: #e2e8f0 !important; background: white; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans h-[100dvh] overflow-hidden">
    <div id="root" class="h-full"></div>

    <script type="text/babel">
        const firebaseConfig = {
            apiKey: "AIzaSyBAGM92NBQnUlI1gnLRK-mufM6YtDq5sHk",
            authDomain: "anser-card.firebaseapp.com",
            projectId: "anser-card",
            messagingSenderId: "224666683961",
            appId: "1:224666683961:web:351991d6cbc8543b181be8"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const { useState, useEffect, useRef } = React;

        const handleFocusScroll = (e) => {
            const target = e.target;
            setTimeout(() => {
                target.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 300);
        };

        const getEmbedUrl = (url) => {
            if (!url) return '';
            try {
                const driveRegex = /\/file\/d\/([a-zA-Z0-9_-]+)/;
                const match = url.match(driveRegex);
                if (match && match[1]) return `https://drive.google.com/file/d/${match[1]}/preview`;
                return url;
            } catch(e) { return url; }
        };

        const formatTime = (seconds) => {
            if (seconds == null || seconds < 0) return '00:00';
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        };

        function RichTextEditor({ value, onChange }) {
            const editorRef = useRef(null);
            const quillRef = useRef(null);

            useEffect(() => {
                if (editorRef.current && !quillRef.current) {
                    quillRef.current = new Quill(editorRef.current, {
                        theme: 'snow',
                        placeholder: '請在此輸入或從 Word 貼上題目...',
                        modules: {
                            toolbar: [
                                [{'header': [1, 2, 3, false]}],
                                ['bold', 'italic', 'underline', 'strike'],
                                [{'color': []}, {'background': []}],
                                [{'list': 'ordered'}, {'list': 'bullet'}],
                                [{'indent': '-1'}, {'indent': '+1'}],
                                ['clean']
                            ]
                        }
                    });

                    if (value) {
                        quillRef.current.clipboard.dangerouslyPasteHTML(value);
                    }

                    quillRef.current.on('text-change', () => {
                        onChange(quillRef.current.root.innerHTML);
                    });
                }
            }, []);

            return <div ref={editorRef}></div>;
        }

        function DialogOverlay({ dialog, onClose }) {
            const [inputValue, setInputValue] = useState('');
            useEffect(() => { if (dialog && dialog.type === 'prompt') setInputValue(dialog.defaultValue || ''); }, [dialog]);
            if (!dialog) return null;
            const handleConfirm = () => {
                if (dialog.onConfirm) {
                    if (dialog.type === 'prompt') dialog.onConfirm(inputValue);
                    else dialog.onConfirm();
                }
                onClose();
            };
            return (
                <div className="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-[60] p-4">
                    <div className="bg-white p-6 w-full max-w-sm no-round shadow-2xl">
                        <h3 className="font-bold text-lg mb-3">{dialog.type === 'alert' ? 'ℹ️ 系統提示' : '🤔 請確認'}</h3>
                        <p className="mb-5 text-gray-600 text-sm whitespace-pre-wrap leading-relaxed">{dialog.message}</p>
                        {dialog.type === 'prompt' && (
                            <input type="text" className="w-full mb-5 p-3 border border-gray-300 no-round outline-none focus:border-black text-sm" value={inputValue} onChange={e => setInputValue(e.target.value)} autoFocus />
                        )}
                        <div className="flex justify-end space-x-3 mt-2 border-t border-gray-100 pt-4">
                            {(dialog.type === 'confirm' || dialog.type === 'prompt') && (
                                <button onClick={onClose} className="bg-gray-100 text-gray-600 px-5 py-2 no-round font-bold text-sm">取消</button>
                            )}
                            <button onClick={handleConfirm} className="bg-black text-white px-5 py-2 no-round font-bold text-sm">確定</button>
                        </div>
                    </div>
                </div>
            );
        }

        function AuthScreen({ showAlert }) {
            const [isSignUp, setIsSignUp] = useState(false);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);
            const handleAuth = (e) => {
                e.preventDefault();
                setLoading(true);
                const request = isSignUp ? auth.createUserWithEmailAndPassword(email, password) : auth.signInWithEmailAndPassword(email, password);
                request.then((cred) => {
                    if (isSignUp) return db.collection('users').doc(cred.user.uid).set({ email: email.toLowerCase(), friends: [], unreadChats: {} });
                }).catch(err => showAlert('認證失敗：' + err.message)).finally(() => setLoading(false));
            };
            return (
                <div className="flex h-full items-center justify-center p-4">
                    <form onSubmit={handleAuth} className="bg-white p-8 shadow-md w-full max-w-sm no-round border border-gray-200">
                        <div className="w-16 h-16 bg-black text-white rounded-full flex items-center justify-center mx-auto mb-4 border border-gray-300"><span className="text-3xl font-black">📝</span></div>
                        <h1 className="text-xl font-bold mb-6 tracking-tight text-center">JJay線上測驗</h1>
                        <input type="email" placeholder="電子郵件" className="w-full mb-3 p-3 border border-gray-300 no-round outline-none focus:border-black" value={email} onChange={e => setEmail(e.target.value)} required />
                        <input type="password" placeholder="密碼" className="w-full mb-6 p-3 border border-gray-300 no-round outline-none focus:border-black" value={password} onChange={e => setPassword(e.target.value)} required />
                        <button type="submit" className="w-full bg-black text-white p-3 font-bold no-round" disabled={loading}>{loading ? '處理中...' : (isSignUp ? '註冊' : '登入')}</button>
                        <button type="button" onClick={() => setIsSignUp(!isSignUp)} className="w-full mt-4 text-sm text-gray-500">{isSignUp ? '已有帳號？前往登入' : '沒有帳號？前往註冊'}</button>
                    </form>
                </div>
            );
        }

        function ProfileSetup({ user, onComplete, showAlert }) {
            const [name, setName] = useState('');
            const saveProfile = () => {
                if(!name.trim()) return showAlert('請輸入暱稱！');
                db.collection('users').doc(user.uid).set({ displayName: name.trim() }, { merge: true }).then(() => onComplete(name.trim())).catch(e => showAlert('設定失敗：' + e.message));
            };
            return (
                <div className="flex h-full items-center justify-center p-4 bg-gray-50">
                    <div className="bg-white p-8 shadow-md w-full max-w-sm no-round border border-gray-200 text-center">
                        <h2 className="text-xl font-bold mb-4">請設定你的社群暱稱</h2>
                        <input type="text" placeholder="例如：藥神..." className="w-full mb-6 p-3 border border-gray-300 no-round outline-none focus:border-black text-center" value={name} onChange={e => setName(e.target.value)} />
                        <button onClick={saveProfile} className="w-full bg-black text-white p-3 font-bold no-round">完成設定</button>
                    </div>
                </div>
            );
        }

        function SocialDashboard({ user, userProfile, showAlert }) {
            const [friends, setFriends] = useState(userProfile.friends || []);
            const [searchEmail, setSearchEmail] = useState('');
            const [activeChat, setActiveChat] = useState(null);
            const [messages, setMessages] = useState([]);
            const [newMessage, setNewMessage] = useState('');
            const messagesEndRef = useRef(null);
            useEffect(() => {
                const unsub = db.collection('users').doc(user.uid).onSnapshot(doc => { if(doc.exists && doc.data().friends) setFriends(doc.data().friends); });
                return () => unsub();
            }, [user.uid]);
            const getChatId = (uid1, uid2) => [uid1, uid2].sort().join('_');
            useEffect(() => {
                if (activeChat && userProfile?.unreadChats?.[activeChat.uid]) {
                    db.collection('users').doc(user.uid).update({ [`unreadChats.${activeChat.uid}`]: firebase.firestore.FieldValue.delete() });
                }
            }, [activeChat, userProfile, user.uid]);
            useEffect(() => {
                if(!activeChat) return;
                const chatId = getChatId(user.uid, activeChat.uid);
                const unsub = db.collection('chats').doc(chatId).collection('messages').orderBy('timestamp', 'asc').onSnapshot(snapshot => {
                    setMessages(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    setTimeout(() => messagesEndRef.current?.scrollIntoView({ behavior: "smooth" }), 100);
                });
                return () => unsub();
            }, [activeChat, user.uid]);
            const handleAddFriend = () => {
                const cleanEmail = searchEmail.trim().toLowerCase();
                if(!cleanEmail || cleanEmail === user.email.toLowerCase()) return;
                db.collection('users').where('email', '==', cleanEmail).get().then(snap => {
                    if(snap.empty) return showAlert('找不到此使用者');
                    const target = snap.docs[0];
                    if(friends.find(f => f.uid === target.id)) return showAlert('已經是好友了');
                    const batch = db.batch();
                    batch.update(db.collection('users').doc(user.uid), { friends: firebase.firestore.FieldValue.arrayUnion({ uid: target.id, name: target.data().displayName, email: target.data().email }) });
                    batch.update(db.collection('users').doc(target.id), { friends: firebase.firestore.FieldValue.arrayUnion({ uid: user.uid, name: userProfile.displayName, email: user.email }) });
                    return batch.commit().then(() => { showAlert(`已加入 ${target.data().displayName}`); setSearchEmail(''); });
                });
            };
            const sendMessage = (e) => {
                e.preventDefault();
                if(!newMessage.trim() || !activeChat) return;
                const chatId = getChatId(user.uid, activeChat.uid);
                db.collection('chats').doc(chatId).collection('messages').add({ text: newMessage.trim(), senderId: user.uid, senderName: userProfile.displayName, timestamp: firebase.firestore.FieldValue.serverTimestamp(), type: 'text' }).then(() => {
                    setNewMessage('');
                    db.collection('users').doc(activeChat.uid).set({ unreadChats: { [user.uid]: true } }, { merge: true });
                });
            };
            const playRPS = () => {
                if(!activeChat) return;
                const choices = [{ face: '✊', name: '石頭' }, { face: '✌️', name: '剪刀' }, { face: '✋', name: '布' }];
                const result = choices[Math.floor(Math.random() * choices.length)];
                db.collection('chats').doc(getChatId(user.uid, activeChat.uid)).collection('messages').add({ text: `出了 ${result.name}！`, senderId: user.uid, senderName: userProfile.displayName, timestamp: firebase.firestore.FieldValue.serverTimestamp(), type: 'game_rps', rpsFace: result.face }).then(() => {
                    db.collection('users').doc(activeChat.uid).set({ unreadChats: { [user.uid]: true } }, { merge: true });
                });
            };
            const downloadSharedQuiz = (quizData) => {
                db.collection('users').doc(quizData.ownerId).collection('quizzes').doc(quizData.quizId).get().then(doc => {
                    if(!doc.exists) throw new Error('試卷已失效');
                    const data = doc.data();
                    return db.collection('users').doc(user.uid).collection('quizzes').add({ testName: data.testName + ' (來自好友)', numQuestions: data.numQuestions, inputType: data.inputType || 'url', questionFileUrl: data.questionFileUrl || '', questionText: data.questionText || '', correctAnswersInput: data.correctAnswersInput || '', userAnswers: Array(Number(data.numQuestions)).fill(''), starred: Array(Number(data.numQuestions)).fill(false), isShared: true, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                }).then(newDocRef => {
                    return db.collection('users').doc(quizData.ownerId).collection('quizzes').doc(quizData.quizId).update({ sharedTo: firebase.firestore.FieldValue.arrayUnion({ uid: user.uid, quizId: newDocRef.id }) });
                }).then(() => showAlert('✅ 已存入題庫！')).catch(e => showAlert(e.message));
            };
            return (
                <div className="max-w-6xl mx-auto p-4 pt-0 grid grid-cols-1 md:grid-cols-3 gap-6 h-[calc(100dvh-100px)]">
                    <div className="bg-white border border-gray-200 no-round flex flex-col h-full overflow-hidden shadow-sm">
                        <div className="p-4 border-b bg-gray-50 shrink-0">
                            <h2 className="font-bold mb-3">加入好友</h2>
                            <div className="flex space-x-2">
                                <input type="email" placeholder="輸入信箱..." className="flex-grow p-2 border no-round outline-none text-sm" value={searchEmail} onChange={e=>setSearchEmail(e.target.value)} />
                                <button onClick={handleAddFriend} className="bg-black text-white px-3 py-2 no-round font-bold text-sm">加入</button>
                            </div>
                        </div>
                        <div className="flex-grow overflow-y-auto custom-scrollbar">
                            {friends.map(f => (
                                <div key={f.uid} onClick={() => setActiveChat(f)} className={`p-3 border-b cursor-pointer flex items-center space-x-3 ${activeChat?.uid === f.uid ? 'bg-orange-50' : 'hover:bg-gray-50'}`}>
                                    <div className="w-10 h-10 bg-gray-200 rounded-full flex items-center justify-center font-bold text-gray-500 shrink-0">{f.name.charAt(0)}</div>
                                    <div className="flex-grow overflow-hidden">
                                        <div className="font-bold text-sm truncate">{f.name}</div>
                                        <div className="text-xs text-gray-400 truncate">{f.email}</div>
                                    </div>
                                    {userProfile?.unreadChats?.[f.uid] && <div className="w-2 h-2 bg-red-500 rounded-full"></div>}
                                </div>
                            ))}
                        </div>
                    </div>
                    <div className="md:col-span-2 bg-white border border-gray-200 no-round flex flex-col h-full overflow-hidden shadow-sm">
                        {activeChat ? (
                            <>
                                <div className="p-4 border-b font-bold shrink-0 bg-white">與 {activeChat.name} 的對話</div>
                                <div className="flex-grow overflow-y-auto p-4 space-y-4 bg-gray-50 custom-scrollbar">
                                    {messages.map(msg => (
                                        <div key={msg.id} className={`flex ${msg.senderId === user.uid ? 'justify-end' : 'justify-start'}`}>
                                            <div className={`max-w-[70%] p-3 text-sm no-round shadow-sm ${msg.senderId === user.uid ? 'bg-black text-white' : 'bg-white text-black border'}`}>
                                                {msg.type === 'game_rps' ? <div className="text-center py-2"><span className="text-4xl">{msg.rpsFace}</span><p className="mt-2 font-bold">{msg.text}</p></div> : 
                                                 msg.type === 'score_share' ? <div className="text-center py-2"><p className="text-yellow-500 font-bold mb-1">🏆 戰績炫耀</p><p className="font-bold">{msg.scoreData?.testName}</p><h3 className="text-2xl font-black">{msg.scoreData?.score} 分</h3></div> :
                                                 msg.type === 'quiz_share' ? <div className="text-center"><p className="text-orange-400 font-bold mb-2">📝 分享試卷</p><p className="mb-3 font-bold">{msg.quizData?.testName}</p>{msg.senderId !== user.uid && <button onClick={()=>downloadSharedQuiz(msg.quizData)} className="bg-white text-black border px-4 py-1 text-xs font-bold w-full">下載</button>}</div> :
                                                 <p>{msg.text}</p>}
                                            </div>
                                        </div>
                                    ))}
                                    <div ref={messagesEndRef} />
                                </div>
                                <form onSubmit={sendMessage} className="p-3 border-t flex space-x-2 bg-white items-center">
                                    <button type="button" onClick={playRPS} className="bg-gray-100 text-xl px-4 py-2 border no-round">✌️</button>
                                    <input type="text" placeholder="訊息..." className="flex-grow p-2 border no-round outline-none" value={newMessage} onChange={e=>setNewMessage(e.target.value)} onFocus={handleFocusScroll} />
                                    <button type="submit" className="bg-black text-white px-5 py-2 no-round font-bold">傳送</button>
                                </form>
                            </>
                        ) : <div className="flex-grow flex items-center justify-center text-gray-400 font-bold">選擇好友開始聊天</div>}
                    </div>
                </div>
            );
        }

        function Dashboard({ user, userProfile, onStartNew, onContinueQuiz, showAlert, showConfirm }) {
            const [records, setRecords] = useState([]);
            const [loading, setLoading] = useState(true);
            const [showShareModal, setShowShareModal] = useState(null);
            useEffect(() => {
                const unsubscribe = db.collection('users').doc(user.uid).collection('quizzes').orderBy('createdAt', 'desc').onSnapshot(snapshot => {
                    setRecords(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    setLoading(false);
                });
                return () => unsubscribe();
            }, [user]);
            const handleDelete = (id) => {
                showConfirm("確定要刪除這筆紀錄嗎？", () => { db.collection('users').doc(user.uid).collection('quizzes').doc(id).delete(); });
            };
            const shareToFriend = (friend) => {
                db.collection('chats').doc([user.uid, friend.uid].sort().join('_')).collection('messages').add({
                    senderId: user.uid, senderName: userProfile.displayName, timestamp: firebase.firestore.FieldValue.serverTimestamp(), type: 'quiz_share',
                    quizData: { ownerId: user.uid, quizId: showShareModal.id, testName: showShareModal.testName }
                }).then(() => {
                    db.collection('users').doc(friend.uid).set({ unreadChats: { [user.uid]: true } }, { merge: true });
                    showAlert('✅ 已分享');
                    setShowShareModal(null);
                });
            };
            return (
                <div className="max-w-6xl mx-auto p-4 pt-0 h-[calc(100dvh-100px)] overflow-y-auto custom-scrollbar">
                    <div className="flex justify-between items-center mb-6 border-b-2 border-black pb-2 shrink-0">
                        <h1 className="text-2xl font-black">我的題庫</h1>
                        <button onClick={onStartNew} className="bg-black text-white px-6 py-2 no-round font-bold shadow-sm transition-colors">+ 新測驗</button>
                    </div>
                    {loading ? <div className="text-center py-10 font-bold animate-pulse">讀取中...</div> : records.length === 0 ? <div className="bg-white text-center py-16 border no-round shadow-sm">尚無紀錄</div> : (
                        <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6 pb-10">
                            {records.map(rec => (
                                <div key={rec.id} className="bg-white border p-6 no-round shadow-sm hover:shadow-md flex flex-col justify-between">
                                    <div>
                                        <div className="flex justify-between items-start mb-2">
                                            <h2 className="font-bold text-lg truncate pr-2">{rec.testName}{rec.isShared && <span className="ml-2 text-xs bg-orange-100 text-orange-800 px-2 py-0.5 no-round">好友</span>}</h2>
                                            {rec.results && <span className={`text-2xl font-black ${rec.results.score >= 60 ? 'text-green-600' : 'text-red-600'}`}>{rec.results.score}</span>}
                                        </div>
                                        <div className="text-sm text-gray-500 mb-6"><p>題數：{rec.numQuestions}</p><p>{rec.results ? '✅ 已完成' : `📝 作答中 (${rec.userAnswers?.filter(a=>a).length || 0})`}</p></div>
                                    </div>
                                    <div className="flex justify-between items-center border-t pt-4">
                                        <div className="space-x-3 text-xs"><button onClick={()=>handleDelete(rec.id)} className="text-gray-400 hover:text-red-600">刪除</button><button onClick={()=>setShowShareModal(rec)} className="text-blue-500 font-bold">📤 分享</button></div>
                                        <button onClick={()=>onContinueQuiz(rec)} className="bg-gray-100 px-5 py-2 no-round font-bold border text-sm">{rec.results ? '查看' : '繼續'}</button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                    {showShareModal && (
                        <div className="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 p-4">
                            <div className="bg-white p-6 w-full max-w-sm no-round shadow-xl">
                                <h3 className="font-bold text-lg mb-4">選擇分享好友</h3>
                                <div className="max-h-60 overflow-y-auto mb-4 border custom-scrollbar">
                                    {friends.map(f => <button key={f.uid} onClick={()=>shareToFriend(f)} className="w-full text-left p-3 hover:bg-gray-50 border-b text-sm font-bold">{f.name}</button>)}
                                </div>
                                <button onClick={()=>setShowShareModal(null)} className="w-full bg-gray-100 p-2 font-bold no-round">取消</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function UpdateContentModal({ currentType, currentUrl, currentText, onClose, onSave }) {
            const [type, setType] = useState(currentType || 'url');
            const [url, setUrl] = useState(currentUrl || '');
            const [text, setText] = useState(currentText || '');
            return (
                <div className="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 p-4">
                    <div className="bg-white p-6 w-full max-w-3xl no-round shadow-2xl flex flex-col h-[90vh]">
                        <div className="flex justify-between items-center mb-4 shrink-0"><h3 className="font-bold text-xl">✏️ 編輯題目</h3><button onClick={onClose}>✖</button></div>
                        <div className="flex space-x-2 mb-4 shrink-0">
                            <button onClick={()=>setType('url')} className={`px-4 py-2 font-bold text-sm ${type==='url'?'border-b-2 border-black':'text-gray-400'}`}>🔗 網址</button>
                            <button onClick={()=>setType('text')} className={`px-4 py-2 font-bold text-sm ${type==='text'?'border-b-2 border-black':'text-gray-400'}`}>📝 文字</button>
                        </div>
                        <div className="flex-grow overflow-y-auto bg-gray-50 border p-4 mb-4">
                            {type === 'url' ? <input type="text" className="w-full p-3 border no-round outline-none" value={url} onChange={e=>setUrl(e.target.value)} placeholder="網址..." /> : 
                             <div className="bg-white border"><RichTextEditor value={text} onChange={setText} /></div>}
                        </div>
                        <div className="flex justify-end space-x-3 shrink-0"><button onClick={onClose} className="bg-gray-100 px-6 py-2 no-round font-bold">取消</button><button onClick={()=>onSave({type, url, text})} className="bg-blue-600 text-white px-6 py-2 no-round font-bold">儲存並同步</button></div>
                    </div>
                </div>
            );
        }

        function QuizApp({ currentUser, userProfile, activeQuizRecord, onBackToDashboard, showAlert, showConfirm, showPrompt }) {
            const initialRecord = activeQuizRecord || {};
            const [quizId, setQuizId] = useState(initialRecord.id || null);
            const [step, setStep] = useState(initialRecord.results ? 'results' : (initialRecord.id ? 'answering' : 'setup'));
            const [testName, setTestName] = useState(initialRecord.testName || '');
            const [numQuestions, setNumQuestions] = useState(initialRecord.numQuestions || 50);
            const [userAnswers, setUserAnswers] = useState(initialRecord.userAnswers || Array(Number(numQuestions)).fill(''));
            const [starred, setStarred] = useState(initialRecord.starred || Array(Number(numQuestions)).fill(false));
            const [correctAnswersInput, setCorrectAnswersInput] = useState(initialRecord.correctAnswersInput || '');
            const [results, setResults] = useState(initialRecord.results || null);
            const [inputType, setInputType] = useState(initialRecord.inputType || 'url');
            const [questionFileUrl, setQuestionFileUrl] = useState(initialRecord.questionFileUrl || '');
            const [questionText, setQuestionText] = useState(initialRecord.questionText || '');
            const isShared = initialRecord.isShared === true;
            const [hasTimer, setHasTimer] = useState(initialRecord.hasTimer || false);
            const [timeLimit, setTimeLimit] = useState(initialRecord.timeLimit || 60);
            const timeRemainingRef = useRef(initialRecord.timeRemaining ?? (initialRecord.timeLimit ? initialRecord.timeLimit * 60 : null));
            const [displayTime, setDisplayTime] = useState(timeRemainingRef.current);
            const [isTimeUp, setIsTimeUp] = useState(hasTimer && timeRemainingRef.current <= 0);
            const [layoutMode, setLayoutMode] = useState('horizontal'); 
            const [splitRatio, setSplitRatio] = useState(50);
            const [isDragging, setIsDragging] = useState(false);
            const [previewOpen, setPreviewOpen] = useState(true);
            const [showOnlyWrong, setShowOnlyWrong] = useState(false);
            const [showOnlyStarred, setShowOnlyStarred] = useState(false);
            const [showShareScoreModal, setShowShareScoreModal] = useState(false);
            const [showUpdateModal, setShowUpdateModal] = useState(false);
            const splitContainerRef = useRef(null);

            useEffect(() => {
                let timerId;
                if (step === 'answering' && hasTimer && !isTimeUp) {
                    timerId = setInterval(() => {
                        if (timeRemainingRef.current > 0) {
                            timeRemainingRef.current -= 1;
                            setDisplayTime(timeRemainingRef.current);
                            if (timeRemainingRef.current <= 0) { setIsTimeUp(true); showAlert("⏱ 時間到！已鎖定答案卡。"); }
                        }
                    }, 1000);
                }
                return () => clearInterval(timerId);
            }, [step, hasTimer, isTimeUp]);

            useEffect(() => {
                if (currentUser && quizId && (step === 'answering' || step === 'setup' || step === 'results')) {
                    const stateToSave = { testName, numQuestions, userAnswers, starred, correctAnswersInput, results, inputType, questionFileUrl, questionText, hasTimer, timeLimit, updatedAt: firebase.firestore.FieldValue.serverTimestamp() };
                    if (hasTimer) stateToSave.timeRemaining = timeRemainingRef.current;
                    db.collection('users').doc(currentUser.uid).collection('quizzes').doc(quizId).update(stateToSave);
                }
            }, [testName, numQuestions, userAnswers, starred, correctAnswersInput, results, inputType, questionFileUrl, questionText, step, displayTime]);

            const handleDragStart = () => setIsDragging(true);
            useEffect(() => {
                const handleMove = (e) => {
                    if (!isDragging || !splitContainerRef.current) return;
                    const rect = splitContainerRef.current.getBoundingClientRect();
                    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                    let newRatio = layoutMode === 'horizontal' ? ((clientX - rect.left) / rect.width) * 100 : ((clientY - rect.top) / rect.height) * 100;
                    setSplitRatio(Math.max(20, Math.min(newRatio, 80)));
                };
                const handleEnd = () => setIsDragging(false);
                if (isDragging) {
                    window.addEventListener('mousemove', handleMove); window.addEventListener('touchmove', handleMove, { passive: false });
                    window.addEventListener('mouseup', handleEnd); window.addEventListener('touchend', handleEnd);
                }
                return () => { window.removeEventListener('mousemove', handleMove); window.removeEventListener('touchmove', handleMove); window.removeEventListener('mouseup', handleEnd); window.removeEventListener('touchend', handleEnd); };
            }, [isDragging, layoutMode]);

            const handleStartTest = () => {
                if (numQuestions < 1 || numQuestions > 100) return showAlert('題數限 1-100');
                const initialAns = Array(Number(numQuestions)).fill('');
                const initialStar = Array(Number(numQuestions)).fill(false);
                db.collection('users').doc(currentUser.uid).collection('quizzes').add({
                    testName, numQuestions, userAnswers: initialAns, starred: initialStar, correctAnswersInput: '', inputType, questionFileUrl, questionText, hasTimer, timeLimit: Number(timeLimit), timeRemaining: hasTimer ? Number(timeLimit)*60 : null, createdAt: firebase.firestore.FieldValue.serverTimestamp()
                }).then(docRef => {
                    setQuizId(docRef.id);
                    setUserAnswers(initialAns); setStarred(initialStar);
                    if (hasTimer) { timeRemainingRef.current = Number(timeLimit) * 60; setDisplayTime(timeRemainingRef.current); setIsTimeUp(false); }
                    setStep('answering');
                });
            };

            const handleGrade = async () => {
                const cleanKey = correctAnswersInput.replace(/[^a-zA-Z]/g, '').toUpperCase();
                if (!cleanKey) return showAlert('請輸入答案');
                let correctCount = 0;
                const data = userAnswers.map((ans, idx) => {
                    const key = cleanKey[idx] || '-';
                    const isCorrect = ans === key && ans !== '';
                    if (isCorrect) correctCount++;
                    return { number: idx + 1, userAns: ans || '未填', correctAns: key, isCorrect, isStarred: starred[idx] };
                });
                const newRes = { score: Math.round((correctCount/numQuestions)*100), correctCount, total: numQuestions, data };
                setResults(newRes); setStep('results');
                await db.collection('users').doc(currentUser.uid).collection('quizzes').doc(quizId).update({ correctAnswersInput: cleanKey, results: newRes });
                if (!isShared) {
                    const myDoc = await db.collection('users').doc(currentUser.uid).collection('quizzes').doc(quizId).get();
                    const targets = myDoc.data()?.sharedTo || [];
                    targets.forEach(async (t) => {
                        const tRef = db.collection('users').doc(t.uid).collection('quizzes').doc(t.quizId);
                        const tDoc = await tRef.get();
                        if (tDoc.exists && tDoc.data().results) {
                            let tc = 0;
                            const td = tDoc.data().userAnswers.map((ans, i) => {
                                const k = cleanKey[i] || '-';
                                if (ans === k && ans !== '') tc++;
                                return { number: i+1, userAns: ans || '未填', correctAns: k, isCorrect: ans===k && ans!=='', isStarred: tDoc.data().starred[i] };
                            });
                            tRef.update({ correctAnswersInput: cleanKey, results: { score: Math.round((tc/tDoc.data().numQuestions)*100), correctCount: tc, total: tDoc.data().numQuestions, data: td } });
                        } else { tRef.update({ correctAnswersInput: cleanKey }); }
                    });
                }
            };

            const handleRetake = () => {
                showConfirm("確定要再做一次嗎？成績將重新計算。", () => {
                    const initialAns = Array(Number(numQuestions)).fill('');
                    const initialStar = Array(Number(numQuestions)).fill(false);
                    db.collection('users').doc(currentUser.uid).collection('quizzes').add({ testName: testName + ' (重測)', numQuestions, inputType, questionFileUrl, questionText, correctAnswersInput, userAnswers: initialAns, starred: initialStar, isShared, hasTimer, timeLimit, timeRemaining: hasTimer ? Number(timeLimit)*60 : null, createdAt: firebase.firestore.FieldValue.serverTimestamp() }).then(docRef => {
                        setQuizId(docRef.id); setTestName(testName + ' (重測)'); setUserAnswers(initialAns); setStarred(initialStar); setResults(null);
                        if (hasTimer) { timeRemainingRef.current = Number(timeLimit)*60; setDisplayTime(timeRemainingRef.current); setIsTimeUp(false); }
                        setStep('answering');
                    });
                });
            };

            const handleSyncContentUpdate = async ({ type, url, text }) => {
                setInputType(type); setQuestionFileUrl(url); setQuestionText(text); setShowUpdateModal(false);
                if (!isShared && quizId) {
                    const myDoc = await db.collection('users').doc(currentUser.uid).collection('quizzes').doc(quizId).get();
                    const targets = myDoc.data()?.sharedTo || [];
                    targets.forEach(t => db.collection('users').doc(t.uid).collection('quizzes').doc(t.quizId).update({ inputType: type, questionFileUrl: url, questionText: text }));
                    showAlert('✅ 內容已同步');
                }
            };

            const shareScoreToFriend = (friend) => {
                db.collection('chats').doc([currentUser.uid, friend.uid].sort().join('_')).collection('messages').add({
                    senderId: currentUser.uid, senderName: userProfile.displayName, timestamp: firebase.firestore.FieldValue.serverTimestamp(), type: 'score_share', scoreData: { testName, score: results.score, correctCount: results.correctCount, total: results.total }
                }).then(() => {
                    db.collection('users').doc(friend.uid).set({ unreadChats: { [currentUser.uid]: true } }, { merge: true });
                    showAlert('✅ 已分享戰績'); setShowShareScoreModal(false);
                });
            };

            const renderPreviewArea = () => {
                const content = inputType === 'url' ? questionFileUrl : questionText;
                if (!content || !previewOpen) return null;
                return (
                    <div className="bg-white border no-round flex flex-col shrink-0 overflow-hidden" style={{ [layoutMode === 'horizontal' ? 'width' : 'height']: `${splitRatio}%` }}>
                        <div className="bg-gray-50 border-b px-3 py-2 flex justify-between items-center shrink-0">
                            <span className="font-bold text-xs">📄 題目預覽</span>
                            {inputType === 'url' && <a href={questionFileUrl} target="_blank" className="text-xs text-blue-600 underline font-bold">全螢幕</a>}
                        </div>
                        <div className="flex-grow relative bg-gray-100 overflow-hidden">
                            {inputType === 'url' ? <iframe src={getEmbedUrl(questionFileUrl)} className="absolute inset-0 w-full h-full border-0" allowFullScreen></iframe> : 
                             <div className="absolute inset-0 overflow-y-auto p-6 bg-white ql-snow custom-scrollbar"><div className="ql-editor" dangerouslySetInnerHTML={{ __html: questionText }} /></div>}
                        </div>
                    </div>
                );
            };

            if (step === 'setup') return (
                <div className="flex flex-col items-center justify-center p-4 h-[100dvh] overflow-y-auto relative custom-scrollbar">
                    <button onClick={onBackToDashboard} className="absolute top-6 left-6 font-bold text-gray-500">← 返回</button>
                    <div className="bg-white p-8 shadow-md w-full max-w-3xl no-round border mt-10">
                        <h1 className="text-xl font-bold mb-6 border-b pb-2">新增測驗</h1>
                        <div className="grid md:grid-cols-2 gap-6 mb-6">
                            <div><label className="text-xs font-bold text-gray-500">名稱</label><input type="text" className="w-full p-2 border no-round outline-none" value={testName} onChange={e=>setTestName(e.target.value)} /></div>
                            <div><label className="text-xs font-bold text-gray-500">題數</label><input type="number" className="w-full p-2 border no-round outline-none" value={numQuestions} onChange={e=>setNumQuestions(e.target.value)} /></div>
                        </div>
                        <div className="mb-6 p-4 bg-gray-50 border no-round">
                            <label className="flex items-center space-x-2 font-bold cursor-pointer"><input type="checkbox" checked={hasTimer} onChange={e=>setHasTimer(e.target.checked)} /><span>⏱ 開啟計時</span></label>
                            {hasTimer && <div className="mt-3 flex items-center space-x-2 text-sm"><input type="number" className="w-16 p-1.5 border text-center" value={timeLimit} onChange={e=>setTimeLimit(e.target.value)} /><span>分鐘</span></div>}
                        </div>
                        <div className="mb-8 p-4 bg-gray-50 border">
                            <label className="block font-bold mb-3">題目內容：</label>
                            <div className="flex space-x-2 mb-3"><button onClick={()=>setInputType('url')} className={`px-4 py-1.5 font-bold text-sm ${inputType==='url'?'bg-black text-white':'bg-gray-200'}`}>🔗 網址</button><button onClick={()=>setInputType('text')} className={`px-4 py-1.5 font-bold text-sm ${inputType==='text'?'bg-black text-white':'bg-gray-200'}`}>📝 文字</button></div>
                            {inputType === 'url' ? <input type="text" className="w-full p-2 border outline-none" value={questionFileUrl} onChange={e=>setQuestionFileUrl(e.target.value)} placeholder="貼上網址..." /> : <div className="bg-white border"><RichTextEditor value={questionText} onChange={setQuestionText} /></div>}
                        </div>
                        <button onClick={handleStartTest} className="w-full bg-black text-white p-3 font-bold text-lg">開始作答</button>
                    </div>
                </div>
            );

            if (step === 'answering') return (
                <div className="flex flex-col h-[100dvh] bg-gray-100 p-2 sm:p-4 w-full overflow-hidden">
                    {showUpdateModal && <UpdateContentModal currentType={inputType} currentUrl={questionFileUrl} currentText={questionText} onClose={()=>setShowUpdateModal(false)} onSave={handleSyncContentUpdate} />}
                    <div className="bg-white p-3 sm:p-4 shadow-sm border flex flex-col md:flex-row justify-between items-start md:items-center no-round gap-3 shrink-0 z-10">
                        <div className="flex items-center flex-grow overflow-hidden">
                            <button onClick={onBackToDashboard} className="mr-3 font-bold text-sm text-gray-500 whitespace-nowrap">← 返回</button>
                            <div className="overflow-hidden">
                                <div className="flex items-center space-x-2"><h2 className="font-bold truncate">{testName}</h2>{hasTimer && <span className={`font-mono font-bold px-2 py-0.5 border text-xs ${isTimeUp?'text-red-600 animate-pulse':'text-gray-700'}`}>{isTimeUp?'時間到':`⏱ ${formatTime(displayTime)}`}</span>}</div>
                                <div className="text-xs text-gray-400 mt-0.5 flex flex-wrap gap-2"><span>進度: {userAnswers.filter(a=>a).length}/{numQuestions}</span>{starredIndices.length>0 && <span className="text-orange-500 font-bold max-w-[150px] truncate">★ {starredIndices.join(', ')}</span>}</div>
                            </div>
                        </div>
                        <div className="flex flex-wrap gap-2 justify-end w-full md:w-auto">
                            {hasContent && <button onClick={()=>setLayoutMode(l=>l==='horizontal'?'vertical':'horizontal')} className="bg-gray-100 px-3 py-1.5 border font-bold text-xs no-round">🔄 切換</button>}
                            {!isShared && <button onClick={()=>setShowUpdateModal(true)} className="bg-blue-50 text-blue-600 px-3 py-1.5 border border-blue-200 font-bold text-xs no-round">✏️ 編輯題目</button>}
                            <button onClick={()=>setStep('grading')} className="bg-black text-white px-6 py-1.5 font-bold text-sm shadow-sm no-round">交卷</button>
                        </div>
                    </div>
                    <div ref={splitContainerRef} className={`flex-grow flex ${layoutMode === 'horizontal' ? 'flex-row' : 'flex-col'} overflow-hidden relative w-full mt-2 sm:mt-4`}>
                        {isDragging && <div className="absolute inset-0 z-50" style={{ cursor: layoutMode==='horizontal'?'col-resize':'row-resize' }}></div>}
                        {renderPreviewArea()}
                        {hasContent && previewOpen && <div onMouseDown={handleDragStart} onTouchStart={handleDragStart} className={`${layoutMode==='horizontal'?'w-4 h-full cursor-col-resize flex-col':'h-4 w-full cursor-row-resize flex-row'} bg-gray-100 hover:bg-blue-200 flex items-center justify-center shrink-0 z-40 transition-colors`}><div className={`${layoutMode==='horizontal'?'w-1 h-8':'h-1 w-8'} bg-gray-400 rounded-full`}></div></div>}
                        <div className="flex-grow flex flex-col bg-white border shadow-sm no-round overflow-hidden">
                            <div className="bg-gray-50 border-b px-4 py-2 shrink-0 flex justify-between items-center"><span className="font-bold text-xs">✏️ 答案卡{isTimeUp && <span className="text-red-500 ml-2">(鎖定)</span>}</span></div>
                            <div className="flex-grow overflow-y-auto p-4 sm:p-6 custom-scrollbar bg-white">
                                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(240px, 1fr))', gap: '8px 16px' }}>
                                    {userAnswers.map((ans, i) => (
                                        <div key={i} className="flex items-center justify-between py-2.5 border-b border-gray-50 hover:bg-gray-50 pr-2">
                                            <div className="flex items-center space-x-2 shrink-0 w-14"><span className="font-mono text-sm font-bold text-gray-400">{i+1}.</span><button disabled={isTimeUp} onClick={()=>toggleStar(i)} className={`text-sm ${starred[i]?'text-orange-500':'text-gray-200 hover:text-gray-300'}`}>★</button></div>
                                            <div className="flex space-x-1 shrink-0">{['A','B','C','D'].map(o => <button key={o} disabled={isTimeUp} onClick={()=>handleAnswerSelect(i,o)} className={`w-8 h-8 text-sm font-bold border-2 no-round ${ans===o?'bg-black border-black text-white scale-105':'bg-white border-gray-300 text-gray-400'} ${isTimeUp?'locked-btn':'hover:border-gray-500'}`}>{o}</button>)}</div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );

            if (step === 'grading') return (
                <div className="flex flex-col min-h-[100dvh] items-center justify-center p-4 relative py-10 overflow-y-auto">
                    <button onClick={()=>setStep('answering')} className="absolute top-6 left-6 font-bold text-gray-500">← 返回</button>
                    <div className="bg-white p-8 shadow-md w-full max-w-lg no-round border mt-10">
                        <h2 className="font-bold mb-4 text-lg">{isShared ? '標準答案 (好友提供)' : '輸入標準答案'}</h2>
                        <textarea className={`w-full h-40 p-3 border no-round font-mono mb-4 outline-none tracking-widest text-lg uppercase custom-scrollbar ${isShared?'bg-gray-100 text-gray-500 cursor-not-allowed':'focus:border-black'}`} placeholder="ABCD..." value={correctAnswersInput} onChange={e=>!isShared && setCorrectAnswersInput(e.target.value)} readOnly={isShared}></textarea>
                        {isShared && <p className="text-orange-500 text-xs font-bold mb-4 -mt-2">🔒 已鎖定好友解答編輯</p>}
                        <button onClick={handleGrade} className="w-full bg-black text-white p-3 font-bold no-round text-lg">開始批改</button>
                    </div>
                </div>
            );

            if (step === 'results') return (
                <div className="flex flex-col h-[100dvh] bg-gray-100 p-2 sm:p-4 w-full overflow-hidden">
                    {showUpdateModal && <UpdateContentModal currentType={inputType} currentUrl={questionFileUrl} currentText={questionText} onClose={()=>setShowUpdateModal(false)} onSave={handleSyncContentUpdate} />}
                    <div className="bg-white p-3 sm:p-4 shadow-sm border flex flex-col md:flex-row justify-between items-start md:items-center no-round gap-3 shrink-0 z-10">
                        <div className="flex items-center flex-grow overflow-hidden"><h2 className="font-bold truncate text-base pr-4">{testName} - 結果</h2></div>
                        <div className="flex flex-wrap gap-2 justify-end w-full md:w-auto">
                            {!isShared && <button onClick={()=>setStep('grading')} className="text-sm font-bold bg-blue-50 text-blue-600 px-4 py-1.5 no-round border border-blue-200">✏️ 改答案</button>}
                            {!isShared && <button onClick={()=>setShowUpdateModal(true)} className="bg-blue-50 text-blue-600 px-3 py-1.5 border border-blue-200 font-bold text-xs no-round">✏️ 編輯題目</button>}
                            <button onClick={()=>setShowShareScoreModal(true)} className="text-sm font-bold bg-yellow-50 text-yellow-600 px-4 py-1.5 no-round border border-yellow-200">📢 炫耀</button>
                            <button onClick={handleRetake} className="text-sm font-bold bg-orange-50 text-orange-600 px-4 py-1.5 no-round border border-orange-200">重測</button>
                            <button onClick={onBackToDashboard} className="text-sm font-bold bg-black text-white px-4 py-1.5 no-round">返回</button>
                        </div>
                    </div>
                    <div ref={splitContainerRef} className={`flex-grow flex ${layoutMode === 'horizontal' ? 'flex-row' : 'flex-col'} overflow-hidden relative w-full mt-2 sm:mt-4`}>
                        {isDragging && <div className="absolute inset-0 z-50" style={{ cursor: layoutMode==='horizontal'?'col-resize':'row-resize' }}></div>}
                        {renderPreviewArea()}
                        {hasContent && previewOpen && <div onMouseDown={handleDragStart} onTouchStart={handleDragStart} className={`${layoutMode==='horizontal'?'w-4 h-full cursor-col-resize flex-col':'h-4 w-full cursor-row-resize flex-row'} bg-gray-100 hover:bg-blue-200 flex items-center justify-center shrink-0 z-40 transition-colors`}><div className={`${layoutMode==='horizontal'?'w-1 h-8':'h-1 w-8'} bg-gray-400 rounded-full`}></div></div>}
                        <div className="flex-grow flex flex-col bg-white border no-round overflow-hidden shadow-sm">
                            <div className="flex-grow overflow-y-auto p-4 sm:p-6 custom-scrollbar bg-gray-50">
                                <div className="bg-white p-6 shadow-sm border-t-4 border-black text-center mb-6 no-round"><h2 className={`text-6xl font-black mb-4 ${results.score>=60?'text-green-600':'text-red-600'}`}>{results.score}</h2><p className="text-gray-500 font-bold">答對 {results.correctCount} / {results.total} 題</p></div>
                                <div className="bg-white p-4 sm:p-6 border no-round shadow-sm">
                                    <div className="flex justify-between items-center mb-6 border-b pb-3"><h3 className="font-bold text-lg">解析</h3><div className="flex space-x-2">
                                        <button onClick={()=>{setShowOnlyStarred(!showOnlyStarred);setShowOnlyWrong(false)}} className={`text-xs font-bold px-3 py-1 border ${showOnlyStarred?'bg-orange-100 text-orange-700 border-orange-200':'bg-gray-100 text-gray-500'}`}>⭐ 星號</button>
                                        <button onClick={()=>{setShowOnlyWrong(!showOnlyWrong);setShowOnlyStarred(false)}} className={`text-xs font-bold px-3 py-1 border ${showOnlyWrong?'bg-red-100 text-red-700 border-red-200':'bg-gray-100 text-gray-500'}`}>❌ 錯題</button>
                                    </div></div>
                                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(200px, 1fr))', gap: '8px 12px' }}>
                                        {results.data.filter(q => showOnlyWrong?!q.isCorrect:showOnlyStarred?q.isStarred:true).map(q => (
                                            <div key={q.number} className={`p-3 border no-round flex justify-between items-center ${q.isCorrect?'bg-green-50':'bg-red-50'} ${q.isStarred?'ring-2 ring-orange-300':''}`}><span className={`font-black text-sm flex items-center ${q.isCorrect?'text-green-800':'text-red-800'}`}>{q.number}.{q.isStarred && <span className="text-orange-500 ml-1.5 text-xs">★</span>}</span><div className="text-sm font-bold"><span className={q.isCorrect?'text-gray-700':'text-red-600 line-through'}>{q.userAns}</span><span className="mx-2 text-gray-300">→</span><span className="text-green-700">{q.correctAns}</span></div></div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    {showShareScoreModal && (
                        <div className="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 p-4">
                            <div className="bg-white p-6 w-full max-w-sm no-round shadow-xl"><h3 className="font-bold text-lg mb-4">🏆 向好友炫耀戰績</h3>
                                <div className="max-h-60 overflow-y-auto mb-4 border custom-scrollbar">{userProfile.friends.map(f => <button key={f.uid} onClick={()=>shareScoreToFriend(f)} className="w-full text-left p-3 hover:bg-yellow-50 border-b text-sm font-bold">{f.name}</button>)}</div>
                                <button onClick={()=>setShowShareScoreModal(false)} className="w-full bg-gray-100 p-2 font-bold no-round">取消</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function Main() {
            const [user, setUser] = useState(null);
            const [userProfile, setUserProfile] = useState(null);
            const [loadingUser, setLoadingUser] = useState(true);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [activeQuizRecord, setActiveQuizRecord] = useState(null);
            const [dialog, setDialog] = useState(null);
            const showAlert = (message) => setDialog({ type: 'alert', message });
            const showConfirm = (message, onConfirm) => setDialog({ type: 'confirm', message, onConfirm });
            const showPrompt = (message, defaultValue, onConfirm) => setDialog({ type: 'prompt', message, defaultValue, onConfirm });
            useEffect(() => {
                return auth.onAuthStateChanged(usr => {
                    setUser(usr);
                    if (usr) {
                        db.collection('users').doc(usr.uid).get().then(doc => {
                            if (doc.exists) setUserProfile(doc.data());
                            else { const newP = { email: usr.email, friends: [], unreadChats: {} }; db.collection('users').doc(usr.uid).set(newP).then(()=>setUserProfile(newP)); }
                        }).finally(() => setLoadingUser(false));
                    } else { setUserProfile(null); setLoadingUser(false); }
                });
            }, []);
            if (loadingUser) return <div className="flex h-screen items-center justify-center font-bold animate-pulse text-gray-400">載入中...</div>;
            if (!user) return <div className="h-[100dvh]"><DialogOverlay dialog={dialog} onClose={()=>setDialog(null)}/><AuthScreen showAlert={showAlert}/></div>;
            if (!userProfile || !userProfile.displayName) return <div className="h-[100dvh]"><DialogOverlay dialog={dialog} onClose={()=>setDialog(null)}/><ProfileSetup user={user} onComplete={n=>setUserProfile({...userProfile,displayName:n})} showAlert={showAlert}/></div>;
            const TopNav = () => (
                <div className="bg-black text-white px-4 flex justify-between items-center shadow-md h-14 shrink-0 relative z-20">
                    <div className="flex space-x-6 items-center h-full"><span className="font-black text-lg tracking-widest mr-4">JJay</span><button onClick={()=>setActiveTab('dashboard')} className={`h-full px-2 font-bold ${activeTab==='dashboard'?'border-b-4 border-white':'text-gray-400'}`}>題庫</button><button onClick={()=>setActiveTab('social')} className={`flex items-center h-full px-2 font-bold ${activeTab==='social'?'border-b-4 border-white':'text-gray-400'}`}>社群{userProfile.unreadChats && Object.values(userProfile.unreadChats).includes(true) && <span className="ml-1.5 w-2 h-2 bg-red-500 rounded-full"></span>}</button></div>
                    <button onClick={()=>auth.signOut()} className="text-xs bg-white text-black px-3 py-1 no-round font-bold">登出</button>
                </div>
            );
            return (
                <div className="h-[100dvh] flex flex-col overflow-hidden">
                    <DialogOverlay dialog={dialog} onClose={()=>setDialog(null)} />
                    {activeTab !== 'activeQuiz' && <TopNav />}
                    <div className="flex-grow pt-6 overflow-hidden">
                        {activeTab === 'dashboard' && <Dashboard user={user} userProfile={userProfile} onStartNew={()=>{setActiveQuizRecord(null);setActiveTab('activeQuiz')}} onContinueQuiz={r=>{setActiveQuizRecord(r);setActiveTab('activeQuiz')}} showAlert={showAlert} showConfirm={showConfirm} />}
                        {activeTab === 'social' && <SocialDashboard user={user} userProfile={userProfile} showAlert={showAlert} />}
                        {activeTab === 'activeQuiz' && <QuizApp key={activeQuizRecord?.id || 'new'} currentUser={user} userProfile={userProfile} activeQuizRecord={activeQuizRecord} onBackToDashboard={()=>setActiveTab('dashboard')} showAlert={showAlert} showConfirm={showConfirm} showPrompt={showPrompt} />}
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<Main />);
    </script>
</body>
</html>
