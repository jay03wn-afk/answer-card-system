<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JJay線上測驗 - 專業雙螢幕版</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: {} }
        }
    </script>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        .no-round { border-radius: 2px !important; }
        .break-avoid { break-inside: avoid; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #4b5563; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #6b7280; }

        input, textarea, button, select { font-size: 16px !important; }
        .locked-btn { cursor: not-allowed; opacity: 0.5; filter: grayscale(100%); }
        .pixelated { image-rendering: pixelated; }
        
        .mc-bg {
            background-color: #7d7d7d;
            background-image: url('https://raw.githubusercontent.com/InventivetalentDev/minecraft-assets/1.20/assets/minecraft/textures/block/stone.png');
            background-size: 64px;
            image-rendering: pixelated;
        }
        .mc-ui {
            background-color: #c6c6c6;
            border: 4px solid;
            border-top-color: #ffffff;
            border-left-color: #ffffff;
            border-bottom-color: #555555;
            border-right-color: #555555;
            font-family: 'Courier New', Courier, monospace;
        }
        .mc-panel-dark {
            background-color: rgba(0, 0, 0, 0.65);
            border: 2px solid #111;
            box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.15);
            padding: 16px;
        }
        .mc-btn {
            background-color: #c6c6c6;
            border: 4px solid;
            border-top-color: #ffffff;
            border-left-color: #ffffff;
            border-bottom-color: #555555;
            border-right-color: #555555;
            color: #000;
            font-weight: bold;
            cursor: pointer;
        }
        .mc-btn:active {
            border-top-color: #555555;
            border-left-color: #555555;
            border-bottom-color: #ffffff;
            border-right-color: #ffffff;
            background-color: #b0b0b0;
        }

        /* 官方標籤專屬特效 */
        .official-tag {
            color: #fbbf24;
            font-weight: 900;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            background: -webkit-linear-gradient(45deg, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .dark .official-tag {
            text-shadow: 0 2px 8px rgba(251,191,36,0.5);
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 dark:bg-gray-900 dark:text-gray-100 font-sans h-[100dvh] overflow-hidden transition-colors duration-200">
    <div id="root" class="h-full"></div>

    <script type="text/babel">
        const firebaseConfig = {
            apiKey: "AIzaSyBAGM92NBQnUlI1gnLRK-mufM6YtDq5sHk",
            authDomain: "anser-card.firebaseapp.com",
            projectId: "anser-card",
            messagingSenderId: "224666683961",
            appId: "1:224666683961:web:351991d6cbc8543b181be8"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        try { db.enablePersistence({ synchronizeTabs: true }); } catch (err) { console.warn("無法啟動離線快取：", err); }

        const { useState, useEffect, useRef } = React;

        const handleFocusScroll = (e) => {
            const target = e.target;
            setTimeout(() => { target.scrollIntoView({ behavior: 'smooth', block: 'center' }); }, 300);
        };

        const getEmbedUrl = (url) => {
            if (!url) return '';
            try {
                const driveRegex = /\/file\/d\/([a-zA-Z0-9_-]+)/;
                const match = url.match(driveRegex);
                if (match && match[1]) return `https://drive.google.com/file/d/${match[1]}/preview`;
                return url;
            } catch(e) { return url; }
        };

        const formatTime = (seconds) => {
            if (seconds == null || seconds < 0) return '00:00';
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        };

        // 官方標籤渲染輔助函數
        const renderQuizName = (name) => {
            if (!name) return { text: '未命名測驗', isOfficial: false };
            const isOfficial = name.trim().endsWith('[#op]');
            const text = isOfficial ? name.replace(/\[#op\]$/, '').trim() : name;
            return { text, isOfficial };
        };

        function McImg({ src, fallback, className }) {
            const [hasError, setHasError] = useState(false);
            if (hasError) return <span className={`${className} inline-flex items-center justify-center`} style={{ fontSize: '1.2em' }}>{fallback}</span>;
            return <img src={src} className={className} onError={() => setHasError(true)} alt={fallback} />;
        }

        function DialogOverlay({ dialog, onClose }) {
            const [inputValue, setInputValue] = useState('');
            useEffect(() => { if (dialog && dialog.type === 'prompt') setInputValue(dialog.defaultValue || ''); }, [dialog]);
            if (!dialog) return null;
            const handleConfirm = () => {
                if (dialog.onConfirm) {
                    if (dialog.type === 'prompt') dialog.onConfirm(inputValue);
                    else dialog.onConfirm();
                }
                onClose();
            };
            return (
                <div className="fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-[100] p-4">
                    <div className="bg-white dark:bg-gray-800 p-6 w-full max-w-sm no-round shadow-2xl transform transition-all border-t-4 border-black dark:border-gray-500">
                        <h3 className="font-bold text-lg mb-3 flex items-center dark:text-white">
                            {dialog.type === 'alert' ? 'ℹ️ 系統提示' : '🤔 請確認'}
                        </h3>
                        <p className="mb-5 text-gray-600 dark:text-gray-300 text-sm whitespace-pre-wrap leading-relaxed">{dialog.message}</p>
                        {dialog.type === 'prompt' && (
                            <input type="text" className="w-full mb-5 p-3 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-black dark:text-white no-round outline-none focus:border-black dark:focus:border-white text-sm" value={inputValue} onChange={e => setInputValue(e.target.value)} autoFocus />
                        )}
                        <div className="flex justify-end space-x-3 mt-2 border-t border-gray-100 dark:border-gray-700 pt-4">
                            {(dialog.type === 'confirm' || dialog.type === 'prompt') && (
                                <button onClick={onClose} className="bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-200 px-5 py-2 no-round font-bold text-sm hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors">取消</button>
                            )}
                            <button onClick={handleConfirm} className="bg-black dark:bg-gray-200 text-white dark:text-black px-5 py-2 no-round font-bold text-sm hover:bg-gray-800 dark:hover:bg-gray-300 transition-colors">確定</button>
                        </div>
                    </div>
                </div>
            );
        }

        function TutorialOverlay({ onComplete }) {
            return (
                <div className="fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-[70] p-4">
                    <div className="bg-white dark:bg-gray-800 p-8 w-full max-w-lg no-round shadow-2xl relative border-t-4 border-black dark:border-gray-500 animate-fade-in-up">
                        <h2 className="text-2xl font-black mb-6 text-center tracking-wider dark:text-white">🎉 歡迎加入 JJay 線上測驗</h2>
                        <div className="space-y-6 text-gray-700 dark:text-gray-300 mb-8">
                            <div>
                                <p className="font-bold border-l-4 border-black dark:border-gray-400 pl-3 text-lg dark:text-gray-100">📖 我的題庫</p>
                                <p className="pl-4 mt-1 text-sm leading-relaxed">首創雙螢幕排版，貼上雲端題本或純文字，左邊看題、右邊畫卡，並支援資料夾與測驗代碼功能。</p>
                            </div>
                            <div>
                                <p className="font-bold border-l-4 border-blue-500 pl-3 text-lg dark:text-gray-100">💬 社群交流</p>
                                <p className="pl-4 mt-1 text-sm leading-relaxed">不再是一個人讀書！新增好友即時對話，還能一鍵打包你的測驗卷分享給好友作答、互相炫耀成績。支援圖片閱後即焚！</p>
                            </div>
                            <div>
                                <p className="font-bold border-l-4 border-orange-500 pl-3 text-lg dark:text-gray-100">⛏️ 史蒂夫養成</p>
                                <p className="pl-4 mt-1 text-sm leading-relaxed">讀書也要有儀式感。賺取鑽石佈置你的 Minecraft 家園，還能玩滑板小遊戲與好友競爭等級！</p>
                            </div>
                        </div>
                        <button onClick={onComplete} className="w-full bg-black dark:bg-gray-200 text-white dark:text-black p-3 font-bold no-round hover:bg-gray-800 dark:hover:bg-gray-300 text-lg transition-colors">
                            🚀 開始體驗
                        </button>
                    </div>
                </div>
            );
        }

        function AuthScreen({ showAlert }) {
            const [isSignUp, setIsSignUp] = useState(false);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);

            const handleAuth = (e) => {
                e.preventDefault();
                setLoading(true);
                const safeEmail = email.trim().toLowerCase(); 
                const request = isSignUp 
                    ? auth.createUserWithEmailAndPassword(safeEmail, password)
                    : auth.signInWithEmailAndPassword(safeEmail, password);
                
                request.then((cred) => {
                    if (isSignUp) {
                        const initMcData = { diamonds: 0, level: 1, exp: 0, hunger: 10, items: [], cats: 0, lastCheckIn: null };
                        return db.collection('users').doc(cred.user.uid).set({ 
                            email: safeEmail, 
                            friends: [], 
                            unreadChats: {}, 
                            folders: ['未分類'], 
                            mcData: initMcData,
                            hasSeenTutorial: false,
                            avatarUrl: '',
                            bio: '這是一位熱愛學習的神秘玩家。'
                        }).catch(err => showAlert("註冊成功，但建立資料庫檔案失敗: " + err.message));
                    } else {
                        db.collection('users').doc(cred.user.uid).set({ email: safeEmail }, { merge: true });
                    }
                })
                .catch(err => showAlert('認證失敗：' + err.message))
                .finally(() => setLoading(false));
            };

            return (
                <div className="flex h-full items-center justify-center p-4 overflow-y-auto bg-gray-100 dark:bg-gray-900">
                    <form onSubmit={handleAuth} className="bg-white dark:bg-gray-800 p-8 shadow-md w-full max-w-sm no-round border border-gray-200 dark:border-gray-700">
                        <div className="w-16 h-16 bg-black dark:bg-gray-700 text-white rounded-full flex items-center justify-center mx-auto mb-4">
                            <span className="text-3xl font-black">📝</span>
                        </div>
                        <h1 className="text-xl font-bold mb-6 tracking-tight text-center dark:text-white">JJay線上測驗</h1>
                        <input type="email" placeholder="電子郵件" className="w-full mb-3 p-3 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-black dark:text-white no-round outline-none focus:border-black dark:focus:border-white" value={email} onChange={e => setEmail(e.target.value)} onFocus={handleFocusScroll} required />
                        <input type="password" placeholder="密碼" className="w-full mb-6 p-3 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-black dark:text-white no-round outline-none focus:border-black dark:focus:border-white" value={password} onChange={e => setPassword(e.target.value)} onFocus={handleFocusScroll} required />
                        <button type="submit" className="w-full bg-black dark:bg-gray-200 text-white dark:text-black p-3 font-bold no-round hover:bg-gray-800 dark:hover:bg-gray-300 transition-colors" disabled={loading}>{loading ? '處理中...' : (isSignUp ? '註冊' : '登入')}</button>
                        <button type="button" onClick={() => setIsSignUp(!isSignUp)} className="w-full mt-4 text-sm text-gray-500 dark:text-gray-400 hover:text-black dark:hover:text-white transition-colors">{isSignUp ? '已有帳號？前往登入' : '沒有帳號？前往註冊'}</button>
                    </form>
                </div>
            );
        }

        function ProfileSetup({ user, onComplete, showAlert }) {
            const [name, setName] = useState('');
            const saveProfile = () => {
                if(!name.trim()) return showAlert('請輸入社群暱稱！');
                db.collection('users').doc(user.uid).set({ displayName: name.trim() }, { merge: true })
                  .then(() => onComplete(name.trim()))
                  .catch(e => showAlert('設定失敗：' + e.message));
            };
            return (
                <div className="flex h-full items-center justify-center p-4 bg-gray-50 dark:bg-gray-900 overflow-y-auto">
                    <div className="bg-white dark:bg-gray-800 p-8 shadow-md w-full max-w-sm no-round border border-gray-200 dark:border-gray-700 text-center">
                        <h2 className="text-xl font-bold mb-4 dark:text-white">歡迎加入！請設定你的社群暱稱</h2>
                        <input type="text" placeholder="例如：藥神、JJay..." className="w-full mb-6 p-3 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-black dark:text-white no-round outline-none focus:border-black dark:focus:border-white text-center" value={name} onChange={e => setName(e.target.value)} onFocus={handleFocusScroll} />
                        <button onClick={saveProfile} className="w-full bg-black dark:bg-gray-200 text-white dark:text-black p-3 font-bold no-round hover:bg-gray-800 dark:hover:bg-gray-300">完成設定</button>
                    </div>
                </div>
            );
        }

        // --- 個人檔案頁面 ---
        function ProfilePage({ user, userProfile, showAlert }) {
            const [bio, setBio] = useState(userProfile.bio || '這是一位熱愛學習的神秘玩家。');
            const [isEditingBio, setIsEditingBio] = useState(false);
            const fileInputRef = useRef(null);

            const mcData = userProfile.mcData || { diamonds: 0, level: 1, exp: 0 };
            const defaultAvatar = "https://minotar.net/helm/Steve/150.png";

            const handleAvatarUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_SIZE = 200;
                        let w = img.width, h = img.height;
                        if (w > h && w > MAX_SIZE) { h *= MAX_SIZE / w; w = MAX_SIZE; } 
                        else if (h > MAX_SIZE) { w *= MAX_SIZE / h; h = MAX_SIZE; }
                        canvas.width = w; canvas.height = h;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, w, h);
                        const compressedBase64 = canvas.toDataURL('image/jpeg', 0.6); 

                        db.collection('users').doc(user.uid).update({ avatarUrl: compressedBase64 })
                          .then(() => showAlert("✅ 大頭貼更新成功！"))
                          .catch(err => showAlert("更新失敗：" + err.message));
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            };

            const saveBio = () => {
                db.collection('users').doc(user.uid).update({ bio: bio.trim() })
                  .then(() => setIsEditingBio(false))
                  .catch(err => showAlert("更新失敗：" + err.message));
            };

            return (
                <div className="max-w-2xl mx-auto p-4 pt-10 h-[calc(100dvh-100px)] overflow-y-auto custom-scrollbar">
                    <div className="bg-white dark:bg-gray-800 p-8 border border-gray-200 dark:border-gray-700 shadow-md no-round text-center relative">
                        
                        <div className="relative inline-block mb-4 group cursor-pointer" onClick={() => fileInputRef.current.click()}>
                            <img src={userProfile.avatarUrl || defaultAvatar} className="w-32 h-32 rounded-full border-4 border-gray-200 dark:border-gray-600 object-cover shadow-sm transition-transform group-hover:scale-105" alt="Avatar" />
                            <div className="absolute inset-0 bg-black bg-opacity-50 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity text-white text-sm font-bold">更換照片</div>
                            <input type="file" accept="image/*" className="hidden" ref={fileInputRef} onChange={handleAvatarUpload} />
                        </div>

                        <h1 className="text-3xl font-black text-gray-800 dark:text-white mb-1">{userProfile.displayName}</h1>
                        <p className="text-sm text-gray-500 dark:text-gray-400 mb-6">{userProfile.email}</p>

                        <div className="bg-gray-50 dark:bg-gray-900 p-4 border border-gray-200 dark:border-gray-700 mb-8 text-left relative min-h-[100px]">
                            <div className="flex justify-between items-center mb-2">
                                <span className="font-bold text-sm text-gray-600 dark:text-gray-300">個人簡介</span>
                                {!isEditingBio && <button onClick={() => setIsEditingBio(true)} className="text-blue-500 hover:text-blue-700 text-xs font-bold">編輯</button>}
                            </div>
                            {isEditingBio ? (
                                <div>
                                    <textarea className="w-full p-2 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-black dark:text-white no-round custom-scrollbar text-sm" rows="3" value={bio} onChange={e => setBio(e.target.value)}></textarea>
                                    <div className="flex justify-end mt-2 space-x-2">
                                        <button onClick={() => { setBio(userProfile.bio || ''); setIsEditingBio(false); }} className="px-3 py-1 bg-gray-200 dark:bg-gray-700 text-black dark:text-white text-xs font-bold hover:bg-gray-300 dark:hover:bg-gray-600">取消</button>
                                        <button onClick={saveBio} className="px-3 py-1 bg-black dark:bg-gray-200 text-white dark:text-black text-xs font-bold hover:bg-gray-800 dark:hover:bg-gray-300">儲存</button>
                                    </div>
                                </div>
                            ) : (
                                <p className="text-gray-700 dark:text-gray-300 whitespace-pre-wrap text-sm leading-relaxed">{userProfile.bio || '這是一位熱愛學習的神秘玩家。'}</p>
                            )}
                        </div>

                        <div className="grid grid-cols-2 gap-4">
                            <div className="bg-green-50 dark:bg-green-900/30 p-4 border border-green-200 dark:border-green-800 flex flex-col items-center">
                                <span className="text-2xl mb-1">🎮</span>
                                <span className="text-xs font-bold text-green-700 dark:text-green-400">遊戲等級</span>
                                <span className="text-xl font-black text-green-800 dark:text-green-300">Lv. {mcData.level}</span>
                            </div>
                            <div className="bg-blue-50 dark:bg-blue-900/30 p-4 border border-blue-200 dark:border-blue-800 flex flex-col items-center">
                                <span className="text-2xl mb-1">💎</span>
                                <span className="text-xs font-bold text-blue-700 dark:text-blue-400">擁有鑽石</span>
                                <span className="text-xl font-black text-blue-800 dark:text-blue-300">{mcData.diamonds}</span>
                            </div>
                        </div>

                    </div>
                </div>
            );
        }

        // --- 滑板二段跳小遊戲組件 ---
        function SkateboardGame({ onGameOver, onQuit }) {
            const canvasRef = useRef(null);
            const [gameState, setGameState] = useState('start'); 
            const [score, setScore] = useState(0);
            
            const bgmRef = useRef(null);
            const LOG_W = 800;
            const LOG_H = 350;
            
            const gameRef = useRef({
                reqId: null, player: { x: 50, y: 0, w: 40, h: 40, dy: 0, jumps: 0 },
                obstacles: [], diamonds: [], speed: 6, score: 0, frames: 0, lastSpawnFrame: 0,
                groundY: 250, lastFrameTime: 0
            });

            const images = useRef({ steve: new Image(), stone: new Image(), diamond: new Image(), zombie: new Image(), husk: new Image() });

            useEffect(() => {
                images.current.steve.src = "https://minotar.net/helm/Steve/64.png";
                images.current.stone.src = "https://raw.githubusercontent.com/InventivetalentDev/minecraft-assets/1.20/assets/minecraft/textures/block/stone.png";
                images.current.diamond.src = "https://raw.githubusercontent.com/InventivetalentDev/minecraft-assets/1.20/assets/minecraft/textures/item/diamond.png";
                images.current.zombie.src = "https://minotar.net/helm/Zombie/64.png";
                images.current.husk.src = "https://minotar.net/helm/Husk/64.png";
                
                bgmRef.current = new Audio("https://raw.githubusercontent.com/libgdx/libgdx-demo-superjumper/master/android/assets/data/music.mp3");
                bgmRef.current.loop = true; bgmRef.current.volume = 0.4;
                
                const cvs = canvasRef.current;
                if (cvs) {
                    const ctx = cvs.getContext('2d');
                    const dpr = window.devicePixelRatio || 1;
                    cvs.width = LOG_W * dpr; cvs.height = LOG_H * dpr;
                    ctx.scale(dpr, dpr);
                }

                return () => {
                    if (gameRef.current.reqId) cancelAnimationFrame(gameRef.current.reqId);
                    if (bgmRef.current) { bgmRef.current.pause(); bgmRef.current.currentTime = 0; }
                };
            }, []);

            const startGame = () => {
                setGameState('playing'); setScore(0);
                if (bgmRef.current) { bgmRef.current.currentTime = 0; bgmRef.current.play().catch(e => console.log("BGM 被阻擋", e)); }
                gameRef.current = {
                    reqId: null, player: { x: 50, y: 150, w: 40, h: 40, dy: 0, jumps: 0 },
                    obstacles: [], diamonds: [], speed: 6.5, score: 0, frames: 0, lastSpawnFrame: 0,
                    groundY: 250, lastFrameTime: performance.now()
                };
                gameRef.current.reqId = requestAnimationFrame(loop);
            };

            const jump = () => {
                const p = gameRef.current.player;
                if (p.jumps < 2) { p.dy = -11.5; p.jumps++; }
            };

            const loop = (currentTime) => {
                const cvs = canvasRef.current;
                if (!cvs) return;
                const state = gameRef.current;
                
                if (!currentTime) currentTime = performance.now();
                const fpsInterval = 1000 / 60;
                const elapsed = currentTime - state.lastFrameTime;
                if (elapsed < fpsInterval) { state.reqId = requestAnimationFrame(loop); return; }
                state.lastFrameTime = currentTime - (elapsed % fpsInterval);

                const ctx = cvs.getContext('2d');
                let prevBottom = state.player.y + state.player.h; 
                state.player.dy += 0.7; 
                state.player.y += state.player.dy;

                let inPit = false, dead = false, landedOnPlatform = false;

                state.obstacles = state.obstacles.filter(o => o.x + o.w > -50);
                state.diamonds = state.diamonds.filter(d => d.x + d.w > -50 && !d.collected);

                state.obstacles.forEach(obs => {
                    if (obs.type === 'pit') {
                        let pCenter = state.player.x + state.player.w / 2;
                        if (pCenter > obs.x + 5 && pCenter < obs.x + obs.w - 5) inPit = true;
                    }
                });

                if (state.player.y + state.player.h >= state.groundY) {
                    if (!inPit) {
                        if (prevBottom <= state.groundY + 10) {
                            state.player.y = state.groundY - state.player.h;
                            state.player.dy = 0; state.player.jumps = 0;
                        } else dead = true;
                    }
                }

                if (state.player.y > LOG_H) { endGame(); return; }

                for (let i = 0; i < state.obstacles.length; i++) {
                    let obs = state.obstacles[i];
                    if (obs.type === 'pit') { obs.x -= state.speed; continue; }

                    if (obs.type === 'zombie') {
                        obs.x -= (state.speed + 1.2); 
                    } else if (obs.type === 'husk') {
                        obs.x -= (state.speed + 1.2); 
                        // Husk AI: 玩家在地面的時候，主動跳躍越過玩家 (大幅躍起)
                        let dist = obs.x - (state.player.x + state.player.w);
                        if (dist > 10 && dist < 110 && state.player.y >= state.groundY - 10 && obs.y >= state.groundY - obs.h - 5) {
                            obs.dy = -13.5; 
                        }
                        obs.dy += 0.7;
                        obs.y += obs.dy;
                        if (obs.y + obs.h >= state.groundY) { obs.y = state.groundY - obs.h; obs.dy = 0; }
                    } else {
                        obs.x -= state.speed;
                    }

                    if (state.player.x + 8 < obs.x + obs.w - 8 && state.player.x + state.player.w - 8 > obs.x + 8 && state.player.y + 5 < obs.y + obs.h - 5 && state.player.y + state.player.h > obs.y + 5) {
                        if (obs.type === 'stone') {
                            if (state.player.dy > 0 && prevBottom <= obs.y + 15) {
                                state.player.y = obs.y - state.player.h; state.player.dy = 0; state.player.jumps = 0; landedOnPlatform = true;
                            } else dead = true; 
                        } else if (obs.type === 'zombie' || obs.type === 'husk') dead = true; 
                    }
                }

                state.diamonds.forEach(d => {
                    d.x -= state.speed;
                    if (!d.collected && state.player.x < d.x + d.w && state.player.x + state.player.w > d.x && state.player.y < d.y + d.h && state.player.y + state.player.h > d.y) {
                        d.collected = true; state.score += 1; setScore(state.score);
                    }
                });

                if (dead) { endGame(); return; }

                state.frames++;
                if (state.frames % 100 === 0 && state.speed < 15) state.speed += 0.2;

                let spawnInterval = Math.max(40, 100 - state.speed * 4);
                const lastObs = state.obstacles[state.obstacles.length - 1];
                if (lastObs && lastObs.type === 'pit') spawnInterval = Math.max(spawnInterval, Math.floor((lastObs.w / state.speed) + 20));

                if (state.frames - state.lastSpawnFrame > spawnInterval) {
                    if (Math.random() < 0.55) { 
                        state.lastSpawnFrame = state.frames;
                        let rand = Math.random();
                        if (rand < 0.3) state.obstacles.push({ type: 'stone', x: LOG_W, y: state.groundY - 40, w: 40, h: 40 });
                        else if (rand < 0.6) state.obstacles.push({ type: 'pit', x: LOG_W, y: state.groundY, w: Math.random() * 150 + 150, h: 100 });
                        else if (rand < 0.8) state.obstacles.push({ type: 'zombie', x: LOG_W, y: state.groundY - 40, w: 40, h: 40 });
                        else state.obstacles.push({ type: 'husk', x: LOG_W, y: state.groundY - 40, w: 40, h: 40, dy: 0 }); 
                    }
                }
                
                // 鑽石頻率 400+300* if (state.frames % Math.floor(Math.random() * 300 + 400) === 0) {
                    let dY = state.groundY - 50 - Math.random() * 100;
                    state.diamonds.push({ x: LOG_W, y: dY, w: 24, h: 24, collected: false });
                }

                ctx.clearRect(0, 0, LOG_W, LOG_H);
                ctx.fillStyle = '#5A5A5A'; ctx.fillRect(0, state.groundY, LOG_W, LOG_H - state.groundY);
                ctx.fillStyle = '#4A4A4A'; ctx.fillRect(0, state.groundY, LOG_W, 8);
                
                state.obstacles.forEach(obs => { if (obs.type === 'pit') ctx.clearRect(obs.x, state.groundY, obs.w, LOG_H - state.groundY); });
                state.obstacles.forEach(obs => {
                    if (obs.type === 'stone') { if (images.current.stone.complete) ctx.drawImage(images.current.stone, obs.x, obs.y, obs.w, obs.h); else { ctx.fillStyle = '#888'; ctx.fillRect(obs.x, obs.y, obs.w, obs.h); } }
                    else if (obs.type === 'zombie') { if (images.current.zombie.complete) ctx.drawImage(images.current.zombie, obs.x, obs.y, obs.w, obs.h); else { ctx.fillStyle = '#005500'; ctx.fillRect(obs.x, obs.y, obs.w, obs.h); } }
                    else if (obs.type === 'husk') { if (images.current.husk.complete) ctx.drawImage(images.current.husk, obs.x, obs.y, obs.w, obs.h); else { ctx.fillStyle = '#b3a172'; ctx.fillRect(obs.x, obs.y, obs.w, obs.h); } }
                });
                state.diamonds.forEach(d => {
                    if (!d.collected) { if (images.current.diamond.complete) ctx.drawImage(images.current.diamond, d.x, d.y, d.w, d.h); else { ctx.fillStyle = '#00ffff'; ctx.fillRect(d.x, d.y, d.w, d.h); } }
                });
                if (images.current.steve.complete) ctx.drawImage(images.current.steve, state.player.x, state.player.y, state.player.w, state.player.h);
                else { ctx.fillStyle = '#ffccaa'; ctx.fillRect(state.player.x, state.player.y, state.player.w, state.player.h); }
                
                ctx.fillStyle = '#8b4513'; ctx.fillRect(state.player.x - 4, state.player.y + state.player.h - 2, state.player.w + 8, 6);
                ctx.fillStyle = '#111'; ctx.fillRect(state.player.x + 2, state.player.y + state.player.h + 4, 8, 8); ctx.fillRect(state.player.x + state.player.w - 10, state.player.y + state.player.h + 4, 8, 8);

                state.reqId = requestAnimationFrame(loop);
            };

            const endGame = () => {
                setGameState('gameover');
                if (bgmRef.current) bgmRef.current.pause();
                onGameOver(gameRef.current.score); 
                if (gameRef.current.reqId) cancelAnimationFrame(gameRef.current.reqId);
            };

            return (
                <div className="fixed inset-0 z-[80] bg-black bg-opacity-90 flex flex-col items-center justify-center p-2 sm:p-4">
                    <div className="bg-gray-800 p-2 border-4 border-gray-600 no-round max-w-3xl w-full relative shadow-2xl">
                        <div className="flex justify-between text-white font-bold mb-2 font-mono px-2 text-xl">
                            <span className="flex items-center"><McImg src="https://raw.githubusercontent.com/InventivetalentDev/minecraft-assets/1.20/assets/minecraft/textures/item/diamond.png" fallback="💎" className="w-6 h-6 mr-2 pixelated" /> {score}</span>
                            <button onClick={onQuit} className="text-red-400 hover:text-red-300 transition-colors">✖ 離開</button>
                        </div>
                        <div className="bg-[#6bc0ff] relative w-full overflow-hidden border-4 border-black" style={{ height: '350px' }} onMouseDown={(e) => { e.preventDefault(); if(gameState==='playing') jump(); }} onTouchStart={(e) => { e.preventDefault(); if(gameState==='playing') jump(); }}>
                            <canvas ref={canvasRef} style={{ width: '100%', height: '100%' }} className="pixelated block"></canvas>
                            {gameState === 'start' && (
                                <div className="absolute inset-0 flex items-center justify-center bg-black bg-opacity-60">
                                    <button onClick={startGame} className="mc-btn px-8 py-4 text-2xl animate-pulse">🛹 開始跑酷</button>
                                </div>
                            )}
                            {gameState === 'gameover' && (
                                <div className="absolute inset-0 flex flex-col items-center justify-center bg-black bg-opacity-80 text-white">
                                    <h2 className="text-4xl font-black mb-2 text-red-500 drop-shadow-md">GAME OVER</h2>
                                    <p className="mb-8 font-bold text-xl flex items-center">
                                        獲得了 {score} <McImg src="https://raw.githubusercontent.com/InventivetalentDev/minecraft-assets/1.20/assets/minecraft/textures/item/diamond.png" fallback="💎" className="w-6 h-6 ml-2 pixelated" />
                                    </p>
                                    <div className="flex space-x-6">
                                        <button onClick={startGame} className="mc-btn px-6 py-3 text-lg">🔄 再玩</button>
                                        <button onClick={onQuit} className="mc-btn px-6 py-3 text-lg bg-gray-400">🔙 返回</button>
                                    </div>
                                </div>
                            )}
                        </div>
                        <p className="text-center text-gray-400 text-sm mt-3 font-bold tracking-widest leading-relaxed">
                            點擊/觸控以跳躍 (可二段跳) <br/> <span className="text-xs text-gray-500">沙漠殭屍(黃)靠近時會飛越你，站地上不動即可閃避。</span>
                        </p>
                    </div>
                </div>
            );
        }

        function MinecraftDashboard({ user, userProfile, showAlert }) {
            const [leaderboard, setLeaderboard] = useState([]);
            const [showMiniGame, setShowMiniGame] = useState(false);
            const [showGiftModal, setShowGiftModal] = useState(false);
            const [selectedGift, setSelectedGift] = useState(null);
            
            const mcData = userProfile.mcData || { diamonds: 0, level: 1, exp: 0, hunger: 10, items: [], cats: 0, dogs: 0, lastCheckIn: null };
            const expToNextLevel = mcData.level * 20;

            useEffect(() => {
                const fetchLeaderboard = async () => {
                    const friendUids = (userProfile.friends || []).map(f => f.uid);
                    if (friendUids.length === 0) {
                        setLeaderboard([{ name: userProfile.displayName, ...mcData, isMe: true }]);
                        return;
                    }
                    try {
                        const board = [{ name: userProfile.displayName, ...mcData, isMe: true }];
                        const promises = friendUids.map(uid => db.collection('users').doc(uid).get());
                        const results = await Promise.all(promises);
                        results.forEach(doc => {
                            if (doc.exists) {
                                const data = doc.data();
                                if (data.mcData) board.push({ name: data.displayName, ...data.mcData, isMe: false });
                            }
                        });
                        board.sort((a, b) => {
                            if (b.level !== a.level) return b.level - a.level;
                            return b.exp - a.exp;
                        });
                        setLeaderboard(board);
                    } catch (e) { console.error("讀取排行榜失敗", e); }
                };
                fetchLeaderboard();
            }, [userProfile.friends, mcData]);

            const updateMcData = (updates, silent = false) => {
                db.collection('users').doc(user.uid).update({ mcData: { ...mcData, ...updates } })
                  .catch(e => { if (!silent) showAlert('更新失敗：' + e.message); });
            };

            const handleCheckIn = () => {
                const today = new Date().toISOString().split('T')[0];
                if (mcData.lastCheckIn === today) return showAlert("今日已經簽到過囉！");
                let newHunger = mcData.hunger - 2; 
                if (newHunger < 0) newHunger = 0;
                updateMcData({ diamonds: mcData.diamonds + 20, exp: mcData.exp + 10, hunger: newHunger, lastCheckIn: today });
                showAlert("✅ 簽到成功！獲得 20 💎 與 10 EXP\n(史蒂夫消耗了 2 點飽食度)");
            };

            const handleBuy = (item, cost, type, name) => {
                if (mcData.diamonds < cost) return showAlert(`鑽石不夠喔！需要 ${cost} 💎`);
                let updates = { diamonds: mcData.diamonds - cost };

                if (type === 'food') {
                    if (mcData.hunger >= 10) return showAlert("史蒂夫現在很飽了！");
                    updates.hunger = Math.min(10, mcData.hunger + (item === 'apple' ? 3 : 10));
                    if(item === 'golden_apple') {
                        let nExp = mcData.exp + 10, nLv = mcData.level;
                        if (nExp >= nLv * 20) { nExp -= nLv*20; nLv++; }
                        updates.exp = nExp; updates.level = nLv;
                    }
                    showAlert(`購買成功！食用了 ${name}！`);
                } else if (type === 'pet') {
                    if(item === 'cat') updates.cats = (mcData.cats || 0) + 1;
                    if(item === 'dog') updates.dogs = (mcData.dogs || 0) + 1;
                    showAlert(`成功收編！一隻 ${name} 加入了你的家！`);
                } else if (type === 'equip') {
                    if ((mcData.items || []).includes(name)) return showAlert("你已經擁有這個裝備了！");
                    let newExp = mcData.exp + (item==='sword' ? 50 : item==='pickaxe' ? 30 : 100);
                    let newLevel = mcData.level;
                    if (newExp >= newLevel * 20) { newExp -= newLevel * 20; newLevel += 1; showAlert(`獲得 ${name}！經驗大增，恭喜升級！`); }
                    else { showAlert(`獲得 ${name}！裝備後感覺變強了！`); }
                    updates.exp = newExp; updates.level = newLevel;
                    updates.items = [...(mcData.items || []), name];
                }
                updateMcData(updates);
            };

            const openGiftModal = (itemKey, cost, type, name) => {
                if (mcData.diamonds < cost) return showAlert(`鑽石不夠喔！需要 ${cost} 💎`);
                if ((userProfile.friends || []).length === 0) return showAlert("你還沒有好友可以送禮喔！");
                setSelectedGift({ itemKey, cost, type, name });
                setShowGiftModal(true);
            };

            const sendGift = (friend) => {
                if (mcData.diamonds < selectedGift.cost) return showAlert(`鑽石不夠喔！`);
                
                const chatId = [user.uid, friend.uid].sort().join('_');
                db.collection('chats').doc(chatId).collection('messages').add({
                    senderId: user.uid,
                    senderName: userProfile.displayName,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    type: 'gift',
                    read: false,
                    giftData: {
                        itemKey: selectedGift.itemKey,
                        name: selectedGift.name,
                        cost: selectedGift.cost,
                        type: selectedGift.type,
                        claimed: false
                    }
                }).then(() => {
                    updateMcData({ diamonds: mcData.diamonds - selectedGift.cost }, true);
                    db.collection('users').doc(friend.uid).set({ unreadChats: { [user.uid]: true } }, { merge: true });
                    showAlert(`✅ 已成功送出 ${selectedGift.name} 給 ${friend.name}！扣除了 ${selectedGift.cost} 💎`);
                    setShowGiftModal(false);
                }).catch(e => showAlert('送禮失敗：' + e.message));
            };

            const handleMiniGameOver = (earnedDiamonds) => {
                if (earnedDiamonds > 0) updateMcData({ diamonds: mcData.diamonds + earnedDiamonds }, true); 
            };

            const mcBase = "https://raw.githubusercontent.com/InventivetalentDev/minecraft-assets/1.20/assets/minecraft/textures/item";
            const imgD = `${mcBase}/diamond.png`;
            const shopItems = [
                { key: 'apple', type: 'food', cost: 10, name: '蘋果 (+3 飽食)', img: `${mcBase}/apple.png`, fallback: '🍎' },
                { key: 'golden_apple', type: 'food', cost: 50, name: '金蘋果 (+10 飽食, +10 EXP)', img: `${mcBase}/golden_apple.png`, fallback: '🍏' },
                { key: 'cat', type: 'pet', cost: 100, name: '領養斑點貓咪', img: `${mcBase}/cat_spawn_egg.png`, fallback: '🐱' },
                { key: 'dog', type: 'pet', cost: 150, name: '領養狗狗', img: `${mcBase}/wolf_spawn_egg.png`, fallback: '🐶' },
                { key: 'pickaxe', type: 'equip', cost: 200, name: '鑽石鎬 (+30 EXP)', img: `${mcBase}/diamond_pickaxe.png`, fallback: '⛏️' },
                { key: 'sword', type: 'equip', cost: 300, name: '鑽石劍 (+50 EXP)', img: `${mcBase}/diamond_sword.png`, fallback: '🗡️' },
                { key: 'elytra', type: 'equip', cost: 800, name: '鞘翅 (+100 EXP)', img: `${mcBase}/elytra.png`, fallback: '🦋' }
            ];

            return (
                <div className="mc-bg h-[calc(100dvh-100px)] overflow-y-auto custom-scrollbar p-4 relative">
                    {showMiniGame && <SkateboardGame onGameOver={handleMiniGameOver} onQuit={() => setShowMiniGame(false)} />}
                    <div className="max-w-4xl mx-auto mc-ui p-6 flex flex-col space-y-6 bg-opacity-90 dark:bg-opacity-95">
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center space-y-4 md:space-y-0">
                            <div>
                                <h1 className="text-2xl font-black mb-2 text-gray-800 dark:text-gray-100 tracking-wide drop-shadow-md">⛏️ 史蒂夫的養成天地</h1>
                                <p className="text-sm font-bold text-gray-600 dark:text-gray-300">完成測驗或遊玩小遊戲來獲取鑽石！</p>
                            </div>
                            <div className="mc-panel-dark w-full md:w-auto text-white">
                                <div className="flex space-x-6 text-sm items-center font-bold">
                                    <div className="text-center"><p className="text-green-400 text-lg">Lv. {mcData.level}</p><p className="text-xs text-gray-300">EXP: {mcData.exp}/{expToNextLevel}</p></div>
                                    <div className="space-y-1">
                                        <p className="flex items-center text-blue-300"><McImg src={imgD} fallback="💎" className="w-4 h-4 mr-1 pixelated" /> {mcData.diamonds}</p>
                                        <p className="flex items-center text-orange-300"><McImg src={`${mcBase}/cooked_beef.png`} fallback="🍖" className="w-4 h-4 mr-1 pixelated" /> {mcData.hunger}/10</p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            
                            <div className="lg:col-span-2 space-y-6">
                                <div className="mc-panel-dark text-white">
                                    <h2 className="border-b-2 border-gray-600 pb-2 mb-4 font-bold text-gray-300 flex justify-between items-center">
                                        <span>🏡 你的家</span>
                                        <button onClick={() => setShowMiniGame(true)} className="bg-blue-600 hover:bg-blue-500 text-white text-xs px-3 py-1 border-2 border-blue-800 font-bold transition-colors">
                                            🛹 玩滑板遊戲
                                        </button>
                                    </h2>
                                    <div className="text-center p-6 mc-bg border-4 border-gray-800 mb-4 h-40 flex flex-col items-center justify-center relative overflow-hidden shadow-inner">
                                        <McImg src="https://minotar.net/helm/Steve/64.png" fallback="🧍‍♂️" className="w-16 h-16 pixelated shadow-lg border border-black z-10" />
                                        <div className="flex flex-wrap gap-2 text-2xl absolute bottom-2 right-2 justify-end w-full px-2">
                                            {Array.from({ length: mcData.cats || 0 }).map((_, i) => <span key={'c'+i} title="斑點貓">🐱</span>)}
                                            {Array.from({ length: mcData.dogs || 0 }).map((_, i) => <span key={'d'+i} title="狗狗">🐶</span>)}
                                            {(mcData.items || []).includes('鑽石鎬') && <McImg src={`${mcBase}/diamond_pickaxe.png`} fallback="⛏️" className="w-8 h-8 pixelated drop-shadow-md" />}
                                            {(mcData.items || []).includes('鑽石劍') && <McImg src={`${mcBase}/diamond_sword.png`} fallback="🗡️" className="w-8 h-8 pixelated drop-shadow-md" />}
                                            {(mcData.items || []).includes('鞘翅') && <McImg src={`${mcBase}/elytra.png`} fallback="🦋" className="w-8 h-8 pixelated drop-shadow-md" />}
                                        </div>
                                    </div>
                                    <button onClick={handleCheckIn} className="mc-btn w-full py-2 flex justify-center items-center">
                                        📅 每日簽到 (+20 <McImg src={imgD} fallback="💎" className="w-4 h-4 mx-1 pixelated"/>)
                                    </button>
                                </div>

                                <div className="mc-panel-dark text-white">
                                    <h2 className="border-b-2 border-gray-600 pb-2 mb-4 font-bold text-gray-300">🛒 大黑店 (可送禮)</h2>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                        {shopItems.map(item => (
                                            <div key={item.key} className="bg-gray-800 border border-gray-600 p-2 flex flex-col">
                                                <div className="flex items-center mb-2">
                                                    <McImg src={item.img} fallback={item.fallback} className="w-6 h-6 mr-2 pixelated"/>
                                                    <span className="text-sm font-bold truncate flex-grow text-gray-200">{item.name}</span>
                                                </div>
                                                <div className="flex space-x-1 mt-auto">
                                                    <button onClick={() => handleBuy(item.key, item.cost, item.type, item.name)} className="mc-btn flex-grow py-1 text-xs flex justify-center items-center">
                                                        買 <span className="text-blue-800 ml-1">{item.cost}</span> <McImg src={imgD} fallback="💎" className="w-3 h-3 ml-0.5 pixelated"/>
                                                    </button>
                                                    <button onClick={() => openGiftModal(item.key, item.cost, item.type, item.name)} className="mc-btn px-2 py-1 text-xs bg-pink-200 hover:bg-pink-300" title="送禮給好友">🎁</button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>

                            <div className="mc-panel-dark text-white lg:h-full">
                                <h2 className="border-b-2 border-gray-600 pb-2 mb-4 font-bold text-yellow-300">🏆 好友排行榜</h2>
                                <div className="space-y-2 overflow-y-auto max-h-[35rem] custom-scrollbar pr-2">
                                    {leaderboard.map((lb, idx) => (
                                        <div key={idx} className={`flex flex-col p-3 border-b border-gray-700 ${lb.isMe ? 'bg-white bg-opacity-10 rounded' : ''}`}>
                                            <div className="flex justify-between items-center mb-1">
                                                <div className="flex items-center space-x-2">
                                                    <span className="font-bold w-5 text-center text-sm">{idx === 0 ? '👑' : idx + 1}</span>
                                                    <span className="truncate max-w-[100px] font-bold">{lb.name}</span>
                                                </div>
                                                <span className="text-green-400 font-bold text-sm">Lv.{lb.level}</span>
                                            </div>
                                            <div className="flex justify-end space-x-3 text-xs text-gray-400">
                                                <span className="flex items-center"><McImg src={imgD} fallback="💎" className="w-3 h-3 mr-1 pixelated" /> {lb.diamonds}</span>
                                                <span>🐾 {(lb.cats||0)+(lb.dogs||0)}</span>
                                                <span>🎒 {(lb.items||[]).length}</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                        </div>
                    </div>

                    {showGiftModal && (
                        <div className="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-[100] p-4">
                            <div className="bg-white dark:bg-gray-800 p-6 w-full max-w-sm no-round shadow-xl border-t-4 border-pink-500">
                                <h3 className="font-bold text-lg mb-4 flex justify-between items-center dark:text-white">
                                    <span>🎁 送出 {selectedGift.name}</span>
                                    <button onClick={() => setShowGiftModal(false)} className="text-gray-400 hover:text-black dark:hover:text-white">✖</button>
                                </h3>
                                <p className="text-sm text-gray-600 dark:text-gray-300 mb-4">將花費您 <span className="font-bold text-blue-600 dark:text-blue-400">{selectedGift.cost} 💎</span>，請選擇對象：</p>
                                <div className="max-h-60 overflow-y-auto mb-4 border border-gray-200 dark:border-gray-700 custom-scrollbar">
                                    {(userProfile.friends || []).map(f => (
                                        <button key={f.uid} onClick={() => sendGift(f)} className="w-full text-left p-3 hover:bg-pink-50 dark:hover:bg-pink-900/30 border-b border-gray-100 dark:border-gray-700 font-bold text-sm transition-colors dark:text-white flex justify-between">
                                            <span>{f.name}</span>
                                            <span className="text-pink-500 font-normal">送出</span>
                                        </button>
                                    ))}
                                </div>
                                <button onClick={() => setShowGiftModal(false)} className="w-full bg-gray-100 dark:bg-gray-700 text-black dark:text-white p-2 font-bold no-round hover:bg-gray-200 transition-colors">取消</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // --- 聊天室與系統 ---

        function SocialDashboard({ user, userProfile, showAlert }) {
            const friends = userProfile.friends || [];
            const [searchEmail, setSearchEmail] = useState('');
            const [activeChat, setActiveChat] = useState(null);
            const [messages, setMessages] = useState([]);
            const [newMessage, setNewMessage] = useState('');
            const messagesEndRef = useRef(null);
            const chatInputRef = useRef(null); 
            const fileInputRef = useRef(null);
            
            const [messageLimit, setMessageLimit] = useState(5);
            const [lastMsgIdForScroll, setLastMsgIdForScroll] = useState(null);

            const getChatId = (uid1, uid2) => [uid1, uid2].sort().join('_');

            useEffect(() => {
                if (activeChat && userProfile && userProfile.unreadChats && userProfile.unreadChats[activeChat.uid]) {
                    db.collection('users').doc(user.uid).update({
                        [`unreadChats.${activeChat.uid}`]: firebase.firestore.FieldValue.delete()
                    }).catch(e => console.error("清除紅點失敗", e));
                }
            }, [activeChat, userProfile, user.uid]);

            useEffect(() => {
                if(!activeChat) return;
                const chatId = getChatId(user.uid, activeChat.uid);
                const unsub = db.collection('chats').doc(chatId).collection('messages')
                    .orderBy('timestamp', 'desc')
                    .limit(messageLimit)
                    .onSnapshot(snapshot => {
                        const now = Date.now();
                        const msgs = [];
                        
                        snapshot.docs.forEach(doc => {
                            const data = doc.data();
                            if (data.type === 'image' && data.expiresAt && data.expiresAt < now) {
                                doc.ref.delete().catch(e => console.error("刪除圖片失敗", e));
                            } else {
                                msgs.push({ id: doc.id, ...data });
                            }
                        });
                        
                        const reversedMsgs = msgs.reverse();
                        setMessages(reversedMsgs);
                        
                        const unreadDocs = snapshot.docs.filter(doc => doc.data().senderId !== user.uid && !doc.data().read);
                        if (unreadDocs.length > 0) {
                            const batch = db.batch();
                            unreadDocs.forEach(doc => {
                                batch.update(doc.ref, { read: true });
                            });
                            batch.commit().catch(e => console.error("更新已讀狀態失敗", e));
                        }

                        if (reversedMsgs.length > 0) {
                            const latestMsgId = reversedMsgs[reversedMsgs.length - 1].id;
                            if (latestMsgId !== lastMsgIdForScroll || messageLimit === 5) {
                                setLastMsgIdForScroll(latestMsgId);
                                setTimeout(() => {
                                    if (messagesEndRef.current) {
                                        messagesEndRef.current.scrollIntoView({ behavior: "smooth" });
                                    }
                                }, 100);
                            }
                        }
                    });

                const cleanupInterval = setInterval(() => {
                    setMessages(prev => prev.filter(m => !(m.type === 'image' && m.expiresAt && m.expiresAt < Date.now())));
                }, 60000);

                return () => { unsub(); clearInterval(cleanupInterval); };
            }, [activeChat, user.uid, messageLimit]);

            const handleAddFriend = () => {
                const cleanEmail = searchEmail.trim().toLowerCase(); 
                if(!cleanEmail) return;
                if(cleanEmail === user.email.toLowerCase()) return showAlert('不能加自己為好友！');
                
                db.collection('users').where('email', '==', cleanEmail).get()
                .then(snap => {
                    if(snap.empty) return showAlert('找不到此信箱的使用者 (請確認對方已登入過系統)');
                    const targetUser = snap.docs[0];
                    const targetData = targetUser.data();
                    const targetUid = targetUser.id;
                    
                    if(friends.find(f => f.uid === targetUid)) return showAlert('已經是好友了！');

                    const batch = db.batch();
                    batch.update(db.collection('users').doc(user.uid), {
                        friends: firebase.firestore.FieldValue.arrayUnion({ uid: targetUid, name: targetData.displayName, email: targetData.email })
                    });
                    batch.update(db.collection('users').doc(targetUid), {
                        friends: firebase.firestore.FieldValue.arrayUnion({ uid: user.uid, name: userProfile.displayName, email: user.email })
                    });
                    
                    return batch.commit().then(() => {
                        showAlert(`已成功加入 ${targetData.displayName}！`);
                        setSearchEmail('');
                    });
                }).catch(e => showAlert('加入失敗：' + e.message));
            };

            const sendMessage = (e) => {
                e.preventDefault();
                if(!newMessage.trim() || !activeChat) return;
                const chatId = getChatId(user.uid, activeChat.uid);
                db.collection('chats').doc(chatId).collection('messages').add({
                    text: newMessage.trim(),
                    senderId: user.uid,
                    senderName: userProfile.displayName,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    type: 'text',
                    read: false
                }).then(() => {
                    setNewMessage('');
                    db.collection('users').doc(activeChat.uid).set({
                        unreadChats: { [user.uid]: true }
                    }, { merge: true });
                    
                    setTimeout(() => { if (chatInputRef.current) chatInputRef.current.focus(); }, 10);
                });
            };

            const handleImageUpload = (e) => {
                if (!activeChat) return;
                const file = e.target.files[0];
                if (!file) return;
                if (file.size > 10 * 1024 * 1024) {
                    showAlert("圖片大小不能超過 10MB！"); e.target.value = ''; return;
                }

                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let w = img.width, h = img.height;
                        const MAX_DIM = 800; 
                        if (w > h && w > MAX_DIM) { h *= MAX_DIM / w; w = MAX_DIM; } 
                        else if (h > MAX_DIM) { w *= MAX_DIM / h; h = MAX_DIM; }
                        canvas.width = w; canvas.height = h;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, w, h);
                        const compressedBase64 = canvas.toDataURL('image/jpeg', 0.5); 

                        const chatId = getChatId(user.uid, activeChat.uid);
                        db.collection('chats').doc(chatId).collection('messages').add({
                            type: 'image',
                            imageUrl: compressedBase64,
                            senderId: user.uid,
                            senderName: userProfile.displayName,
                            timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                            expiresAt: Date.now() + 10 * 60 * 1000,
                            read: false
                        }).then(() => {
                            db.collection('users').doc(activeChat.uid).set({ unreadChats: { [user.uid]: true } }, { merge: true });
                        }).catch(err => showAlert("圖片上傳失敗：" + err.message));
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
                e.target.value = ''; 
            };

            const claimGift = (msgId, giftData) => {
                const chatId = getChatId(user.uid, activeChat.uid);
                const msgRef = db.collection('chats').doc(chatId).collection('messages').doc(msgId);
                
                db.runTransaction(transaction => {
                    return transaction.get(msgRef).then(doc => {
                        if (!doc.exists) throw new Error("禮物不存在");
                        const data = doc.data();
                        if (data.giftData.claimed) throw new Error("禮物已經被領取過了！");
                        transaction.update(msgRef, { 'giftData.claimed': true });
                    });
                }).then(() => {
                    const mcData = userProfile.mcData || { diamonds: 0, level: 1, exp: 0, hunger: 10, items: [], cats: 0, dogs: 0 };
                    let updates = {};
                    if (giftData.type === 'food') {
                        updates.hunger = Math.min(10, mcData.hunger + (giftData.itemKey === 'apple' ? 3 : 10));
                        if(giftData.itemKey === 'golden_apple') {
                            let nExp = mcData.exp + 10, nLv = mcData.level;
                            if (nExp >= nLv * 20) { nExp -= nLv*20; nLv++; }
                            updates.exp = nExp; updates.level = nLv;
                        }
                    } else if (giftData.type === 'pet') {
                        if(giftData.itemKey === 'cat') updates.cats = (mcData.cats || 0) + 1;
                        if(giftData.itemKey === 'dog') updates.dogs = (mcData.dogs || 0) + 1;
                    } else if (giftData.type === 'equip') {
                        if (!(mcData.items || []).includes(giftData.name)) {
                            let newExp = mcData.exp + (giftData.itemKey==='sword' ? 50 : giftData.itemKey==='pickaxe' ? 30 : 100);
                            let newLevel = mcData.level;
                            if (newExp >= newLevel * 20) { newExp -= newLevel * 20; newLevel += 1; }
                            updates.exp = newExp; updates.level = newLevel;
                            updates.items = [...(mcData.items || []), giftData.name];
                        }
                    }
                    return db.collection('users').doc(user.uid).update({ mcData: { ...mcData, ...updates } });
                }).then(() => {
                    showAlert(`🎉 成功領取來自 ${activeChat.name} 的 ${giftData.name}！`);
                }).catch(err => showAlert(err.message));
            };

            const downloadSharedQuiz = (quizData) => {
                db.collection('users').doc(quizData.ownerId).collection('quizzes').doc(quizData.quizId).get()
                .then(doc => {
                    if(!doc.exists) throw new Error('該試卷已失效或被擁有者刪除！');
                    const data = doc.data();
                    const emptyAnswers = Array(Number(data.numQuestions)).fill('');
                    const emptyStarred = Array(Number(data.numQuestions)).fill(false);
                    
                    return db.collection('users').doc(user.uid).collection('quizzes').add({
                        testName: data.testName + ' (來自好友)',
                        numQuestions: data.numQuestions,
                        questionFileUrl: data.questionFileUrl || '',
                        questionText: data.questionText || '',
                        correctAnswersInput: data.correctAnswersInput || '', 
                        userAnswers: emptyAnswers,
                        starred: emptyStarred,
                        hasTimer: data.hasTimer || false,
                        timeLimit: data.timeLimit || null,
                        timeRemaining: data.hasTimer ? (data.timeLimit * 60) : null,
                        isShared: true, 
                        shortCode: data.shortCode || null,
                        folder: '未分類', 
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                })
                .then(newDocRef => {
                    return db.collection('users').doc(quizData.ownerId).collection('quizzes').doc(quizData.quizId).update({
                        sharedTo: firebase.firestore.FieldValue.arrayUnion({ uid: user.uid, quizId: newDocRef.id })
                    });
                })
                .then(() => showAlert('✅ 已成功下載這份試卷！\n請回到「我的題庫」查看並開始作答。'))
                .catch(e => {
                    if (e.message === '該試卷已失效或被擁有者刪除！') showAlert(e.message);
                    else showAlert('下載失敗：'+e.message);
                });
            };

            const lastMyMsgId = messages.slice().reverse().find(m => m.senderId === user.uid)?.id;

            return (
                <div className="max-w-6xl mx-auto p-4 pt-0 grid grid-cols-1 md:grid-cols-3 gap-6 h-[calc(100dvh-100px)]">
                    <div className="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 shadow-sm no-round flex flex-col h-full overflow-hidden transition-colors">
                        <div className="p-4 border-b border-gray-100 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 shrink-0">
                            <h2 className="font-bold mb-3 dark:text-white">加入好友</h2>
                            <div className="flex space-x-2">
                                <input type="email" placeholder="輸入好友信箱..." className="flex-grow p-2 text-sm border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-black dark:text-white no-round outline-none" value={searchEmail} onChange={e=>setSearchEmail(e.target.value)} onFocus={handleFocusScroll} />
                                <button onClick={handleAddFriend} className="bg-black dark:bg-gray-200 text-white dark:text-black px-3 py-2 no-round text-sm font-bold hover:bg-gray-800 dark:hover:bg-gray-300 transition-colors">加入</button>
                            </div>
                        </div>
                        <div className="flex-grow overflow-y-auto p-2 custom-scrollbar bg-white dark:bg-gray-900">
                            {friends.length === 0 ? <p className="text-center text-gray-400 text-sm mt-10">尚無好友，趕快新增吧！</p> : null}
                            {friends.map(f => (
                                <div key={f.uid} onClick={() => { setActiveChat(f); setMessageLimit(5); }} className={`p-3 border-b border-gray-50 dark:border-gray-800 cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors flex items-center space-x-3 ${activeChat && activeChat.uid === f.uid ? 'bg-orange-50 dark:bg-gray-700 border-orange-100 dark:border-gray-600' : ''}`}>
                                    <div className="w-10 h-10 bg-gray-200 dark:bg-gray-600 rounded-full flex items-center justify-center font-bold text-gray-500 dark:text-gray-300 shrink-0">{f.name.charAt(0)}</div>
                                    <div className="flex-grow overflow-hidden">
                                        <div className="font-bold text-sm truncate dark:text-gray-200">{f.name}</div>
                                        <div className="text-xs text-gray-400 truncate">{f.email}</div>
                                    </div>
                                    {userProfile && userProfile.unreadChats && userProfile.unreadChats[f.uid] && (
                                        <div className="w-2.5 h-2.5 bg-red-500 rounded-full shrink-0"></div>
                                    )}
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="md:col-span-2 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 shadow-sm no-round flex flex-col h-full overflow-hidden transition-colors">
                        {activeChat ? (
                            <>
                                <div className="p-4 border-b border-gray-200 dark:border-gray-700 font-bold flex items-center space-x-2 shrink-0 bg-white dark:bg-gray-800 dark:text-white">
                                    <span className="text-xl">💬</span>
                                    <span>與 {activeChat.name} 的聊天室</span>
                                </div>
                                <div className="flex-grow overflow-y-auto p-4 space-y-4 bg-gray-50 dark:bg-gray-900 custom-scrollbar">
                                    
                                    {messages.length >= messageLimit && (
                                        <div className="flex justify-center mb-4">
                                            <button onClick={() => setMessageLimit(p => p + 10)} className="bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 text-gray-600 dark:text-gray-300 text-xs px-4 py-2 font-bold hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors no-round shadow-sm">
                                                ⬆️ 點擊載入更早的訊息...
                                            </button>
                                        </div>
                                    )}

                                    {messages.map(msg => {
                                        const isMe = msg.senderId === user.uid;
                                        const timeStr = msg.timestamp ? msg.timestamp.toDate().toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' }) : '';
                                        
                                        const { text: quizName, isOfficial } = renderQuizName(msg.scoreData?.testName || msg.quizData?.testName || '');
                                        
                                        return (
                                            <div key={msg.id} className={`flex flex-col ${isMe ? 'items-end' : 'items-start'} mb-4`}>
                                                <div className={`max-w-[80%] p-3 text-sm no-round ${isMe ? 'bg-black text-white dark:bg-blue-600' : 'bg-white border border-gray-200 dark:border-gray-700 text-black dark:bg-gray-700 dark:text-white shadow-sm'}`}>
                                                    {(() => {
                                                        if (msg.type === 'gift') {
                                                            return (
                                                                <div className="text-center px-4 py-2">
                                                                    <p className="text-pink-400 font-black mb-2 text-lg">🎁 送了一份禮物</p>
                                                                    <p className="font-bold text-xl mb-3">{msg.giftData?.name}</p>
                                                                    {!isMe && (
                                                                        msg.giftData?.claimed ? 
                                                                        <span className="text-gray-400 font-bold border border-gray-300 px-4 py-1.5 inline-block">已領取</span> :
                                                                        <button onClick={() => claimGift(msg.id, msg.giftData)} className="bg-pink-500 hover:bg-pink-600 text-white font-bold px-6 py-2 transition-colors">點擊領取</button>
                                                                    )}
                                                                    {isMe && (
                                                                        <span className="text-xs text-gray-400">{msg.giftData?.claimed ? '對方已領取' : '等待對方領取...'}</span>
                                                                    )}
                                                                </div>
                                                            )
                                                        } else if (msg.type === 'image') {
                                                            const minsLeft = Math.max(0, Math.ceil((msg.expiresAt - Date.now()) / 60000));
                                                            return (
                                                                <div className="text-center">
                                                                    <img src={msg.imageUrl} className="max-w-full max-h-48 object-contain mb-1 rounded border border-gray-300 dark:border-gray-600" alt="已上傳圖片" />
                                                                    <p className="text-[10px] text-orange-400 font-bold">⏱ 閱後即焚：大約 {minsLeft} 分鐘後刪除</p>
                                                                </div>
                                                            );
                                                        } else if (msg.type === 'game_rps') {
                                                            return (
                                                                <div className="text-center py-2 px-4">
                                                                    <span className="text-5xl leading-none">{msg.rpsFace}</span>
                                                                    <p className="mt-2 font-bold">{msg.text}</p>
                                                                </div>
                                                            );
                                                        } else if (msg.type === 'score_share') {
                                                            return (
                                                                <div className="text-center px-2 py-1">
                                                                    <p className={`mb-2 font-bold ${isMe ? 'text-yellow-300' : 'text-yellow-400'}`}>🏆 戰績炫耀</p>
                                                                    <p className={`mb-1 text-sm truncate ${isOfficial ? 'official-tag' : 'font-bold'}`}>{quizName}</p>
                                                                    <h3 className={`text-3xl font-black mb-1 ${isMe ? 'text-white' : 'text-red-500'}`}>{msg.scoreData?.score} 分</h3>
                                                                    <p className={`text-xs mb-3 ${isMe ? 'text-gray-300' : 'text-gray-400'}`}>答對 {msg.scoreData?.correctCount} / {msg.scoreData?.total} 題</p>
                                                                    {!isMe && msg.quizData && (
                                                                        <button onClick={() => downloadSharedQuiz(msg.quizData)} className="bg-white dark:bg-gray-200 text-black px-4 py-1.5 no-round font-bold text-xs border border-gray-200 hover:bg-gray-100 dark:hover:bg-white w-full transition-colors">下載這份試卷</button>
                                                                    )}
                                                                </div>
                                                            );
                                                        } else if (msg.type === 'quiz_share') {
                                                            return (
                                                                <div className="text-center">
                                                                    <p className="mb-2 font-bold text-orange-400">📝 分享了一份試卷</p>
                                                                    <p className={`mb-3 ${isOfficial ? 'official-tag' : 'font-bold'}`}>{quizName}</p>
                                                                    {!isMe && msg.quizData && (
                                                                        <button onClick={() => downloadSharedQuiz(msg.quizData)} className="bg-white dark:bg-gray-200 text-black px-4 py-1.5 no-round font-bold text-xs border border-gray-200 hover:bg-gray-100 dark:hover:bg-white w-full transition-colors">下載試卷</button>
                                                                    )}
                                                                </div>
                                                            );
                                                        } else {
                                                            return <p style={{ whiteSpace: 'pre-wrap' }}>{msg.text || '未知訊息'}</p>;
                                                        }
                                                    })()}
                                                </div>
                                                <div className="text-[10px] text-gray-400 dark:text-gray-500 mt-1 flex items-center space-x-2 px-1">
                                                    <span>{timeStr}</span>
                                                    {isMe && msg.id === lastMyMsgId && <span>{msg.read ? '已讀' : '未讀'}</span>}
                                                </div>
                                            </div>
                                        )
                                    })}
                                    <div ref={messagesEndRef} />
                                </div>
                                <form onSubmit={sendMessage} className="p-3 border-t border-gray-200 dark:border-gray-700 flex space-x-2 bg-white dark:bg-gray-800 shrink-0 items-center">
