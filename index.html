<body class="bg-gray-100 text-gray-800 dark:bg-gray-900 dark:text-gray-100 font-sans h-[100dvh] overflow-hidden transition-colors duration-200">
    <div id="root" class="h-full"></div>

    <script type="text/babel">
        const firebaseConfig = {
            apiKey: "AIzaSyBAGM92NBQnUlI1gnLRK-mufM6YtDq5sHk",
            authDomain: "anser-card.firebaseapp.com",
            projectId: "anser-card",
            messagingSenderId: "224666683961",
            appId: "1:224666683961:web:351991d6cbc8543b181be8"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        try {
            db.enablePersistence({ synchronizeTabs: true });
        } catch (err) {
            console.warn("無法啟動離線快取：", err);
        }

        const { useState, useEffect, useRef } = React;

        const handleFocusScroll = (e) => {
            const target = e.target;
            setTimeout(() => { target.scrollIntoView({ behavior: 'smooth', block: 'center' }); }, 300);
        };

        const getEmbedUrl = (url) => {
            if (!url) return '';
            try {
                const driveRegex = /\/file\/d\/([a-zA-Z0-9_-]+)/;
                const match = url.match(driveRegex);
                if (match && match[1]) return `https://drive.google.com/file/d/${match[1]}/preview`;
                return url;
            } catch(e) { return url; }
        };

        const formatTime = (seconds) => {
            if (seconds == null || seconds < 0) return '00:00';
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        };

        // 試題標籤渲染元件 (包含#op處理)
        function QuizNameDisplay({ name, className }) {
            const isOp = name && name.endsWith('[#op]');
            const displayName = isOp ? name.slice(0, -5) : name;
            return (
                <span className={className}>
                    {displayName}
                    {isOp && <span className="official-tag ml-1" title="官方試題">★ 官方認證</span>}
                </span>
            );
        }

        // 圖片壓縮函數
        const compressImage = (file, maxWidth = 800) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        let width = img.width;
                        let height = img.height;
                        
                        if (width > maxWidth) {
                            height = Math.round((height * maxWidth) / width);
                            width = maxWidth;
                        }
                        
                        canvas.width = width;
                        canvas.height = height;
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.6)); // 60% 壓縮率
                    };
                    img.onerror = (error) => reject(error);
                };
            });
        };

        function McImg({ src, fallback, className }) {
            const [hasError, setHasError] = useState(false);
            if (hasError) return <span className={`${className} inline-flex items-center justify-center`} style={{ fontSize: '1.2em' }}>{fallback}</span>;
            return <img src={src} className={className} onError={() => setHasError(true)} alt={fallback} />;
        }

        function DialogOverlay({ dialog, onClose }) {
            const [inputValue, setInputValue] = useState('');
            useEffect(() => { if (dialog && dialog.type === 'prompt') setInputValue(dialog.defaultValue || ''); }, [dialog]);
            if (!dialog) return null;
            const handleConfirm = () => {
                if (dialog.onConfirm) {
                    if (dialog.type === 'prompt') dialog.onConfirm(inputValue);
                    else dialog.onConfirm();
                }
                onClose();
            };
            return (
                <div className="fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-[100] p-4">
                    <div className="bg-white dark:bg-gray-800 p-6 w-full max-w-sm no-round shadow-2xl transform transition-all border-t-4 border-black dark:border-gray-500">
                        <h3 className="font-bold text-lg mb-3 flex items-center dark:text-white">
                            {dialog.type === 'alert' ? 'ℹ️ 系統提示' : '🤔 請確認'}
                        </h3>
                        <p className="mb-5 text-gray-600 dark:text-gray-300 text-sm whitespace-pre-wrap leading-relaxed">{dialog.message}</p>
                        {dialog.type === 'prompt' && (
                            <input type="text" className="w-full mb-5 p-3 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-black dark:text-white no-round outline-none focus:border-black dark:focus:border-white text-sm" value={inputValue} onChange={e => setInputValue(e.target.value)} autoFocus />
                        )}
                        <div className="flex justify-end space-x-3 mt-2 border-t border-gray-100 dark:border-gray-700 pt-4">
                            {(dialog.type === 'confirm' || dialog.type === 'prompt') && (
                                <button onClick={onClose} className="bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-200 px-5 py-2 no-round font-bold text-sm hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors">取消</button>
                            )}
                            <button onClick={handleConfirm} className="bg-black dark:bg-gray-200 text-white dark:text-black px-5 py-2 no-round font-bold text-sm hover:bg-gray-800 dark:hover:bg-gray-300 transition-colors">確定</button>
                        </div>
                    </div>
                </div>
            );
        }

        function TutorialOverlay({ onComplete }) {
            return (
                <div className="fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-[70] p-4">
                    <div className="bg-white dark:bg-gray-800 p-8 w-full max-w-lg no-round shadow-2xl relative border-t-4 border-black dark:border-gray-500 animate-fade-in-up">
                        <h2 className="text-2xl font-black mb-6 text-center tracking-wider dark:text-white">🎉 歡迎加入 JJay 線上測驗</h2>
                        <div className="space-y-6 text-gray-700 dark:text-gray-300 mb-8">
                            <div>
                                <p className="font-bold border-l-4 border-black dark:border-gray-400 pl-3 text-lg dark:text-gray-100">📖 我的題庫</p>
                                <p className="pl-4 mt-1 text-sm leading-relaxed">首創雙螢幕排版，貼上雲端題本或純文字，左邊看題、右邊畫卡，並支援資料夾與測驗代碼功能。</p>
                            </div>
                            <div>
                                <p className="font-bold border-l-4 border-blue-500 pl-3 text-lg dark:text-gray-100">💬 社群交流</p>
                                <p className="pl-4 mt-1 text-sm leading-relaxed">不再是一個人讀書！新增好友即時對話，還能一鍵打包你的測驗卷分享給好友作答、互相炫耀成績。支援圖片閱後即焚！</p>
                            </div>
                            <div>
                                <p className="font-bold border-l-4 border-orange-500 pl-3 text-lg dark:text-gray-100">⛏️ 史蒂夫養成</p>
                                <p className="pl-4 mt-1 text-sm leading-relaxed">讀書也要有儀式感。賺取鑽石佈置你的 Minecraft 家園，還能玩滑板小遊戲與好友競爭等級！</p>
                            </div>
                        </div>
                        <button onClick={onComplete} className="w-full bg-black dark:bg-gray-200 text-white dark:text-black p-3 font-bold no-round hover:bg-gray-800 dark:hover:bg-gray-300 text-lg transition-colors">
                            🚀 開始體驗
                        </button>
                    </div>
                </div>
            );
        }

        function AuthScreen({ showAlert }) {
            const [isSignUp, setIsSignUp] = useState(false);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);

            const handleAuth = (e) => {
                e.preventDefault();
                setLoading(true);
                const safeEmail = email.trim().toLowerCase(); 
                const request = isSignUp 
                    ? auth.createUserWithEmailAndPassword(safeEmail, password)
                    : auth.signInWithEmailAndPassword(safeEmail, password);
                
                request.then((cred) => {
                    if (isSignUp) {
                        const initMcData = { diamonds: 0, level: 1, exp: 0, hunger: 10, items: [], cats: 0, lastCheckIn: null };
                        return db.collection('users').doc(cred.user.uid).set({ 
                            email: safeEmail, 
                            friends: [], 
                            unreadChats: {}, 
                            folders: ['未分類'], 
                            mcData: initMcData,
                            hasSeenTutorial: false 
                        }).catch(err => showAlert("註冊成功，但建立資料庫檔案失敗: " + err.message));
                    } else {
                        db.collection('users').doc(cred.user.uid).set({ email: safeEmail }, { merge: true });
                    }
                })
                .catch(err => showAlert('認證失敗：' + err.message))
                .finally(() => setLoading(false));
            };

            return (
                <div className="flex h-full items-center justify-center p-4 overflow-y-auto bg-gray-100 dark:bg-gray-900">
                    <form onSubmit={handleAuth} className="bg-white dark:bg-gray-800 p-8 shadow-md w-full max-w-sm no-round border border-gray-200 dark:border-gray-700">
                        <div className="w-16 h-16 bg-black dark:bg-gray-700 text-white rounded-full flex items-center justify-center mx-auto mb-4">
                            <span className="text-3xl font-black">📝</span>
                        </div>
                        <h1 className="text-xl font-bold mb-6 tracking-tight text-center dark:text-white">JJay線上測驗</h1>
                        <input type="email" placeholder="電子郵件" className="w-full mb-3 p-3 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-black dark:text-white no-round outline-none focus:border-black dark:focus:border-white" value={email} onChange={e => setEmail(e.target.value)} onFocus={handleFocusScroll} required />
                        <input type="password" placeholder="密碼" className="w-full mb-6 p-3 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-black dark:text-white no-round outline-none focus:border-black dark:focus:border-white" value={password} onChange={e => setPassword(e.target.value)} onFocus={handleFocusScroll} required />
                        <button type="submit" className="w-full bg-black dark:bg-gray-200 text-white dark:text-black p-3 font-bold no-round hover:bg-gray-800 dark:hover:bg-gray-300 transition-colors" disabled={loading}>{loading ? '處理中...' : (isSignUp ? '註冊' : '登入')}</button>
                        <button type="button" onClick={() => setIsSignUp(!isSignUp)} className="w-full mt-4 text-sm text-gray-500 dark:text-gray-400 hover:text-black dark:hover:text-white transition-colors">{isSignUp ? '已有帳號？前往登入' : '沒有帳號？前往註冊'}</button>
                    </form>
                </div>
            );
        }

        function ProfileSetup({ user, onComplete, showAlert }) {
            const [name, setName] = useState('');
            const saveProfile = () => {
                if(!name.trim()) return showAlert('請輸入社群暱稱！');
                db.collection('users').doc(user.uid).set({ displayName: name.trim() }, { merge: true })
                  .then(() => onComplete(name.trim()))
                  .catch(e => showAlert('設定失敗：' + e.message));
            };
            return (
                <div className="flex h-full items-center justify-center p-4 bg-gray-50 dark:bg-gray-900 overflow-y-auto">
                    <div className="bg-white dark:bg-gray-800 p-8 shadow-md w-full max-w-sm no-round border border-gray-200 dark:border-gray-700 text-center">
                        <h2 className="text-xl font-bold mb-4 dark:text-white">歡迎加入！請設定你的社群暱稱</h2>
                        <input type="text" placeholder="例如：藥神、JJay..." className="w-full mb-6 p-3 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-black dark:text-white no-round outline-none focus:border-black dark:focus:border-white text-center" value={name} onChange={e => setName(e.target.value)} onFocus={handleFocusScroll} />
                        <button onClick={saveProfile} className="w-full bg-black dark:bg-gray-200 text-white dark:text-black p-3 font-bold no-round hover:bg-gray-800 dark:hover:bg-gray-300">完成設定</button>
                    </div>
                </div>
            );
        }

        // --- 個人檔案與自介頁面 ---
        function ProfileDashboard({ user, userProfile, showAlert }) {
            const [bio, setBio] = useState(userProfile.bio || '');
            const [avatar, setAvatar] = useState(userProfile.avatar || null);
            const [loading, setLoading] = useState(false);
            const fileInputRef = useRef(null);

            const handleSaveBio = () => {
                db.collection('users').doc(user.uid).update({ bio: bio.trim() })
                  .then(() => showAlert('✅ 自介更新成功！'))
                  .catch(e => showAlert('更新失敗：' + e.message));
            };

            const handleAvatarUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                try {
                    setLoading(true);
                    const compressedImg = await compressImage(file, 400); // 壓縮頭像
                    await db.collection('users').doc(user.uid).update({ avatar: compressedImg });
                    setAvatar(compressedImg);
                    showAlert('✅ 頭像上傳成功！');
                } catch (error) {
                    showAlert('頭像上傳失敗：' + error.message);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="p-4 sm:p-6 max-w-xl mx-auto h-full overflow-y-auto custom-scrollbar">
                    <div className="bg-white dark:bg-gray-800 shadow p-6 border border-gray-200 dark:border-gray-700 no-round flex flex-col items-center">
                        <h2 className="text-2xl font-black mb-6 dark:text-white w-full border-b pb-2 dark:border-gray-700 text-center">個人檔案</h2>
                        
                        <div className="relative mb-6">
                            <div className="w-32 h-32 rounded-full overflow-hidden border-4 border-gray-300 dark:border-gray-600 shadow-md">
                                {avatar ? (
                                    <img src={avatar} alt="Avatar" className="w-full h-full object-cover" />
                                ) : (
                                    <div className="w-full h-full bg-gray-200 dark:bg-gray-700 flex items-center justify-center text-4xl">
                                        👤
                                    </div>
                                )}
                            </div>
                            <button 
                                onClick={() => fileInputRef.current.click()} 
                                className="absolute bottom-0 right-0 bg-black dark:bg-gray-300 text-white dark:text-black p-2 rounded-full shadow hover:bg-gray-800 dark:hover:bg-gray-400 transition"
                                title="更換大頭照"
                            >
                                📷
                            </button>
                            <input type="file" ref={fileInputRef} accept="image/*" onChange={handleAvatarUpload} className="hidden" />
                        </div>

                        {loading && <p className="text-sm text-gray-500 mb-4 animate-pulse">處理中...</p>}

                        <div className="w-full mb-6">
                            <label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">顯示暱稱</label>
                            <div className="w-full p-3 bg-gray-100 dark:bg-gray-700 text-gray-800 dark:text-gray-200 no-round border border-gray-200 dark:border-gray-600 font-bold text-center">
                                {userProfile.displayName}
                            </div>
                        </div>

                        <div className="w-full mb-6">
                            <label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">個人介紹</label>
                            <textarea 
                                className="w-full p-3 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-black dark:text-white no-round outline-none focus:border-black dark:focus:border-white min-h-[120px]"
                                placeholder="寫些關於自己的事吧..."
                                value={bio}
                                onChange={e => setBio(e.target.value)}
                            />
                        </div>

                        <button 
                            onClick={handleSaveBio}
                            className="w-full bg-black dark:bg-gray-200 text-white dark:text-black font-bold p-3 no-round hover:bg-gray-800 dark:hover:bg-gray-300 transition-colors"
                        >
                            💾 儲存變更
                        </button>
                    </div>
                </div>
            );
        }

        // --- 滑板二段跳小遊戲組件 ---
        function SkateboardGame({ onGameOver, onQuit }) {
            const canvasRef = useRef(null);
            const [gameState, setGameState] = useState('start'); 
            const [score, setScore] = useState(0);
            
            const bgmRef = useRef(null);
            
            const LOG_W = 800;
            const LOG_H = 350;
            
            const gameRef = useRef({
                reqId: null,
                player: { x: 50, y: 0, w: 40, h: 40, dy: 0, jumps: 0 },
                obstacles: [],
                diamonds: [],
                speed: 6,
                score: 0,
                frames: 0,
                lastSpawnFrame: 0,
                groundY: 250,
                lastFrameTime: 0
            });

            const images = useRef({ 
                steve: new Image(), 
                stone: new Image(), 
                diamond: new Image(),
                zombie: new Image(),
                husk: new Image()
            });

            useEffect(() => {
                images.current.steve.src = "https://minotar.net/helm/Steve/64.png";
                images.current.stone.src = "https://raw.githubusercontent.com/InventivetalentDev/minecraft-assets/1.20/assets/minecraft/textures/block/stone.png";
                images.current.diamond.src = "https://raw.githubusercontent.com/InventivetalentDev/minecraft-assets/1.20/assets/minecraft/textures/item/diamond.png";
                images.current.zombie.src = "https://minotar.net/helm/Zombie/64.png";
                images.current.husk.src = "https://minotar.net/helm/Husk/64.png";
                
                bgmRef.current = new Audio("https://raw.githubusercontent.com/libgdx/libgdx-demo-superjumper/master/android/assets/data/music.mp3");
                bgmRef.current.loop = true;
                bgmRef.current.volume = 0.4;
                
                const cvs = canvasRef.current;
                if (cvs) {
                    const ctx = cvs.getContext('2d');
                    const dpr = window.devicePixelRatio || 1;
                    cvs.width = LOG_W * dpr;
                    cvs.height = LOG_H * dpr;
                    ctx.scale(dpr, dpr);
                }

                return () => {
                    if (gameRef.current.reqId) cancelAnimationFrame(gameRef.current.reqId);
                    if (bgmRef.current) {
                        bgmRef.current.pause();
                        bgmRef.current.currentTime = 0;
                    }
                };
            }, []);

            const startGame = () => {
                setGameState('playing');
                setScore(0);
                
                if (bgmRef.current) {
                    bgmRef.current.currentTime = 0;
                    bgmRef.current.play().catch(e => console.log("BGM 自動播放被阻擋", e));
                }

                gameRef.current = {
                    reqId: null,
                    player: { x: 50, y: 150, w: 40, h: 40, dy: 0, jumps: 0 },
                    obstacles: [],
                    diamonds: [],
                    speed: 6.5,
                    score: 0,
                    frames: 0,
                    lastSpawnFrame: 0,
                    groundY: 250,
                    lastFrameTime: performance.now()
                };
                gameRef.current.reqId = requestAnimationFrame(loop);
            };

            const jump = () => {
                const p = gameRef.current.player;
                if (p.jumps < 2) {
                    p.dy = -11.5; 
                    p.jumps++;
                }
            };

            const loop = (currentTime) => {
                const cvs = canvasRef.current;
                if (!cvs) return;
                const state = gameRef.current;
                
                // 鎖定 60 FPS
                if (!currentTime) currentTime = performance.now();
                const fpsInterval = 1000 / 60;
                const elapsed = currentTime - state.lastFrameTime;

                if (elapsed < fpsInterval) {
                    state.reqId = requestAnimationFrame(loop);
                    return;
                }
                state.lastFrameTime = currentTime - (elapsed % fpsInterval);

                const ctx = cvs.getContext('2d');
                let prevBottom = state.player.y + state.player.h; 
                
                state.player.dy += 0.7; 
                state.player.y += state.player.dy;

                let inPit = false;
                let dead = false;
                let landedOnPlatform = false;

                state.obstacles = state.obstacles.filter(o => o.x + o.w > -50);
                state.diamonds = state.diamonds.filter(d => d.x + d.w > -50 && !d.collected);

                state.obstacles.forEach(obs => {
                    if (obs.type === 'pit') {
                        let pCenter = state.player.x + state.player.w / 2;
                        if (pCenter > obs.x + 5 && pCenter < obs.x + obs.w - 5) {
                            inPit = true;
                        }
                    }
                });

                if (state.player.y + state.player.h >= state.groundY) {
                    if (!inPit) {
                        if (prevBottom <= state.groundY + 10) {
                            state.player.y = state.groundY - state.player.h;
                            state.player.dy = 0;
                            state.player.jumps = 0;
                        } else {
                            dead = true;
                        }
                    }
                }

                if (state.player.y > LOG_H) {
                    endGame();
                    return;
                }

                for (let i = 0; i < state.obstacles.length; i++) {
                    let obs = state.obstacles[i];
                    
                    if (obs.type === 'pit') {
                        obs.x -= state.speed;
                        continue;
                    }

                    if (obs.type === 'zombie') {
                        obs.x -= (state.speed + 1.2); 
                    } else if (obs.type === 'husk') {
                        obs.x -= (state.speed + 1.2); 
                        
                        // Husk AI: 玩家在地面的時候，主動跳躍越過玩家 (修正只有觸發一次)
                        let dist = obs.x - (state.player.x + state.player.w);
                        if (!obs.hasJumped && dist > 20 && dist < 110 && state.player.y >= state.groundY - 10 && obs.y >= state.groundY - obs.h - 5) {
                            obs.dy = -13.5; // 飛越玩家
                            obs.hasJumped = true; // 標記已跳躍，避免卡在空中
                        }

                        obs.dy += 0.7;
                        obs.y += obs.dy;
                        if (obs.y + obs.h >= state.groundY) {
                            obs.y = state.groundY - obs.h;
                            obs.dy = 0;
                        }
                    } else {
                        obs.x -= state.speed;
                    }

                    if (
                        state.player.x + 8 < obs.x + obs.w - 8 &&
                        state.player.x + state.player.w - 8 > obs.x + 8 &&
                        state.player.y + 5 < obs.y + obs.h - 5 &&
                        state.player.y + state.player.h > obs.y + 5
                    ) {
                        if (obs.type === 'stone') {
                            if (state.player.dy > 0 && prevBottom <= obs.y + 15) {
                                state.player.y = obs.y - state.player.h;
                                state.player.dy = 0;
                                state.player.jumps = 0; 
                                landedOnPlatform = true;
                            } else {
                                dead = true; 
                            }
                        } else if (obs.type === 'zombie' || obs.type === 'husk') {
                            dead = true; 
                        }
                    }
                }

                state.diamonds.forEach(d => {
                    d.x -= state.speed;
                    if (!d.collected &&
                        state.player.x < d.x + d.w &&
                        state.player.x + state.player.w > d.x &&
                        state.player.y < d.y + d.h &&
                        state.player.y + state.player.h > d.y
                    ) {
                        d.collected = true;
                        state.score += 1;
                        setScore(state.score);
                    }
                });

                if (dead) {
                    endGame();
                    return;
                }

                state.frames++;
                
                if (state.frames % 100 === 0 && state.speed < 15) {
                    state.speed += 0.2;
                }

                // 地形生成
                let spawnInterval = Math.max(40, 100 - state.speed * 4);
                const lastObs = state.obstacles[state.obstacles.length - 1];
                if (lastObs && lastObs.type === 'pit') {
                    spawnInterval = Math.max(spawnInterval, Math.floor((lastObs.w / state.speed) + 20));
                }

                if (state.frames - state.lastSpawnFrame > spawnInterval) {
                    if (Math.random() < 0.55) { 
                        state.lastSpawnFrame = state.frames;
                        let rand = Math.random();
                        if (rand < 0.3) {
                            state.obstacles.push({ type: 'stone', x: LOG_W, y: state.groundY - 40, w: 40, h: 40 });
                        } else if (rand < 0.6) {
                            // 坑洞寬度 150 + 150*
                            state.obstacles.push({ type: 'pit', x: LOG_W, y: state.groundY, w: Math.random() * 150 + 150, h: 100 });
                        } else if (rand < 0.8) {
                            state.obstacles.push({ type: 'zombie', x: LOG_W, y: state.groundY - 40, w: 40, h: 40 });
                        } else {
                            state.obstacles.push({ type: 'husk', x: LOG_W, y: state.groundY - 40, w: 40, h: 40, dy: 0, hasJumped: false }); 
                        }
                    }
                }
                
                // 鑽石頻率 400+300*
                if (state.frames % Math.floor(Math.random() * 300 + 400) === 0) {
                    let dY = state.groundY - 50 - Math.random() * 100;
                    state.diamonds.push({ x: LOG_W, y: dY, w: 24, h: 24, collected: false });
                }

                // 渲染
                ctx.clearRect(0, 0, LOG_W, LOG_H);
                
                ctx.fillStyle = '#5A5A5A';
                ctx.fillRect(0, state.groundY, LOG_W, LOG_H - state.groundY);
                ctx.fillStyle = '#4A4A4A'; 
                ctx.fillRect(0, state.groundY, LOG_W, 8);
                
                state.obstacles.forEach(obs => {
                    if (obs.type === 'pit') {
                        ctx.clearRect(obs.x, state.groundY, obs.w, LOG_H - state.groundY);
                    }
                });

                state.obstacles.forEach(obs => {
                    if (obs.type === 'stone') {
                        if (images.current.stone.complete) ctx.drawImage(images.current.stone, obs.x, obs.y, obs.w, obs.h);
                        else { ctx.fillStyle = '#888'; ctx.fillRect(obs.x, obs.y, obs.w, obs.h); }
                    } else if (obs.type === 'zombie') {
                        if (images.current.zombie.complete) ctx.drawImage(images.current.zombie, obs.x, obs.y, obs.w, obs.h);
                        else { ctx.fillStyle = '#005500'; ctx.fillRect(obs.x, obs.y, obs.w, obs.h); }
                    } else if (obs.type === 'husk') {
                        if (images.current.husk.complete) ctx.drawImage(images.current.husk, obs.x, obs.y, obs.w, obs.h);
                        else { ctx.fillStyle = '#b3a172'; ctx.fillRect(obs.x, obs.y, obs.w, obs.h); }
                    }
                });

                state.diamonds.forEach(d => {
                    if (!d.collected) {
                        if (images.current.diamond.complete) ctx.drawImage(images.current.diamond, d.x, d.y, d.w, d.h);
                        else { ctx.fillStyle = '#00ffff'; ctx.fillRect(d.x, d.y, d.w, d.h); }
                    }
                });

                if (images.current.steve.complete) {
                    ctx.drawImage(images.current.steve, state.player.x, state.player.y, state.player.w, state.player.h);
                } else {
                    ctx.fillStyle = '#ffccaa';
                    ctx.fillRect(state.player.x, state.player.y, state.player.w, state.player.h);
                }
                
                ctx.fillStyle = '#8b4513'; 
                ctx.fillRect(state.player.x - 4, state.player.y + state.player.h - 2, state.player.w + 8, 6);
                ctx.fillStyle = '#111'; 
                ctx.fillRect(state.player.x + 2, state.player.y + state.player.h + 4, 8, 8);
                ctx.fillRect(state.player.x + state.player.w - 10, state.player.y + state.player.h + 4, 8, 8);

                state.reqId = requestAnimationFrame(loop);
            };

            const endGame = () => {
                setGameState('gameover');
                if (bgmRef.current) bgmRef.current.pause();
                onGameOver(gameRef.current.score); 
                if (gameRef.current.reqId) cancelAnimationFrame(gameRef.current.reqId);
            };

            return (
                <div className="fixed inset-0 z-[80] bg-black bg-opacity-90 flex flex-col items-center justify-center p-2 sm:p-4">
                    <div className="bg-gray-800 p-2 border-4 border-gray-600 no-round max-w-3xl w-full relative shadow-2xl">
                        <div className="flex justify-between text-white font-bold mb-2 font-mono px-2 text-xl">
                            <span className="flex items-center"><McImg src="https://raw.githubusercontent.com/InventivetalentDev/minecraft-assets/1.20/assets/minecraft/textures/item/diamond.png" fallback="💎" className="w-6 h-6 mr-2 pixelated" /> {score}</span>
                            <button onClick={onQuit} className="text-red-400 hover:text-red-300 transition-colors">✖ 離開</button>
                        </div>
                        
                        <div 
                            className="bg-[#6bc0ff] relative w-full overflow-hidden border-4 border-black" 
                            style={{ height: '350px' }}
                            onMouseDown={(e) => { e.preventDefault(); if(gameState==='playing') jump(); }}
                            onTouchStart={(e) => { e.preventDefault(); if(gameState==='playing') jump(); }}
                        >
                            <canvas ref={canvasRef} style={{ width: '100%', height: '100%' }} className="pixelated block"></canvas>
                            
                            {gameState === 'start' && (
                                <div className="absolute inset-0 flex items-center justify-center bg-black bg-opacity-60">
                                    <button onClick={startGame} className="mc-btn px-8 py-4 text-2xl animate-pulse">🛹 開始跑酷</button>
                                </div>
                            )}
                            
                            {gameState === 'gameover' && (
                                <div className="absolute inset-0 flex flex-col items-center justify-center bg-black bg-opacity-80 text-white">
                                    <h2 className="text-4xl font-black mb-2 text-red-500 drop-shadow-md">GAME OVER</h2>
                                    <p className="mb-8 font-bold text-xl flex items-center">
                                        獲得了 {score} <McImg src="https://raw.githubusercontent.com/InventivetalentDev/minecraft-assets/1.20/assets/minecraft/textures/item/diamond.png" fallback="💎" className="w-6 h-6 ml-2 pixelated" />
                                    </p>
                                    <div className="flex space-x-6">
                                        <button onClick={startGame} className="mc-btn px-6 py-3 text-lg">🔄 再玩</button>
                                        <button onClick={onQuit} className="mc-btn px-6 py-3 text-lg bg-gray-400">🔙 返回</button>
                                    </div>

                        </div>
                        <p className="text-center text-gray-400 text-sm mt-3 font-bold tracking-widest leading-relaxed">
                            點擊/觸控以跳躍 (可二段跳) <br/>

        }

        function MinecraftDashboard({ user, userProfile, showAlert }) {
            const [leaderboard, setLeaderboard] = useState([]);
            const [showMiniGame, setShowMiniGame] = useState(false);
            
            const mcData = userProfile.mcData || { diamonds: 0, level: 1, exp: 0, hunger: 10, items: [], cats: 0, lastCheckIn: null };
            const expToNextLevel = mcData.level * 20;

            useEffect(() => {
                const fetchLeaderboard = async () => {
                    const friendUids = (userProfile.friends || []).map(f => f.uid);
                    if (friendUids.length === 0) {
                        setLeaderboard([{ name: userProfile.displayName, ...mcData, isMe: true }]);
                        return;
                    }
                    try {
                        const board = [{ name: userProfile.displayName, ...mcData, isMe: true }];
                        const promises = friendUids.map(uid => db.collection('users').doc(uid).get());
                        const results = await Promise.all(promises);
                        
                        results.forEach(doc => {
                            if (doc.exists) {
                                const data = doc.data();
                                if (data.mcData) {
                                    board.push({ name: data.displayName, ...data.mcData, isMe: false });
                                }
                            }
                        });
                        
                        board.sort((a, b) => {
                            if (b.level !== a.level) return b.level - a.level;
                            return b.exp - a.exp;
                        });
                        
                        setLeaderboard(board);
                    } catch (e) {
                        console.error("讀取排行榜失敗", e);
                    }
                };
                fetchLeaderboard();
            }, [userProfile.friends, mcData]);

            const updateMcData = (updates, silent = false) => {
                db.collection('users').doc(user.uid).update({
                    mcData: { ...mcData, ...updates }
                }).catch(e => {
                    if (!silent) showAlert('更新失敗：' + e.message);
                });
            };

            const handleCheckIn = () => {
                const today = new Date().toISOString().split('T')[0];
                if (mcData.lastCheckIn === today) {
                    return showAlert("今日已經簽到過囉！");
                }
                
                let newHunger = mcData.hunger - 2; 
                if (newHunger < 0) newHunger = 0;

                updateMcData({ 
                    diamonds: mcData.diamonds + 20, 
                    exp: mcData.exp + 10,
                    hunger: newHunger,
                    lastCheckIn: today 
                });
                showAlert("✅ 簽到成功！獲得 20 💎 與 10 EXP\n(史蒂夫消耗了 2 點飽食度)");
            };

            const handleBuy = (item, cost, type) => {
                if (mcData.diamonds < cost) {
                    return showAlert(`鑽石不夠喔！需要 ${cost} 💎`);
                }

                let updates = { diamonds: mcData.diamonds - cost };

                if (type === 'food') {
                    if (mcData.hunger >= 10) return showAlert("史蒂夫現在很飽了！");
                    updates.hunger = Math.min(10, mcData.hunger + 3);
                    showAlert("🍎 史蒂夫吃下了蘋果，飽食度 +3！");
                } else if (type === 'cat') {
                    updates.cats = (mcData.cats || 0) + 1;
                    showAlert("🐱 成功收編！一隻鼻子有可愛斑點的小貓加入了你的家！");
                } else if (type === 'sword') {
                    let newExp = mcData.exp + 50;
                    let newLevel = mcData.level;
                    if (newExp >= newLevel * 20) {
                        newExp -= newLevel * 20;
                        newLevel += 1;
                        showAlert("🗡️ 獲得鑽石劍！經驗大增，恭喜升級！");
                    } else {
                        showAlert("🗡️ 獲得鑽石劍！獲得 50 經驗！");
                    }
                    updates.exp = newExp;
                    updates.level = newLevel;
                    updates.items = [...(mcData.items || []), '鑽石劍'];
                }

                updateMcData(updates);
            };

            const handleGameOver = (score) => {
                let reward = score * 2; 
                let newExp = mcData.exp + score;
                let newLevel = mcData.level;
                
                while (newExp >= newLevel * 20) {
                    newExp -= newLevel * 20;
                    newLevel += 1;
                }

                let newHunger = mcData.hunger - 1;
                if (newHunger < 0) newHunger = 0;

                updateMcData({
                    diamonds: mcData.diamonds + reward,
                    exp: newExp,
                    level: newLevel,
                    hunger: newHunger
                });
                
                if (reward > 0) showAlert(`🎮 遊戲結束！\n獲得 ${reward} 💎 與 ${score} EXP`);
            };

            const imgSteve = "https://minotar.net/helm/Steve/64.png";

                        <div className="md:col-span-2 space-y-6">
                            <div className="mc-ui p-4 flex items-center justify-between">
                                <div className="flex items-center space-x-4">
                                    <div className="bg-black p-1 border-2 border-gray-500">
                                        <McImg src={imgSteve} fallback="🧍‍♂️" className="w-12 h-12 pixelated" />
                                    </div>
                                    <div>
                                        <h3 className="font-bold text-lg">{userProfile.displayName}</h3>
                                        <p className="text-sm font-bold text-green-700">LV.{mcData.level}</p>
                                    </div>
                                </div>
                                <div className="flex flex-col items-end">
                                    <div className="flex items-center space-x-2 text-lg font-bold">
                                        <span>{mcData.diamonds}</span>
                                        <McImg src={imgDiamond} fallback="💎" className="w-6 h-6 pixelated" />
                                    </div>
                                    <div className="w-32 h-3 bg-gray-800 mt-2 border border-gray-500 relative">
                                        <div className="h-full bg-green-500" style={{ width: `${(mcData.exp / expToNextLevel) * 100}%` }}></div>
                                        <span className="absolute inset-0 flex items-center justify-center text-[8px] text-white font-mono drop-shadow-md">EXP {mcData.exp}/{expToNextLevel}</span>
                                    </div>
                                    <div className="mt-1 flex space-x-0.5">
                                        {Array.from({ length: 10 }).map((_, i) => (
                                            <span key={i} className="text-xs">{i < mcData.hunger / 2 ? '🍖' : '🦴'}</span>
                                        ))}
                                    </div>
                                </div>
                            </div>

                            <div className="mc-ui p-4">
                                <h2 className="border-b-2 border-gray-500 pb-2 mb-4 font-bold flex justify-between items-center">
                                    <span>🏡 你的家</span>
                                    <button onClick={() => setShowMiniGame(true)} className="bg-blue-600 hover:bg-blue-500 text-white text-xs px-3 py-1 border-2 border-blue-800 font-bold transition-colors">
                                        🛹 玩滑板遊戲
                                    </button>
                                </h2>
                                <div className="text-center p-6 mc-bg border-4 border-gray-800 mb-4 h-36 flex flex-col items-center justify-center relative overflow-hidden shadow-inner">
                                    <McImg src={imgSteve} fallback="🧍‍♂️" className="w-16 h-16 pixelated shadow-lg border border-black" />
                                    <div className="flex space-x-2 text-2xl absolute bottom-2 right-2">
                                        {Array.from({ length: mcData.cats || 0 }).map((_, i) => <span key={i} title="斑點貓">🐱</span>)}
                                        {(mcData.items || []).includes('鑽石劍') && <McImg src={imgSword} fallback="🗡️" className="w-8 h-8 pixelated drop-shadow-md" />}
                                    </div>
                                </div>
                                <button onClick={handleCheckIn} className="mc-btn w-full py-2 flex justify-center items-center">
                                    📅 每日簽到 (+20 <McImg src={imgDiamond} fallback="💎" className="w-4 h-4 mx-1 pixelated"/>)
                                </button>
                            </div>

                            <div className="mc-panel-dark text-white">
                                <h2 className="border-b-2 border-gray-600 pb-2 mb-4 font-bold text-gray-300">🛒 商店</h2>
                                <div className="space-y-3">
                                    <button onClick={() => handleBuy('apple', 10, 'food')} className="mc-btn w-full py-2 flex justify-between px-4 items-center">
                                        <span className="flex items-center"><McImg src={imgApple} fallback="🍎" className="w-5 h-5 mr-2 pixelated"/> 蘋果 (回覆飽食度)</span>
                                        <span className="text-blue-800">10 💎</span>

                                    <button onClick={() => handleBuy('cat', 500, 'cat')} className="mc-btn w-full py-2 flex justify-between px-4 items-center">
                                        <span>🐱 領養斑點貓 (裝飾)</span>
                                        <span className="text-blue-800">500 💎</span>
                                    </button>
                                    {!(mcData.items || []).includes('鑽石劍') && (
                                        <button onClick={() => handleBuy('sword', 1000, 'sword')} className="mc-btn w-full py-2 flex justify-between px-4 items-center">
                                            <span className="flex items-center"><McImg src={imgSword} fallback="🗡️" className="w-5 h-5 mr-2 pixelated"/> 鑽石劍 (+50 EXP)</span>
                                            <span className="text-blue-800">1000 💎</span>
                                        </button>
                                    )}

                        <div className="mc-ui p-4 h-[600px] flex flex-col">

                            <div className="flex-1 overflow-y-auto custom-scrollbar pr-2 space-y-3">
                                {leaderboard.map((user, idx) => (
                                    <div key={idx} className={`p-3 border-2 flex items-center justify-between ${user.isMe ? 'border-green-500 bg-green-100 dark:bg-green-900' : 'border-gray-400 bg-gray-200 dark:bg-gray-700 dark:text-white'}`}>
