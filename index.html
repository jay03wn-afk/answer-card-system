<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JJay線上測驗 - 專業雙螢幕版</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

    <style>
        .no-round { border-radius: 2px !important; }
        .break-avoid { break-inside: avoid; }
        
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        input, textarea, button { font-size: 16px !important; }
        
        /* 鎖定狀態動畫與樣式 */
        .locked-btn { cursor: not-allowed; opacity: 0.5; filter: grayscale(100%); }

        /* Quill 編輯器客製化樣式 */
        .ql-toolbar.ql-snow { border-radius: 2px 2px 0 0 !important; border-color: #d1d5db !important; background: #f9fafb; }
        .ql-container.ql-snow { border-radius: 0 0 2px 2px !important; border-color: #d1d5db !important; font-family: inherit; font-size: 16px; }
        .ql-editor { min-height: 200px; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans h-[100dvh] overflow-hidden">
    <div id="root" class="h-full"></div>

    <script type="text/babel">
        const firebaseConfig = {
            apiKey: "AIzaSyBAGM92NBQnUlI1gnLRK-mufM6YtDq5sHk",
            authDomain: "anser-card.firebaseapp.com",
            projectId: "anser-card",
            messagingSenderId: "224666683961",
            appId: "1:224666683961:web:351991d6cbc8543b181be8"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const { useState, useEffect, useRef } = React;

        const handleFocusScroll = (e) => {
            const target = e.target;
            setTimeout(() => {
                target.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 300);
        };

        const getEmbedUrl = (url) => {
            if (!url) return '';
            try {
                const driveRegex = /\/file\/d\/([a-zA-Z0-9_-]+)/;
                const match = url.match(driveRegex);
                if (match && match[1]) return `https://drive.google.com/file/d/${match[1]}/preview`;
                return url;
            } catch(e) { return url; }
        };

        const formatTime = (seconds) => {
            if (seconds == null || seconds < 0) return '00:00';
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        };

        // Quill 文字編輯器元件
        function QuillEditor({ value, onChange, readOnly }) {
            const editorRef = useRef(null);
            const quillRef = useRef(null);
            const valueRef = useRef(value);

            useEffect(() => {
                if (editorRef.current && !quillRef.current) {
                    quillRef.current = new window.Quill(editorRef.current, {
                        theme: 'snow',
                        readOnly: readOnly,
                        modules: {
                            toolbar: readOnly ? false : [
                                [{ 'header': [1, 2, 3, false] }],
                                ['bold', 'italic', 'underline', 'strike'],
                                [{ 'color': [] }, { 'background': [] }],
                                [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                                ['clean']
                            ]
                        }
                    });

                    if (valueRef.current) {
                        quillRef.current.clipboard.dangerouslyPasteHTML(valueRef.current);
                    }

                    quillRef.current.on('text-change', () => {
                        onChange(quillRef.current.root.innerHTML);
                    });
                }
            }, [readOnly, onChange]);

            return (
                <div className="flex flex-col h-full w-full bg-white relative z-0">
                    <div ref={editorRef} className={`flex-grow overflow-y-auto ${readOnly ? 'border-none' : ''}`}></div>
                </div>
            );
        }

        function DialogOverlay({ dialog, onClose }) {
            const [inputValue, setInputValue] = useState('');
            
            useEffect(() => {
                if (dialog && dialog.type === 'prompt') setInputValue(dialog.defaultValue || '');
            }, [dialog]);

            if (!dialog) return null;

            const handleConfirm = () => {
                if (dialog.onConfirm) {
                    if (dialog.type === 'prompt') dialog.onConfirm(inputValue);
                    else dialog.onConfirm();
                }
                onClose();
            };

            return (
                <div className="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-[70] p-4">
                    <div className="bg-white p-6 w-full max-w-sm no-round shadow-2xl transform transition-all">
                        <h3 className="font-bold text-lg mb-3 flex items-center">
                            {dialog.type === 'alert' ? 'ℹ️ 系統提示' : '🤔 請確認'}
                        </h3>
                        <p className="mb-5 text-gray-600 text-sm whitespace-pre-wrap leading-relaxed">{dialog.message}</p>
                        
                        {dialog.type === 'prompt' && (
                            <input 
                                type="text" 
                                className="w-full mb-5 p-3 border border-gray-300 no-round outline-none focus:border-black text-sm" 
                                value={inputValue} 
                                onChange={e => setInputValue(e.target.value)} 
                                autoFocus 
                            />
                        )}
                        
                        <div className="flex justify-end space-x-3 mt-2 border-t border-gray-100 pt-4">
                            {(dialog.type === 'confirm' || dialog.type === 'prompt') && (
                                <button onClick={onClose} className="bg-gray-100 text-gray-600 px-5 py-2 no-round font-bold text-sm hover:bg-gray-200 transition-colors">
                                    取消
                                </button>
                            )}
                            <button onClick={handleConfirm} className="bg-black text-white px-5 py-2 no-round font-bold text-sm hover:bg-gray-800 transition-colors">
                                確定
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        function AuthScreen({ showAlert }) {
            const [isSignUp, setIsSignUp] = useState(false);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);

            const handleAuth = (e) => {
                e.preventDefault();
                setLoading(true);
                const request = isSignUp 
                    ? auth.createUserWithEmailAndPassword(email, password)
                    : auth.signInWithEmailAndPassword(email, password);
                
                request.then((cred) => {
                    if (isSignUp) {
                        return db.collection('users').doc(cred.user.uid).set({ email: email.toLowerCase(), friends: [], unreadChats: {} })
                          .catch(err => showAlert("註冊成功，但建立資料庫檔案失敗: " + err.message));
                    }
                })
                .catch(err => showAlert('認證失敗：' + err.message))
                .finally(() => setLoading(false));
            };

            return (
                <div className="flex h-full items-center justify-center p-4 overflow-y-auto">
                    <form onSubmit={handleAuth} className="bg-white p-8 shadow-md w-full max-w-sm no-round border border-gray-200">
                        <div className="w-16 h-16 bg-black text-white rounded-full flex items-center justify-center mx-auto mb-4 border border-gray-300">
                            <span className="text-3xl font-black">📝</span>
                        </div>
                        <h1 className="text-xl font-bold mb-6 tracking-tight text-center">JJay線上測驗</h1>
                        <input type="email" placeholder="電子郵件" className="w-full mb-3 p-3 border border-gray-300 no-round outline-none focus:border-black" value={email} onChange={e => setEmail(e.target.value)} onFocus={handleFocusScroll} required />
                        <input type="password" placeholder="密碼" className="w-full mb-6 p-3 border border-gray-300 no-round outline-none focus:border-black" value={password} onChange={e => setPassword(e.target.value)} onFocus={handleFocusScroll} required />
                        <button type="submit" className="w-full bg-black text-white p-3 font-bold no-round hover:bg-gray-800 transition-colors" disabled={loading}>{loading ? '處理中...' : (isSignUp ? '註冊' : '登入')}</button>
                        <button type="button" onClick={() => setIsSignUp(!isSignUp)} className="w-full mt-4 text-sm text-gray-500 hover:text-black">{isSignUp ? '已有帳號？前往登入' : '沒有帳號？前往註冊'}</button>
                    </form>
                </div>
            );
        }

        function ProfileSetup({ user, onComplete, showAlert }) {
            const [name, setName] = useState('');
            const saveProfile = () => {
                if(!name.trim()) return showAlert('請輸入社群暱稱！');
                db.collection('users').doc(user.uid).set({ displayName: name.trim() }, { merge: true })
                  .then(() => onComplete(name.trim()))
                  .catch(e => showAlert('設定失敗：' + e.message));
            };
            return (
                <div className="flex h-full items-center justify-center p-4 bg-gray-50 overflow-y-auto">
                    <div className="bg-white p-8 shadow-md w-full max-w-sm no-round border border-gray-200 text-center">
                        <h2 className="text-xl font-bold mb-4">歡迎加入！請設定你的社群暱稱</h2>
                        <input type="text" placeholder="例如：藥神、JJay..." className="w-full mb-6 p-3 border border-gray-300 no-round outline-none focus:border-black text-center" value={name} onChange={e => setName(e.target.value)} onFocus={handleFocusScroll} />
                        <button onClick={saveProfile} className="w-full bg-black text-white p-3 font-bold no-round hover:bg-gray-800">完成設定</button>
                    </div>
                </div>
            );
        }

        function SocialDashboard({ user, userProfile, showAlert }) {
            const [friends, setFriends] = useState(userProfile.friends || []);
            const [searchEmail, setSearchEmail] = useState('');
            const [activeChat, setActiveChat] = useState(null);
            const [messages, setMessages] = useState([]);
            const [newMessage, setNewMessage] = useState('');
            const messagesEndRef = useRef(null);

            useEffect(() => {
                const unsub = db.collection('users').doc(user.uid).onSnapshot(doc => {
                    if(doc.exists && doc.data().friends) setFriends(doc.data().friends);
                });
                return () => unsub();
            }, [user.uid]);

            const getChatId = (uid1, uid2) => [uid1, uid2].sort().join('_');

            useEffect(() => {
                if (activeChat && userProfile && userProfile.unreadChats && userProfile.unreadChats[activeChat.uid]) {
                    db.collection('users').doc(user.uid).update({
                        [`unreadChats.${activeChat.uid}`]: firebase.firestore.FieldValue.delete()
                    }).catch(e => console.error("清除紅點失敗", e));
                }
            }, [activeChat, userProfile, user.uid]);

            useEffect(() => {
                if(!activeChat) return;
                const chatId = getChatId(user.uid, activeChat.uid);
                const unsub = db.collection('chats').doc(chatId).collection('messages')
                    .orderBy('timestamp', 'asc')
                    .onSnapshot(snapshot => {
                        setMessages(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                        setTimeout(() => {
                            if (messagesEndRef.current) {
                                messagesEndRef.current.scrollIntoView({ behavior: "smooth" });
                            }
                        }, 100);
                    });
                return () => unsub();
            }, [activeChat, user.uid]);

            const handleAddFriend = () => {
                const cleanEmail = searchEmail.trim().toLowerCase();
                if(!cleanEmail) return;
                if(cleanEmail === user.email.toLowerCase()) return showAlert('不能加自己為好友！');
                
                db.collection('users').where('email', '==', cleanEmail).get()
                .then(snap => {
                    if(snap.empty) return showAlert('找不到此信箱的使用者 (請確認對方已登入過系統)');
                    const targetUser = snap.docs[0];
                    const targetData = targetUser.data();
                    const targetUid = targetUser.id;
                    
                    if(friends.find(f => f.uid === targetUid)) return showAlert('已經是好友了！');

                    const batch = db.batch();
                    batch.update(db.collection('users').doc(user.uid), {
                        friends: firebase.firestore.FieldValue.arrayUnion({ uid: targetUid, name: targetData.displayName, email: targetData.email })
                    });
                    batch.update(db.collection('users').doc(targetUid), {
                        friends: firebase.firestore.FieldValue.arrayUnion({ uid: user.uid, name: userProfile.displayName, email: user.email })
                    });
                    
                    return batch.commit().then(() => {
                        showAlert(`已成功加入 ${targetData.displayName}！`);
                        setSearchEmail('');
                    });
                }).catch(e => showAlert('加入失敗：' + e.message));
            };

            const sendMessage = (e) => {
                e.preventDefault();
                if(!newMessage.trim() || !activeChat) return;
                const chatId = getChatId(user.uid, activeChat.uid);
                db.collection('chats').doc(chatId).collection('messages').add({
                    text: newMessage.trim(),
                    senderId: user.uid,
                    senderName: userProfile.displayName,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    type: 'text'
                }).then(() => {
                    setNewMessage('');
                    db.collection('users').doc(activeChat.uid).set({
                        unreadChats: { [user.uid]: true }
                    }, { merge: true });
                });
            };

            const playRPS = () => {
                if(!activeChat) return;
                const choices = [
                    { face: '✊', name: '石頭' },
                    { face: '✌️', name: '剪刀' },
                    { face: '✋', name: '布' }
                ];
                const result = choices[Math.floor(Math.random() * choices.length)];
                const chatId = getChatId(user.uid, activeChat.uid);
                
                db.collection('chats').doc(chatId).collection('messages').add({
                    text: `出了 ${result.name}！`,
                    senderId: user.uid,
                    senderName: userProfile.displayName,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    type: 'game_rps',
                    rpsFace: result.face
                }).then(() => {
                    db.collection('users').doc(activeChat.uid).set({
                        unreadChats: { [user.uid]: true }
                    }, { merge: true });
                });
            };

            const downloadSharedQuiz = (quizData) => {
                let originalData;
                db.collection('users').doc(quizData.ownerId).collection('quizzes').doc(quizData.quizId).get()
                .then(doc => {
                    if(!doc.exists) throw new Error('該試卷已失效或被擁有者刪除！');
                    originalData = doc.data();
                    const emptyAnswers = Array(Number(originalData.numQuestions)).fill('');
                    const emptyStarred = Array(Number(originalData.numQuestions)).fill(false);
                    
                    return db.collection('users').doc(user.uid).collection('quizzes').add({
                        testName: originalData.testName + ' (來自好友)',
                        numQuestions: originalData.numQuestions,
                        questionType: originalData.questionType || 'url',
                        questionFileUrl: originalData.questionFileUrl || '',
                        questionContent: originalData.questionContent || '',
                        correctAnswersInput: originalData.correctAnswersInput || '', 
                        userAnswers: emptyAnswers,
                        starred: emptyStarred,
                        hasTimer: originalData.hasTimer || false,
                        timeLimit: originalData.timeLimit || null,
                        timeRemaining: originalData.hasTimer ? (originalData.timeLimit * 60) : null,
                        isShared: true, 
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                })
                .then(newDocRef => {
                    return db.collection('users').doc(quizData.ownerId).collection('quizzes').doc(quizData.quizId).update({
                        sharedTo: firebase.firestore.FieldValue.arrayUnion({ uid: user.uid, quizId: newDocRef.id })
                    });
                })
                .then(() => showAlert('✅ 已成功存入！\n請回到「我的題庫」查看並開始作答。'))
                .catch(e => {
                    if (e.message === '該試卷已失效或被擁有者刪除！') showAlert(e.message);
                    else showAlert('下載失敗：'+e.message);
                });
            };

            return (
                <div className="max-w-6xl mx-auto p-4 pt-0 grid grid-cols-1 md:grid-cols-3 gap-6 h-[calc(100dvh-100px)]">
                    <div className="bg-white border border-gray-200 shadow-sm no-round flex flex-col h-full overflow-hidden">
                        <div className="p-4 border-b border-gray-100 bg-gray-50 shrink-0">
                            <h2 className="font-bold mb-3">加入好友</h2>
                            <div className="flex space-x-2">
                                <input type="email" placeholder="輸入好友信箱..." className="flex-grow p-2 text-sm border border-gray-300 no-round outline-none" value={searchEmail} onChange={e=>setSearchEmail(e.target.value)} onFocus={handleFocusScroll} />
                                <button onClick={handleAddFriend} className="bg-black text-white px-3 py-2 no-round text-sm font-bold hover:bg-gray-800 transition-colors">加入</button>
                            </div>
                        </div>
                        <div className="flex-grow overflow-y-auto p-2 custom-scrollbar">
                            {friends.length === 0 ? <p className="text-center text-gray-400 text-sm mt-10">尚無好友，趕快新增吧！</p> : null}
                            {friends.map(f => (
                                <div key={f.uid} onClick={() => setActiveChat(f)} className={`p-3 border-b border-gray-50 cursor-pointer hover:bg-gray-50 transition-colors flex items-center space-x-3 ${activeChat && activeChat.uid === f.uid ? 'bg-orange-50 border-orange-100' : ''}`}>
                                    <div className="w-10 h-10 bg-gray-200 rounded-full flex items-center justify-center font-bold text-gray-500 shrink-0">{f.name.charAt(0)}</div>
                                    <div className="flex-grow overflow-hidden">
                                        <div className="font-bold text-sm truncate">{f.name}</div>
                                        <div className="text-xs text-gray-400 truncate">{f.email}</div>
                                    </div>
                                    {userProfile && userProfile.unreadChats && userProfile.unreadChats[f.uid] && (
                                        <div className="w-2.5 h-2.5 bg-red-500 rounded-full shrink-0"></div>
                                    )}
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="md:col-span-2 bg-white border border-gray-200 shadow-sm no-round flex flex-col h-full overflow-hidden">
                        {activeChat ? (
                            <>
                                <div className="p-4 border-b border-gray-200 font-bold flex items-center space-x-2 shrink-0 bg-white">
                                    <span className="text-xl">💬</span>
                                    <span>與 {activeChat.name} 的聊天室</span>
                                </div>
                                <div className="flex-grow overflow-y-auto p-4 space-y-4 bg-gray-50 custom-scrollbar">
                                    {messages.map(msg => {
                                        const isMe = msg.senderId === user.uid;
                                        return (
                                            <div key={msg.id} className={`flex ${isMe ? 'justify-end' : 'justify-start'}`}>
                                                <div className={`max-w-[70%] p-3 text-sm no-round ${isMe ? 'bg-black text-white' : 'bg-white border border-gray-200 text-black shadow-sm'}`}>
                                                    {(() => {
                                                        if (msg.type === 'game_rps') {
                                                            return (
                                                                <div className="text-center py-2 px-4">
                                                                    <span className="text-5xl leading-none">{msg.rpsFace}</span>
                                                                    <p className="mt-2 font-bold">{msg.text}</p>
                                                                </div>
                                                            );
                                                        } else if (msg.type === 'score_share') {
                                                            return (
                                                                <div className="text-center px-2 py-1">
                                                                    <p className={`mb-2 font-bold ${isMe ? 'text-yellow-300' : 'text-yellow-600'}`}>🏆 戰績炫耀</p>
                                                                    <p className="mb-1 text-sm font-bold truncate">{msg.scoreData?.testName}</p>
                                                                    <h3 className={`text-3xl font-black mb-1 ${isMe ? 'text-white' : 'text-red-600'}`}>{msg.scoreData?.score} 分</h3>
                                                                    <p className={`text-xs ${isMe ? 'text-gray-300' : 'text-gray-500'}`}>答對 {msg.scoreData?.correctCount} / {msg.scoreData?.total} 題</p>
                                                                </div>
                                                            );
                                                        } else if (msg.type === 'quiz_share') {
                                                            return (
                                                                <div className="text-center">
                                                                    <p className="mb-2 font-bold text-orange-400">📝 分享了一份試卷</p>
                                                                    <p className="mb-3 font-bold">{msg.quizData?.testName || '未命名試卷'}</p>
                                                                    {!isMe && msg.quizData && (
                                                                        <button onClick={() => downloadSharedQuiz(msg.quizData)} className="bg-white text-black px-4 py-1.5 no-round font-bold text-xs border border-gray-200 hover:bg-gray-100 w-full transition-colors">下載試卷</button>
                                                                    )}
                                                                </div>
                                                            );
                                                        } else {
                                                            return <p>{msg.text || '未知訊息'}</p>;
                                                        }
                                                    })()}
                                                </div>
                                            </div>
                                        )
                                    })}
                                    <div ref={messagesEndRef} />
                                </div>
                                <form onSubmit={sendMessage} className="p-3 border-t border-gray-200 flex space-x-2 bg-white shrink-0 items-center">
                                    <button type="button" onClick={playRPS} className="bg-gray-100 text-xl px-4 py-2 no-round border border-gray-300 hover:bg-gray-200 transition-colors" title="猜拳決勝負">✌️</button>
                                    <input type="text" placeholder="輸入訊息..." className="flex-grow p-2 border border-gray-300 no-round outline-none" value={newMessage} onChange={e=>setNewMessage(e.target.value)} onFocus={handleFocusScroll} />
                                    <button type="submit" className="bg-black text-white px-5 py-2 no-round font-bold hover:bg-gray-800 transition-colors">傳送</button>
                                </form>
                            </>
                        ) : (
                            <div className="flex-grow flex items-center justify-center text-gray-400 font-bold bg-gray-50">請從左側選擇好友開始聊天</div>
                        )}
                    </div>
                </div>
            );
        }

        function Dashboard({ user, userProfile, onStartNew, onContinueQuiz, showAlert, showConfirm }) {
            const [records, setRecords] = useState([]);
            const [loading, setLoading] = useState(true);
            const [showShareModal, setShowShareModal] = useState(null);

            useEffect(() => {
                const unsubscribe = db.collection('users').doc(user.uid).collection('quizzes')
                    .orderBy('createdAt', 'desc')
                    .onSnapshot(snapshot => {
                        setRecords(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                        setLoading(false);
                    }, err => {
                        console.error(err);
                        setLoading(false);
                    });
                return () => unsubscribe();
            }, [user]);

            const handleDelete = (id) => {
                showConfirm("確定要刪除這筆紀錄嗎？資料將無法恢復！", () => {
                    db.collection('users').doc(user.uid).collection('quizzes').doc(id).delete()
                    .catch(error => showAlert('刪除失敗：' + error.message));
                });
            }

            const shareToFriend = (friend) => {
                const chatId = [user.uid, friend.uid].sort().join('_');
                db.collection('chats').doc(chatId).collection('messages').add({
                    senderId: user.uid,
                    senderName: userProfile.displayName,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    type: 'quiz_share',
                    quizData: {
                        ownerId: user.uid,
                        quizId: showShareModal.id,
                        testName: showShareModal.testName,
                        questionType: showShareModal.questionType || 'url',
                        questionFileUrl: showShareModal.questionFileUrl || '',
                        questionContent: showShareModal.questionContent || '',
                        correctAnswersInput: showShareModal.correctAnswersInput || ''
                    }
                }).then(() => {
                    db.collection('users').doc(friend.uid).set({
                        unreadChats: { [user.uid]: true }
                    }, { merge: true });
                    showAlert('✅ 已成功分享給 ' + friend.name + '！');
                    setShowShareModal(null);
                }).catch(e => showAlert('分享失敗：' + e.message));
            };

            return (
                <div className="max-w-6xl mx-auto p-4 pt-0 h-[calc(100dvh-100px)] overflow-y-auto custom-scrollbar">
                    <div className="flex justify-between items-center mb-6 border-b-2 border-black pb-2 shrink-0">
                        <h1 className="text-2xl font-black">我的題庫</h1>
                        <button onClick={onStartNew} className="bg-black text-white px-6 py-2 no-round font-bold hover:bg-gray-800 shadow-sm transition-colors">+ 新測驗</button>
                    </div>

                    {loading ? (
                        <div className="text-center text-gray-500 py-10 font-bold animate-pulse">讀取雲端資料中...</div>
                    ) : records.length === 0 ? (
                        <div className="bg-white text-center text-gray-500 py-16 border border-gray-200 no-round shadow-sm">尚無測驗紀錄，點擊右上方按鈕開始！</div>
                    ) : (
                        <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6 pb-10">
                            {records.map(rec => (
                                <div key={rec.id} className="bg-white border border-gray-200 p-6 no-round shadow-sm hover:shadow-md transition-shadow flex flex-col justify-between">
                                    <div>
                                        <div className="flex justify-between items-start mb-2">
                                            <h2 className="font-bold text-lg leading-tight truncate pr-2">
                                                {rec.testName || '未命名測驗'}
                                                {rec.isShared && <span className="ml-2 text-xs bg-orange-100 text-orange-800 px-2 py-0.5 no-round align-middle">好友分享</span>}
                                            </h2>
                                            {rec.results && (
                                                <span className={`text-2xl font-black px-2 py-1 ml-2 shrink-0 ${rec.results.score >= 60 ? 'text-green-600' : 'text-red-600'}`}>{rec.results.score}</span>
                                            )}
                                        </div>
                                        <p className="text-xs text-gray-400 mb-4">{rec.createdAt ? rec.createdAt.toDate().toLocaleString('zh-TW') : ''}</p>
                                        <div className="text-sm text-gray-600 space-y-1 mb-6">
                                            <p>題數：{rec.numQuestions || 0}</p>
                                            {rec.results ? (
                                                <p>狀態：✅ 已完成 (答對 {rec.results.correctCount}/{rec.results.total})</p>
                                            ) : (
                                                <p className="text-orange-600 font-bold">狀態：📝 作答中 (已填 {rec.userAnswers.filter(a=>a).length})</p>
                                            )}
                                        </div>
                                    </div>
                                    <div className="flex justify-between items-center border-t pt-4 border-gray-100">
                                        <div className="space-x-3">
                                            <button onClick={() => handleDelete(rec.id)} className="text-xs text-gray-400 hover:text-red-600 hover:underline transition-colors">刪除</button>
                                            <button onClick={() => setShowShareModal(rec)} className="text-xs text-blue-500 hover:text-blue-700 font-bold transition-colors">📤 分享</button>
                                        </div>
                                        <button onClick={() => onContinueQuiz(rec)} className="bg-gray-100 px-5 py-2 no-round font-bold border border-gray-200 hover:bg-gray-200 text-sm shrink-0 transition-colors">{rec.results ? '查看詳情' : '繼續作答'}</button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    {showShareModal && (
                        <div className="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 p-4">
                            <div className="bg-white p-6 w-full max-w-sm no-round shadow-xl">
                                <h3 className="font-bold text-lg mb-4">選擇要分享的好友</h3>
                                <div className="max-h-60 overflow-y-auto mb-4 border border-gray-200 custom-scrollbar">
                                    {(userProfile.friends || []).length === 0 ? <p className="p-4 text-sm text-gray-400">目前還沒有好友喔</p> : null}
                                    {(userProfile.friends || []).map(f => (
                                        <button key={f.uid} onClick={() => shareToFriend(f)} className="w-full text-left p-3 hover:bg-gray-50 border-b border-gray-100 font-bold text-sm transition-colors">
                                            {f.name} <span className="text-gray-400 font-normal ml-2">{f.email}</span>
                                        </button>
                                    ))}
                                </div>
                                <button onClick={() => setShowShareModal(null)} className="w-full bg-gray-100 text-black p-2 font-bold no-round hover:bg-gray-200 transition-colors">取消</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function QuizApp({ currentUser, userProfile, activeQuizRecord, onBackToDashboard, showAlert, showConfirm, showPrompt }) {
            const initialRecord = activeQuizRecord || {};
            
            const [quizId, setQuizId] = useState(initialRecord.id || null);
            const [step, setStep] = useState(initialRecord.results ? 'results' : (initialRecord.id ? 'answering' : 'setup'));
            const [testName, setTestName] = useState(initialRecord.testName || '');
            const [numQuestions, setNumQuestions] = useState(initialRecord.numQuestions || 50);
            const [userAnswers, setUserAnswers] = useState(initialRecord.userAnswers || []);
            const [starred, setStarred] = useState(initialRecord.starred || []);
            const [correctAnswersInput, setCorrectAnswersInput] = useState(initialRecord.correctAnswersInput || '');
            const [results, setResults] = useState(initialRecord.results || null);
            
            const [questionType, setQuestionType] = useState(initialRecord.questionType || 'url');
            const [questionFileUrl, setQuestionFileUrl] = useState(initialRecord.questionFileUrl || '');
            const [questionContent, setQuestionContent] = useState(initialRecord.questionContent || '');
            
            const isShared = initialRecord.isShared === true;
            
            const [hasTimer, setHasTimer] = useState(initialRecord.hasTimer || false);
            const [timeLimit, setTimeLimit] = useState(initialRecord.timeLimit || 60);
            const timeRemainingRef = useRef(initialRecord.timeRemaining ?? (initialRecord.timeLimit ? initialRecord.timeLimit * 60 : null));
            const [displayTime, setDisplayTime] = useState(timeRemainingRef.current);
            const [isTimeUp, setIsTimeUp] = useState(hasTimer && timeRemainingRef.current <= 0);
            const [syncTrigger, setSyncTrigger] = useState(0);

            const [layoutMode, setLayoutMode] = useState('horizontal'); 
            const [splitRatio, setSplitRatio] = useState(50);
            const [isDragging, setIsDragging] = useState(false);
            const [previewOpen, setPreviewOpen] = useState(true);
            const splitContainerRef = useRef(null);

            const [showOnlyWrong, setShowOnlyWrong] = useState(false);
            const [showOnlyStarred, setShowOnlyStarred] = useState(false);
            const [showShareScoreModal, setShowShareScoreModal] = useState(false);

            const [showTextEditorModal, setShowTextEditorModal] = useState(false);
            const [tempTextContent, setTempTextContent] = useState('');

            const starredIndices = starred.map((s, i) => s ? i + 1 : null).filter(Boolean);
            const hasPreviewContent = (questionType === 'url' && questionFileUrl) || (questionType === 'text' && questionContent);

            useEffect(() => {
                let timerId;
                if (step === 'answering' && hasTimer && !isTimeUp) {
                    timerId = setInterval(() => {
                        if (timeRemainingRef.current > 0) {
                            timeRemainingRef.current -= 1;
                            setDisplayTime(timeRemainingRef.current);
                            
                            if (timeRemainingRef.current % 15 === 0) setSyncTrigger(s => s + 1);

                            if (timeRemainingRef.current <= 0) {
                                setIsTimeUp(true);
                                setSyncTrigger(s => s + 1);
                                showAlert("⏱ 時間到！\n\n您的作答時間已結束，答案卡已鎖定無法再做更改。\n請點擊上方「交卷對答案」。");
                            }
                        }
                    }, 1000);
                }
                return () => { if(timerId) clearInterval(timerId); };
            }, [step, hasTimer, isTimeUp]);

            useEffect(() => {
                if (currentUser && quizId && (step === 'answering' || step === 'setup' || step === 'results')) {
                    if (userAnswers.length === 0 && numQuestions > 0 && step === 'answering') return;
                    
                    const stateToSave = { 
                        testName, numQuestions, userAnswers, starred, correctAnswersInput, results, 
                        questionType, questionFileUrl, questionContent, hasTimer, timeLimit,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    };
                    if (hasTimer) stateToSave.timeRemaining = timeRemainingRef.current;

                    db.collection('users').doc(currentUser.uid).collection('quizzes').doc(quizId).update(stateToSave)
                      .catch(e => console.error("自動儲存失敗", e));
                }
            }, [testName, numQuestions, userAnswers, starred, correctAnswersInput, results, questionType, questionFileUrl, questionContent, currentUser, quizId, step, syncTrigger]);

            const handleDragStart = (e) => setIsDragging(true);

            useEffect(() => {
                const handleDragMove = (e) => {
                    if (!isDragging || !splitContainerRef.current) return;
                    const containerRect = splitContainerRef.current.getBoundingClientRect();
                    let newRatio;
                    
                    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                    const clientY = e.touches ? e.touches[0].clientY : e.clientY;

                    if (layoutMode === 'horizontal') {
                        const offsetX = clientX - containerRect.left;
                        newRatio = (offsetX / containerRect.width) * 100;
                    } else {
                        const offsetY = clientY - containerRect.top;
                        newRatio = (offsetY / containerRect.height) * 100;
                    }
                    
                    newRatio = Math.max(20, Math.min(newRatio, 80));
                    setSplitRatio(newRatio);
                };

                const handleDragEnd = () => setIsDragging(false);

                if (isDragging) {
                    window.addEventListener('mousemove', handleDragMove);
                    window.addEventListener('touchmove', handleDragMove, { passive: false });
                    window.addEventListener('mouseup', handleDragEnd);
                    window.addEventListener('touchend', handleDragEnd);
                }

                return () => {
                    window.removeEventListener('mousemove', handleDragMove);
                    window.removeEventListener('touchmove', handleDragMove);
                    window.removeEventListener('mouseup', handleDragEnd);
                    window.removeEventListener('touchend', handleDragEnd);
                };
            }, [isDragging, layoutMode]);

            const handleStartTest = () => {
                if (numQuestions < 1 || numQuestions > 100) return showAlert('題數限制為 1-100 題！');
                if (hasTimer && (timeLimit < 1 || timeLimit > 999)) return showAlert('計時時間請設定在 1 到 999 分鐘之間。');
                
                const initialAnswers = Array(Number(numQuestions)).fill('');
                const initialStarred = Array(Number(numQuestions)).fill(false);
                setUserAnswers(initialAnswers);
                setStarred(initialStarred);

                db.collection('users').doc(currentUser.uid).collection('quizzes').add({
                    testName, numQuestions, userAnswers: initialAnswers, starred: initialStarred,
                    correctAnswersInput: '',
                    questionType: questionType,
                    questionFileUrl: questionFileUrl.trim(),
                    questionContent: questionContent,
                    hasTimer: hasTimer,
                    timeLimit: hasTimer ? Number(timeLimit) : null,
                    timeRemaining: hasTimer ? Number(timeLimit) * 60 : null,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                }).then(docRef => {
                    setQuizId(docRef.id);
                    if (hasTimer) {
                        timeRemainingRef.current = Number(timeLimit) * 60;
                        setDisplayTime(timeRemainingRef.current);
                        setIsTimeUp(false);
                    }
                    setStep('answering');
                }).catch(e => showAlert('建立紀錄失敗：' + e.message));
            };

            const handleRetake = () => {
                showConfirm("即將為您建立一份相同的空白試卷，先前的成績仍會保留在題庫中。\n確定要再做一次嗎？", () => {
                    const initialAnswers = Array(Number(numQuestions)).fill('');
                    const initialStarred = Array(Number(numQuestions)).fill(false);
                    
                    db.collection('users').doc(currentUser.uid).collection('quizzes').add({
                        testName: testName + ' (重測)',
                        numQuestions: numQuestions,
                        questionType: questionType,
                        questionFileUrl: questionFileUrl || '',
                        questionContent: questionContent || '',
                        correctAnswersInput: correctAnswersInput || '', 
                        userAnswers: initialAnswers,
                        starred: initialStarred,
                        isShared: isShared,
                        hasTimer: hasTimer,
                        timeLimit: timeLimit,
                        timeRemaining: hasTimer ? Number(timeLimit) * 60 : null,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    }).then(docRef => {
                        setQuizId(docRef.id);
                        setTestName(testName + ' (重測)');
                        setUserAnswers(initialAnswers);
                        setStarred(initialStarred);
                        setResults(null);
                        
                        if (hasTimer) {
                            timeRemainingRef.current = Number(timeLimit) * 60;
                            setDisplayTime(timeRemainingRef.current);
                            setIsTimeUp(false);
                        }

                        setStep('answering');
                    }).catch(e => showAlert('建立重測紀錄失敗：' + e.message));
                });
            };

            const handleUpdateFileUrl = () => {
                showPrompt(
                    "請貼上新的試卷網址 (留空則為移除網址)：\n注意：更新後將同步給所有已下載的好友！", 
                    questionFileUrl || "", 
                    async (url) => {
                        const newUrl = url ? url.trim() : "";
                        setQuestionFileUrl(newUrl);
                        if (newUrl !== "") setPreviewOpen(true);

                        if (!isShared && quizId) {
                            try {
                                const myDoc = await db.collection('users').doc(currentUser.uid).collection('quizzes').doc(quizId).get();
                                const latestSharedTo = myDoc.data()?.sharedTo || [];
                                
                                if (latestSharedTo.length > 0) {
                                    const promises = latestSharedTo.map(target => {
                                        return db.collection('users').doc(target.uid).collection('quizzes').doc(target.quizId).update({ questionFileUrl: newUrl });
                                    });
                                    await Promise.all(promises);
                                    showAlert('✅ 試卷網址已更新，並同步給所有好友！');
                                }
                            } catch(e) {
                                console.error("同步網址失敗", e);
                            }
                        }
                    }
                );
            };

            const handleOpenTextEditor = () => {
                setTempTextContent(questionContent);
                setShowTextEditorModal(true);
            };

            const handleSaveTextContent = async () => {
                setQuestionContent(tempTextContent);
                setShowTextEditorModal(false);
                setPreviewOpen(true);
                
                await db.collection('users').doc(currentUser.uid).collection('quizzes').doc(quizId).update({
                    questionContent: tempTextContent
                });

                if (!isShared && quizId) {
                    try {
                        const myDoc = await db.collection('users').doc(currentUser.uid).collection('quizzes').doc(quizId).get();
                        const latestSharedTo = myDoc.data()?.sharedTo || [];
                        
                        if (latestSharedTo.length > 0) {
                            const promises = latestSharedTo.map(target => {
                                return db.collection('users').doc(target.uid).collection('quizzes').doc(target.quizId).update({ questionContent: tempTextContent });
                            });
                            await Promise.all(promises);
                            showAlert('✅ 文字內容已更新，並同步給所有好友！');
                        }
                    } catch(e) {
                        console.error("同步文字內容失敗", e);
                    }
                }
            };

            const handleAnswerSelect = (idx, opt) => {
                if(isTimeUp) return;
                const newAns = [...userAnswers];
                newAns[idx] = newAns[idx] === opt ? '' : opt;
                setUserAnswers(newAns);
            };

            const toggleStar = (idx) => {
                if(isTimeUp) return;
                const newStar = [...starred];
                newStar[idx] = !newStar[idx];
                setStarred(newStar);
            };

            const handleGrade = async () => {
                const cleanKey = correctAnswersInput.replace(/[^a-zA-Z]/g, '').toUpperCase();
                if (!cleanKey) return showAlert('請輸入標準答案後再批改！');
                
                let correctCount = 0;
                const data = userAnswers.map((ans, idx) => {
                    const key = cleanKey[idx] || '-';
                    const isCorrect = ans === key && ans !== '';
                    if (isCorrect) correctCount++;
                    return { number: idx + 1, userAns: ans || '未填', correctAns: key, isCorrect, isStarred: starred[idx] };
                });

                const newResults = { score: Math.round((correctCount/numQuestions)*100), correctCount, total: numQuestions, data };
                setResults(newResults);
                setStep('results');

                try {
                    await db.collection('users').doc(currentUser.uid).collection('quizzes').doc(quizId).update({
                        correctAnswersInput: cleanKey,
                        results: newResults
                    });

                    if (!isShared) {
                        const myDoc = await db.collection('users').doc(currentUser.uid).collection('quizzes').doc(quizId).get();
                        const latestSharedTo = myDoc.data()?.sharedTo || [];
                        
                        if (latestSharedTo.length > 0) {
                            const promises = latestSharedTo.map(async (target) => {
                                const targetRef = db.collection('users').doc(target.uid).collection('quizzes').doc(target.quizId);
                                const doc = await targetRef.get();
                                if (doc.exists) {
                                    const targetData = doc.data();
                                    if (targetData.results && targetData.userAnswers) {
                                        let tCorrectCount = 0;
                                        const tData = targetData.userAnswers.map((ans, idx) => {
                                            const key = cleanKey[idx] || '-';
                                            const isCorrect = ans === key && ans !== '';
                                            if (isCorrect) tCorrectCount++;
                                            return { number: idx + 1, userAns: ans || '未填', correctAns: key, isCorrect, isStarred: targetData.starred ? targetData.starred[idx] : false };
                                        });
                                        const tResults = { score: Math.round((tCorrectCount/targetData.numQuestions)*100), correctCount: tCorrectCount, total: targetData.numQuestions, data: tData };
                                        return targetRef.update({ correctAnswersInput: cleanKey, results: tResults });
                                    } else {
                                        return targetRef.update({ correctAnswersInput: cleanKey });
                                    }
                                }
                            });
                            await Promise.all(promises);
                            showAlert('✅ 已完成批改！\n下載過這份試卷的好友，他們的標準答案與成績也已經自動同步更新囉！');
                        }
                    }
                } catch(e) {
                    console.error("同步更新失敗", e);
                }
            };

            const handleResetProgress = () => {
                 showConfirm("確定要刪除這份試卷嗎？此動作無法復原！", () => {
                    db.collection('users').doc(currentUser.uid).collection('quizzes').doc(quizId).delete()
                    .then(() => onBackToDashboard())
                    .catch(e => showAlert('刪除失敗：' + e.message));
                 });
            };

            const shareScoreToFriend = (friend) => {
                const chatId = [currentUser.uid, friend.uid].sort().join('_');
                db.collection('chats').doc(chatId).collection('messages').add({
                    senderId: currentUser.uid,
                    senderName: userProfile.displayName,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    type: 'score_share',
                    scoreData: {
                        testName: testName,
                        score: results.score,
                        correctCount: results.correctCount,
                        total: results.total
                    }
                }).then(() => {
                    db.collection('users').doc(friend.uid).set({
                        unreadChats: { [currentUser.uid]: true }
                    }, { merge: true });
                    showAlert('✅ 已成功向 ' + friend.name + ' 炫耀戰績！');
                    setShowShareScoreModal(false);
                }).catch(e => showAlert('炫耀失敗：' + e.message));
            };

            // 用於渲染預覽區的輔助元件
            const renderPreviewArea = () => {
                if (!hasPreviewContent || !previewOpen) return null;
                
                return (
                    <div 
                        className="bg-white border border-gray-200 shadow-sm no-round flex flex-col shrink-0"
                        style={{ [layoutMode === 'horizontal' ? 'width' : 'height']: `${splitRatio}%` }}
                    >
                        <div className="bg-gray-50 border-b border-gray-200 px-3 py-2 flex justify-between items-center shrink-0">
                            <span className="font-bold text-xs text-gray-600 flex items-center"><span className="text-sm mr-1">📄</span> 試卷預覽區</span>
                            {questionType === 'url' && questionFileUrl && (
                                <a href={questionFileUrl} target="_blank" rel="noopener noreferrer" className="text-xs text-blue-600 hover:text-blue-800 font-bold underline">在新分頁開啟全螢幕</a>
                            )}
                        </div>
                        <div className="flex-grow w-full relative bg-gray-200 overflow-hidden">
                            {questionType === 'url' ? (
                                <iframe src={getEmbedUrl(questionFileUrl)} className="absolute inset-0 w-full h-full border-0" allow="autoplay" allowFullScreen></iframe>
                            ) : (
                                <div className="absolute inset-0 w-full h-full bg-white overflow-y-auto p-6 custom-scrollbar">
                                    <div className="ql-editor break-words p-0 min-h-full" dangerouslySetInnerHTML={{ __html: questionContent }}></div>
                                </div>
                            )}
                        </div>
                    </div>
                );
            };

            const renderDragBar = () => {
                if (!hasPreviewContent || !previewOpen) return null;
                
                return (
                    <div 
                        onMouseDown={handleDragStart}
                        onTouchStart={handleDragStart}
                        className={`${layoutMode === 'horizontal' ? 'w-4 h-full cursor-col-resize flex-col' : 'h-4 w-full cursor-row-resize flex-row'} bg-gray-100 hover:bg-blue-200 flex items-center justify-center shrink-0 z-40 transition-colors active:bg-blue-300`}
                    >
                        <div className={`${layoutMode === 'horizontal' ? 'w-1 h-8' : 'h-1 w-8'} bg-gray-400 rounded-full`}></div>
                    </div>
                );
            }


            if (step === 'setup') return (
                <div className="flex flex-col items-center justify-center p-4 h-[100dvh] overflow-y-auto relative custom-scrollbar">
                    <button onClick={onBackToDashboard} className="absolute top-6 left-6 text-sm text-gray-500 hover:text-black font-bold z-10">← 返回列表</button>
                    <div className="bg-white p-8 shadow-md w-full max-w-lg no-round border border-gray-200 mt-10">
                        <h1 className="text-xl font-bold mb-6 border-b pb-2 tracking-tight">新增測驗</h1>
                        
                        <label className="block text-xs font-bold text-gray-500 mb-1">測驗名稱</label>
                        <input type="text" placeholder="例如: 藥理學期中考" className="w-full mb-4 p-2 border border-gray-300 no-round outline-none focus:border-black text-sm" value={testName} onChange={e => setTestName(e.target.value)} onFocus={handleFocusScroll} />
                        
                        <label className="block text-xs font-bold text-gray-500 mb-1">題數 (1-100)</label>
                        <input type="number" placeholder="50" className="w-full mb-4 p-2 border border-gray-300 no-round outline-none focus:border-black text-sm" value={numQuestions} onChange={e => setNumQuestions(e.target.value)} onFocus={handleFocusScroll} />
                        
                        <label className="block text-xs font-bold text-gray-500 mb-2">試卷來源設定</label>
                        <div className="flex space-x-6 mb-4">
                            <label className="flex items-center space-x-2 text-sm cursor-pointer font-bold">
                                <input type="radio" checked={questionType === 'url'} onChange={() => setQuestionType('url')} className="w-4 h-4 accent-black" />
                                <span>🌐 網址連結 (Drive/PDF)</span>
                            </label>
                            <label className="flex items-center space-x-2 text-sm cursor-pointer font-bold">
                                <input type="radio" checked={questionType === 'text'} onChange={() => setQuestionType('text')} className="w-4 h-4 accent-black" />
                                <span>📝 貼上文字 (支援 Word)</span>
                            </label>
                        </div>

                        {questionType === 'url' ? (
                            <div className="mb-6">
                                <label className="block text-xs font-bold text-gray-500 mb-1">試卷公開網址 (選填)</label>
                                <input type="text" placeholder="請貼上 Google Drive 連結..." className="w-full p-2 border border-gray-300 no-round outline-none focus:border-black text-sm" value={questionFileUrl} onChange={e => setQuestionFileUrl(e.target.value)} onFocus={handleFocusScroll} />
                            </div>
                        ) : (
                            <div className="mb-6 h-64 border border-gray-300 no-round overflow-hidden bg-white">

        function Main() {
            const [user, setUser] = useState(null);
            const [userProfile, setUserProfile] = useState(null);
            const [loadingUser, setLoadingUser] = useState(true);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [activeQuizRecord, setActiveQuizRecord] = useState(null);
            
            const [dialog, setDialog] = useState(null);
            const showAlert = (message) => setDialog({ type: 'alert', message });
            const showConfirm = (message, onConfirm) => setDialog({ type: 'confirm', message, onConfirm });
            const showPrompt = (message, defaultValue, onConfirm) => setDialog({ type: 'prompt', message, defaultValue, onConfirm });
            const closeDialog = () => setDialog(null);

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(usr => {
                    setUser(usr);
                    if (usr) {
                        db.collection('users').doc(usr.uid).get().then(doc => {
                            if (doc.exists) {
                                setUserProfile(doc.data());
                            } else {
                                const newProfile = { email: usr.email, friends: [], unreadChats: {} };
                                db.collection('users').doc(usr.uid).set(newProfile)
                                  .then(() => setUserProfile(newProfile));
                            }
                        }).catch(err => {
                            console.error("無法讀取資料庫", err);
                            showAlert("系統錯誤：無法讀取資料庫！\n請確定已開放 Firestore 讀寫權限。\n錯誤：" + err.message);
                        }).finally(() => {
                            setLoadingUser(false);
                        });
                    } else {
                        setUserProfile(null);
                        setLoadingUser(false);
                    }
                });
                return () => unsubscribe();
            }, []);

            const handleLogout = () => auth.signOut();
            
            if (loadingUser) return <div className="flex h-screen items-center justify-center font-bold tracking-widest animate-pulse text-gray-500">系統載入中...</div>;

            if (!userProfile || !userProfile.displayName) return (
                <div className="h-[100dvh] flex flex-col overflow-hidden">
                    <DialogOverlay dialog={dialog} onClose={closeDialog} />

            );

            const hasUnreadMessages = userProfile.unreadChats && Object.values(userProfile.unreadChats).includes(true);

            const TopNav = () => (
                <div className="bg-black text-white px-4 flex justify-between items-center shadow-md h-14 shrink-0 relative z-20">
                    <div className="flex space-x-6 items-center h-full">

                    </div>
                    <div className="flex items-center space-x-4">
                        <span className="text-sm font-bold text-gray-300 hidden sm:inline">{userProfile.displayName}</span>
                        <button onClick={handleLogout} className="text-xs bg-white text-black px-3 py-1 no-round font-bold hover:bg-gray-200 transition-colors">登出</button>
                    </div>
                </div>
            );

            return (
                <div className="h-[100dvh] flex flex-col overflow-hidden">
                    <DialogOverlay dialog={dialog} onClose={closeDialog} />
                    
                    {activeTab !== 'activeQuiz' && <TopNav />}
                    
                    {activeTab !== 'activeQuiz' ? (
                        <div className="flex-grow pt-6 overflow-hidden">
                            {activeTab === 'dashboard' && <Dashboard user={user} userProfile={userProfile} onStartNew={() => { setActiveQuizRecord(null); setActiveTab('activeQuiz'); }} onContinueQuiz={(rec) => { setActiveQuizRecord(rec); setActiveTab('activeQuiz'); }} showAlert={showAlert} showConfirm={showConfirm} />}
                            {activeTab === 'social' && <SocialDashboard user={user} userProfile={userProfile} showAlert={showAlert} />}
                        </div>
                    ) : (
                        <QuizApp key={activeQuizRecord ? activeQuizRecord.id : 'new-quiz'} currentUser={user} userProfile={userProfile} activeQuizRecord={activeQuizRecord} onBackToDashboard={() => setActiveTab('dashboard')} showAlert={showAlert} showConfirm={showConfirm} showPrompt={showPrompt} />
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Main />);
    </script>
</body>
</html>
