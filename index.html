<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JJay線上測驗 - 專業雙螢幕版</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: {} } }
    </script>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        .no-round { border-radius: 2px !important; }
        .break-avoid { break-inside: avoid; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #4b5563; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #6b7280; }
        input, textarea, button, select { font-size: 16px !important; }
        .locked-btn { cursor: not-allowed; opacity: 0.5; filter: grayscale(100%); }
        .pixelated { image-rendering: pixelated; }
        .mc-bg { background-color: #7d7d7d; background-image: url('https://raw.githubusercontent.com/InventivetalentDev/minecraft-assets/1.20/assets/minecraft/textures/block/stone.png'); background-size: 64px; image-rendering: pixelated; }
        .mc-ui { background-color: #c6c6c6; border: 4px solid; border-top-color: #ffffff; border-left-color: #ffffff; border-bottom-color: #555555; border-right-color: #555555; font-family: 'Courier New', Courier, monospace; }
        .mc-panel-dark { background-color: rgba(0, 0, 0, 0.65); border: 2px solid #111; box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.15); padding: 16px; }
        .mc-btn { background-color: #c6c6c6; border: 4px solid; border-top-color: #ffffff; border-left-color: #ffffff; border-bottom-color: #555555; border-right-color: #555555; color: #000; font-weight: bold; cursor: pointer; }
        .mc-btn:active { border-top-color: #555555; border-left-color: #555555; border-bottom-color: #ffffff; border-right-color: #ffffff; background-color: #b0b0b0; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 dark:bg-gray-900 dark:text-gray-100 font-sans h-[100dvh] overflow-hidden transition-colors duration-200">
    <div id="root" class="h-full"></div>

    <script type="text/babel">
        // --- 1. Firebase 初始化與工具 ---
        const firebaseConfig = {
            apiKey: "AIzaSyBAGM92NBQnUlI1gnLRK-mufM6YtDq5sHk",
            authDomain: "anser-card.firebaseapp.com",
            projectId: "anser-card",
            messagingSenderId: "224666683961",
            appId: "1:224666683961:web:351991d6cbc8543b181be8"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        try { db.enablePersistence({ synchronizeTabs: true }); } catch (err) {}

        const { useState, useEffect, useRef } = React;

        const handleFocusScroll = (e) => { setTimeout(() => { e.target.scrollIntoView({ behavior: 'smooth', block: 'center' }); }, 300); };
        const getEmbedUrl = (url) => {
            if (!url) return '';
            try { const match = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/); return match && match[1] ? `https://drive.google.com/file/d/${match[1]}/preview` : url; } catch(e) { return url; }
        };
        const formatTime = (seconds) => {
            if (seconds == null || seconds < 0) return '00:00';
            return `${Math.floor(seconds / 60).toString().padStart(2, '0')}:${(seconds % 60).toString().padStart(2, '0')}`;
        };

        // 【功能 2】：處理 [#op] 官方金色標籤
        const renderTestName = (name) => {
            if (name && name.endsWith('[#op]')) {
                return (
                    <span className="font-bold text-yellow-600 drop-shadow-md">
                        {name.replace('[#op]', '')} 
                        <span className="text-[10px] bg-yellow-500 text-black px-1.5 py-0.5 rounded ml-1 tracking-widest align-middle">官方</span>
                    </span>
                );
            }
            return name;
        };

        // --- 2. 共用元件 ---
        function McImg({ src, fallback, className }) {
            const [hasError, setHasError] = useState(false);
            if (hasError) return <span className={`${className} inline-flex items-center justify-center`} style={{ fontSize: '1.2em' }}>{fallback}</span>;
            return <img src={src} className={className} onError={() => setHasError(true)} alt={fallback} />;
        }

        function DialogOverlay({ dialog, onClose }) {
            const [inputValue, setInputValue] = useState('');
            useEffect(() => { if (dialog?.type === 'prompt') setInputValue(dialog.defaultValue || ''); }, [dialog]);
            if (!dialog) return null;
            const handleConfirm = () => { if (dialog.onConfirm) { dialog.type === 'prompt' ? dialog.onConfirm(inputValue) : dialog.onConfirm(); } onClose(); };
            return (
                <div className="fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-[100] p-4">
                    <div className="bg-white dark:bg-gray-800 p-6 w-full max-w-sm no-round shadow-2xl border-t-4 border-black dark:border-gray-500">
                        <h3 className="font-bold text-lg mb-3 dark:text-white">{dialog.type === 'alert' ? 'ℹ️ 系統提示' : '🤔 請確認'}</h3>
                        <p className="mb-5 text-gray-600 dark:text-gray-300 text-sm whitespace-pre-wrap leading-relaxed">{dialog.message}</p>
                        {dialog.type === 'prompt' && <input type="text" className="w-full mb-5 p-3 border bg-white dark:bg-gray-700 text-black dark:text-white no-round outline-none text-sm" value={inputValue} onChange={e => setInputValue(e.target.value)} autoFocus />}
                        <div className="flex justify-end space-x-3 pt-4 border-t border-gray-100 dark:border-gray-700">
                            {dialog.type !== 'alert' && <button onClick={onClose} className="bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-200 px-5 py-2 font-bold text-sm">取消</button>}
                            <button onClick={handleConfirm} className="bg-black dark:bg-gray-200 text-white dark:text-black px-5 py-2 font-bold text-sm">確定</button>
                        </div>
                    </div>
                </div>
            );
        }

        function AuthScreen({ showAlert }) {
            const [isSignUp, setIsSignUp] = useState(false);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);

            const handleAuth = (e) => {
                e.preventDefault(); setLoading(true);
                const safeEmail = email.trim().toLowerCase(); 
                const request = isSignUp ? auth.createUserWithEmailAndPassword(safeEmail, password) : auth.signInWithEmailAndPassword(safeEmail, password);
                
                request.then((cred) => {
                    if (isSignUp) {
                        return db.collection('users').doc(cred.user.uid).set({ 
                            email: safeEmail, friends: [], unreadChats: {}, folders: ['未分類'], mcData: { diamonds: 0, level: 1, exp: 0, hunger: 10, items: [], cats: 0 }, hasSeenTutorial: false, avatar: null, bio: ""
                        });
                    }
                }).catch(err => showAlert('認證失敗：' + err.message)).finally(() => setLoading(false));
            };

            return (
                <div className="flex h-full items-center justify-center p-4">
                    <form onSubmit={handleAuth} className="bg-white dark:bg-gray-800 p-8 shadow-md w-full max-w-sm no-round">
                        <h1 className="text-xl font-bold mb-6 text-center dark:text-white">JJay線上測驗</h1>
                        <input type="email" placeholder="電子郵件" className="w-full mb-3 p-3 border bg-white dark:bg-gray-700 text-black dark:text-white no-round" value={email} onChange={e => setEmail(e.target.value)} required />
                        <input type="password" placeholder="密碼" className="w-full mb-6 p-3 border bg-white dark:bg-gray-700 text-black dark:text-white no-round" value={password} onChange={e => setPassword(e.target.value)} required />
                        <button type="submit" className="w-full bg-black dark:bg-gray-200 text-white dark:text-black p-3 font-bold no-round" disabled={loading}>{loading ? '處理中...' : (isSignUp ? '註冊' : '登入')}</button>
                        <button type="button" onClick={() => setIsSignUp(!isSignUp)} className="w-full mt-4 text-sm text-gray-500">{isSignUp ? '已有帳號？前往登入' : '沒有帳號？前往註冊'}</button>
                    </form>
                </div>
            );
        }

        function ProfileSetup({ user, onComplete, showAlert }) {
            const [name, setName] = useState('');
            const saveProfile = () => {
                if(!name.trim()) return showAlert('請輸入社群暱稱！');
                db.collection('users').doc(user.uid).set({ displayName: name.trim() }, { merge: true }).then(() => onComplete(name.trim()));
            };
            return (
                <div className="flex h-full items-center justify-center p-4">
                    <div className="bg-white dark:bg-gray-800 p-8 shadow-md w-full max-w-sm no-round text-center">
                        <h2 className="text-xl font-bold mb-4 dark:text-white">設定社群暱稱</h2>
                        <input type="text" placeholder="例如：藥神" className="w-full mb-6 p-3 border bg-white dark:bg-gray-700 text-black dark:text-white no-round text-center" value={name} onChange={e => setName(e.target.value)} />
                        <button onClick={saveProfile} className="w-full bg-black dark:bg-gray-200 text-white dark:text-black p-3 font-bold no-round">完成設定</button>
                    </div>
                </div>
            );
        }

        // --- 新增個人檔案頁面 ---
        function ProfilePage({ user, userProfile, showAlert }) {
            const [bio, setBio] = useState(userProfile.bio || "");
            const [isSaving, setIsSaving] = useState(false);
            const fileInputRef = useRef(null);

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let w = img.width, h = img.height;
                        const MAX_DIM = 250; // 壓縮頭像
                        if (w > h && w > MAX_DIM) { h *= MAX_DIM / w; w = MAX_DIM; }
                        else if (h > MAX_DIM) { w *= MAX_DIM / h; h = MAX_DIM; }
                        canvas.width = w; canvas.height = h;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, w, h);
                        const compressedBase64 = canvas.toDataURL('image/jpeg', 0.6);
                        db.collection('users').doc(user.uid).update({ avatar: compressedBase64 }).then(() => showAlert("✅ 頭像更新成功！"));
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            };

            const saveBio = () => {
                setIsSaving(true);
                db.collection('users').doc(user.uid).update({ bio }).then(() => showAlert("✅ 自我介紹已儲存！")).finally(() => setIsSaving(false));
            };

            return (
                <div className="max-w-3xl mx-auto p-6 mt-10 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 shadow-sm custom-scrollbar overflow-y-auto">
                    <h2 className="text-2xl font-black mb-6 dark:text-white">個人檔案設定</h2>
                    <div className="flex flex-col md:flex-row items-center md:items-start gap-8">
                        <div className="flex flex-col items-center shrink-0">
                            <div className="w-32 h-32 bg-gray-200 dark:bg-gray-700 rounded-full flex items-center justify-center overflow-hidden border-4 border-gray-300 dark:border-gray-600 mb-4 cursor-pointer" onClick={() => fileInputRef.current.click()}>
                                {userProfile.avatar ? <img src={userProfile.avatar} className="w-full h-full object-cover" /> : <span className="text-4xl">👤</span>}
                            </div>
                            <button onClick={() => fileInputRef.current.click()} className="text-sm font-bold bg-gray-100 dark:bg-gray-700 px-4 py-2 hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors dark:text-white">更換大頭照</button>
                            <input type="file" accept="image/*" className="hidden" ref={fileInputRef} onChange={handleImageUpload} />
                        </div>
                        <div className="flex-grow w-full">
                            <label className="block text-sm font-bold text-gray-500 mb-2">社群暱稱</label>
                            <div className="w-full mb-4 p-3 border bg-gray-50 dark:bg-gray-900 text-gray-500 dark:text-gray-400 cursor-not-allowed">{userProfile.displayName}</div>
                            
                            <label className="block text-sm font-bold text-gray-500 mb-2">關於我 (自我介紹)</label>
                            <textarea value={bio} onChange={e => setBio(e.target.value)} className="w-full h-32 mb-4 p-3 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-black dark:text-white outline-none resize-none" placeholder="寫點關於你自己的事吧..."></textarea>
                            <button onClick={saveBio} disabled={isSaving} className="bg-black dark:bg-gray-200 text-white dark:text-black px-6 py-2 font-bold transition-colors">{isSaving ? '儲存中...' : '儲存自介'}</button>
                        </div>
                    </div>
                </div>
            );
        }

        // --- 3. 史蒂夫養成與小遊戲 ---
        function SkateboardGame({ onGameOver, onQuit }) {
            const canvasRef = useRef(null);
            const [gameState, setGameState] = useState('start'); 
            const [score, setScore] = useState(0);
            const LOG_W = 800; const LOG_H = 350;
            const gameRef = useRef({ reqId: null, player: { x: 50, y: 0, w: 40, h: 40, dy: 0, jumps: 0 }, obstacles: [], diamonds: [], speed: 6.5, score: 0, frames: 0, lastSpawnFrame: 0, groundY: 250, lastFrameTime: 0 });
            const images = useRef({ steve: new Image(), stone: new Image(), diamond: new Image(), zombie: new Image(), husk: new Image() });

            useEffect(() => {
                images.current.steve.src = "https://minotar.net/helm/Steve/64.png";
                images.current.stone.src = "https://raw.githubusercontent.com/InventivetalentDev/minecraft-assets/1.20/assets/minecraft/textures/block/stone.png";
                images.current.diamond.src = "https://raw.githubusercontent.com/InventivetalentDev/minecraft-assets/1.20/assets/minecraft/textures/item/diamond.png";
                images.current.zombie.src = "https://minotar.net/helm/Zombie/64.png";
                images.current.husk.src = "https://minotar.net/helm/Husk/64.png";
                const cvs = canvasRef.current;
                if (cvs) { const ctx = cvs.getContext('2d'); cvs.width = LOG_W; cvs.height = LOG_H; }
                return () => { if (gameRef.current.reqId) cancelAnimationFrame(gameRef.current.reqId); };
            }, []);

            const startGame = () => {
                setGameState('playing'); setScore(0);
                gameRef.current = { ...gameRef.current, player: { x: 50, y: 150, w: 40, h: 40, dy: 0, jumps: 0 }, obstacles: [], diamonds: [], speed: 6.5, score: 0, frames: 0, lastSpawnFrame: 0, lastFrameTime: performance.now() };
                gameRef.current.reqId = requestAnimationFrame(loop);
            };

            const jump = () => { const p = gameRef.current.player; if (p.jumps < 2) { p.dy = -11.5; p.jumps++; } };

            const loop = (currentTime) => {
                const cvs = canvasRef.current; if (!cvs) return;
                const state = gameRef.current;
                if (!currentTime) currentTime = performance.now();
                const fpsInterval = 1000 / 60; const elapsed = currentTime - state.lastFrameTime;
                if (elapsed < fpsInterval) { state.reqId = requestAnimationFrame(loop); return; }
                state.lastFrameTime = currentTime - (elapsed % fpsInterval);

                const ctx = cvs.getContext('2d');
                state.player.dy += 0.7; state.player.y += state.player.dy;

                let dead = false;
                state.obstacles = state.obstacles.filter(o => o.x + o.w > -50);
                state.diamonds = state.diamonds.filter(d => d.x + d.w > -50 && !d.collected);

                if (state.player.y + state.player.h >= state.groundY) { state.player.y = state.groundY - state.player.h; state.player.dy = 0; state.player.jumps = 0; }

                for (let i = 0; i < state.obstacles.length; i++) {
                    let obs = state.obstacles[i];
                    obs.x -= state.speed;

                    // 【功能 5】：Husk AI 主動飛躍玩家
                    if (obs.type === 'husk') {
                        let dist = obs.x - (state.player.x + state.player.w);
                        if (dist > 10 && dist < 150 && state.player.y >= state.groundY - 10 && obs.y >= state.groundY - obs.h - 5) {
                            obs.dy = -13.5; 
                        }
                        obs.dy += 0.7; obs.y += obs.dy;
                        if (obs.y + obs.h >= state.groundY) { obs.y = state.groundY - obs.h; obs.dy = 0; }
                    }
                    if (state.player.x + 8 < obs.x + obs.w - 8 && state.player.x + state.player.w - 8 > obs.x + 8 && state.player.y + 5 < obs.y + obs.h - 5 && state.player.y + state.player.h > obs.y + 5) dead = true; 
                }

                state.diamonds.forEach(d => {
                    d.x -= state.speed;
                    if (!d.collected && state.player.x < d.x + d.w && state.player.x + state.player.w > d.x && state.player.y < d.y + d.h && state.player.y + state.player.h > d.y) {
                        d.collected = true; state.score += 1; setScore(state.score);
                    }
                });

                if (dead) { setGameState('gameover'); onGameOver(state.score); return; }

                state.frames++;
                if (state.frames % 100 === 0 && state.speed < 15) state.speed += 0.2;

                if (state.frames - state.lastSpawnFrame > Math.max(40, 100 - state.speed * 4)) {
                    if (Math.random() < 0.55) { 
                        state.lastSpawnFrame = state.frames;
                        state.obstacles.push({ type: Math.random() < 0.5 ? 'zombie' : 'husk', x: LOG_W, y: state.groundY - 40, w: 40, h: 40, dy: 0 }); 
                    }
                }
                
                if (state.frames % Math.floor(Math.random() * 300 + 400) === 0) {
                    state.diamonds.push({ x: LOG_W, y: state.groundY - 50 - Math.random() * 100, w: 24, h: 24, collected: false });
                }

                ctx.clearRect(0, 0, LOG_W, LOG_H);
                ctx.fillStyle = '#5A5A5A'; ctx.fillRect(0, state.groundY, LOG_W, LOG_H - state.groundY);
                
                state.obstacles.forEach(obs => {
                    if (obs.type === 'zombie' && images.current.zombie.complete) ctx.drawImage(images.current.zombie, obs.x, obs.y, obs.w, obs.h);
                    else if (obs.type === 'husk' && images.current.husk.complete) ctx.drawImage(images.current.husk, obs.x, obs.y, obs.w, obs.h);
                });

                state.diamonds.forEach(d => { if (!d.collected && images.current.diamond.complete) ctx.drawImage(images.current.diamond, d.x, d.y, d.w, d.h); });
                if (images.current.steve.complete) ctx.drawImage(images.current.steve, state.player.x, state.player.y, state.player.w, state.player.h);
                
                state.reqId = requestAnimationFrame(loop);
            };

            return (
                <div className="fixed inset-0 z-[80] bg-black bg-opacity-90 flex flex-col items-center justify-center p-4">
                    <div className="bg-gray-800 p-2 border-4 border-gray-600 no-round max-w-3xl w-full relative shadow-2xl">
                        <div className="flex justify-between text-white font-bold mb-2 font-mono px-2 text-xl"><span>💎 {score}</span><button onClick={onQuit} className="text-red-400">✖ 離開</button></div>
                        <div className="bg-[#6bc0ff] relative w-full overflow-hidden border-4 border-black" style={{ height: '350px' }} onMouseDown={(e) => { e.preventDefault(); if(gameState==='playing') jump(); }}>
                            <canvas ref={canvasRef} style={{ width: '100%', height: '100%' }} className="pixelated block"></canvas>
                            {gameState === 'start' && <div className="absolute inset-0 flex items-center justify-center bg-black bg-opacity-60"><button onClick={startGame} className="mc-btn px-8 py-4 text-2xl animate-pulse">🛹 開始跑酷</button></div>}
                            {gameState === 'gameover' && (
                                <div className="absolute inset-0 flex flex-col items-center justify-center bg-black bg-opacity-80 text-white">
                                    <h2 className="text-4xl font-black mb-2 text-red-500 drop-shadow-md">GAME OVER</h2>
                                    <p className="mb-8 font-bold text-xl">獲得了 {score} 💎</p>
                                    <div className="flex space-x-6"><button onClick={startGame} className="mc-btn px-6 py-3">🔄 再玩</button><button onClick={onQuit} className="mc-btn px-6 py-3 bg-gray-400">🔙 返回</button></div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        function MinecraftDashboard({ user, userProfile, showAlert }) {
            const [leaderboard, setLeaderboard] = useState([]);
            const [showMiniGame, setShowMiniGame] = useState(false);
            const mcData = userProfile.mcData || { diamonds: 0, level: 1, exp: 0, hunger: 10, items: [], cats: 0, lastCheckIn: null };

            useEffect(() => {
                const fetchLeaderboard = async () => {
                    const friendUids = (userProfile.friends || []).map(f => f.uid);
                    if (friendUids.length === 0) return setLeaderboard([{ name: userProfile.displayName, ...mcData, isMe: true }]);
                    try {
                        const board = [{ name: userProfile.displayName, ...mcData, isMe: true }];
                        const promises = friendUids.map(uid => db.collection('users').doc(uid).get());
                        const results = await Promise.all(promises);
                        results.forEach(doc => { if (doc.exists && doc.data().mcData) board.push({ name: doc.data().displayName, ...doc.data().mcData, isMe: false }); });
                        board.sort((a, b) => b.level !== a.level ? b.level - a.level : b.exp - a.exp);
                        setLeaderboard(board);
                    } catch (e) { console.error(e); }
                };
                fetchLeaderboard();
            }, [userProfile.friends, mcData]);

            const updateMcData = (updates, silent = false) => { db.collection('users').doc(user.uid).update({ mcData: { ...mcData, ...updates } }).catch(e => { if (!silent) showAlert('更新失敗：' + e.message); }); };
            const handleCheckIn = () => {
                const today = new Date().toISOString().split('T')[0];
                if (mcData.lastCheckIn === today) return showAlert("今日已經簽到過囉！");
                updateMcData({ diamonds: mcData.diamonds + 20, exp: mcData.exp + 10, hunger: Math.max(0, mcData.hunger - 2), lastCheckIn: today });
                showAlert("✅ 簽到成功！獲得 20 💎 與 10 EXP");
            };

            return (
                <div className="mc-bg h-[calc(100dvh-100px)] overflow-y-auto custom-scrollbar p-4 relative">
                    {showMiniGame && <SkateboardGame onGameOver={d => { if(d>0) updateMcData({diamonds: mcData.diamonds + d}, true); }} onQuit={() => setShowMiniGame(false)} />}
                    <div className="max-w-4xl mx-auto mc-ui p-6 flex flex-col space-y-6">
                        <div className="flex justify-between items-center"><h1 className="text-2xl font-black text-gray-800">⛏️ 史蒂夫的養成天地</h1></div>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div className="mc-panel-dark text-white space-y-4">
                                <h2 className="border-b-2 border-gray-600 pb-2 font-bold flex justify-between">🏡 你的家 <button onClick={() => setShowMiniGame(true)} className="bg-blue-600 px-2 text-xs py-1 rounded">🛹 玩滑板</button></h2>
                                <div className="h-36 mc-bg flex justify-center items-center relative">
                                    <McImg src="https://minotar.net/helm/Steve/64.png" className="w-16 h-16 pixelated"/>
                                    <div className="absolute top-2 left-2 text-xs">Lv. {mcData.level} | 💎 {mcData.diamonds}</div>
                                </div>
                                <button onClick={handleCheckIn} className="mc-btn w-full py-2">📅 每日簽到 (+20 💎)</button>
                            </div>
                            <div className="mc-panel-dark text-white">
                                <h2 className="border-b-2 border-gray-600 pb-2 mb-4 font-bold text-yellow-300">🏆 好友等級排行榜</h2>
                                <div className="space-y-2">{leaderboard.map((lb, idx) => <div key={idx} className="flex justify-between border-b border-gray-700 p-2 text-sm"><span>{idx+1}. {lb.name}</span><span className="text-green-400">Lv.{lb.level}</span></div>)}</div>

        // --- 4. 社群與聊天室 ---
        function SocialDashboard({ user, userProfile, showAlert }) {
            const friends = userProfile.friends || [];
            const [searchEmail, setSearchEmail] = useState('');
            const [activeChat, setActiveChat] = useState(null);
            const [messages, setMessages] = useState([]);
            const [newMessage, setNewMessage] = useState('');
            const [previewImgUrl, setPreviewImgUrl] = useState(null); // 【功能 4】：圖片預覽
            const messagesEndRef = useRef(null);
            const fileInputRef = useRef(null);
            const [messageLimit, setMessageLimit] = useState(5);

            const getChatId = (uid1, uid2) => [uid1, uid2].sort().join('_');

            useEffect(() => {
                if(!activeChat) return;
                const chatId = getChatId(user.uid, activeChat.uid);
                const unsub = db.collection('chats').doc(chatId).collection('messages').orderBy('timestamp', 'desc').limit(messageLimit).onSnapshot(snapshot => {
                    const msgs = [];
                    snapshot.docs.forEach(doc => {
                        const data = doc.data();
                        if (data.type === 'image' && data.expiresAt && data.expiresAt < Date.now()) doc.ref.delete();
                        else msgs.push({ id: doc.id, ...data });
                    });
                    setMessages(msgs.reverse());
                    setTimeout(() => messagesEndRef.current?.scrollIntoView({ behavior: "smooth" }), 100);
                });
                return () => unsub();
            }, [activeChat, user.uid, messageLimit]);

            const handleAddFriend = () => {
                const cleanEmail = searchEmail.trim().toLowerCase(); 
                if(!cleanEmail || cleanEmail === user.email.toLowerCase()) return;
                db.collection('users').where('email', '==', cleanEmail).get().then(snap => {
                    if(snap.empty) return showAlert('找不到使用者');
                    const target = snap.docs[0];
                    if(friends.find(f => f.uid === target.id)) return showAlert('已經是好友了');
                    db.collection('users').doc(user.uid).update({ friends: firebase.firestore.FieldValue.arrayUnion({ uid: target.id, name: target.data().displayName, email: target.data().email }) });
                    db.collection('users').doc(target.id).update({ friends: firebase.firestore.FieldValue.arrayUnion({ uid: user.uid, name: userProfile.displayName, email: user.email }) });
                    showAlert(`已加入 ${target.data().displayName}！`); setSearchEmail('');
                });
            };

            const sendMessage = (e) => {
                e.preventDefault(); if(!newMessage.trim() || !activeChat) return;
                db.collection('chats').doc(getChatId(user.uid, activeChat.uid)).collection('messages').add({
                    text: newMessage.trim(), senderId: user.uid, timestamp: firebase.firestore.FieldValue.serverTimestamp(), type: 'text'
                }).then(() => setNewMessage(''));
            };

            const handleImageUpload = (e) => {
                if (!activeChat || !e.target.files[0]) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    db.collection('chats').doc(getChatId(user.uid, activeChat.uid)).collection('messages').add({
                        type: 'image', imageUrl: event.target.result, senderId: user.uid, timestamp: firebase.firestore.FieldValue.serverTimestamp(), expiresAt: Date.now() + 600000 
                    });
                };
                reader.readAsDataURL(e.target.files[0]);
            };

            return (
                <div className="max-w-6xl mx-auto p-4 pt-0 grid grid-cols-1 md:grid-cols-3 gap-6 h-[calc(100dvh-100px)] relative">
                    {previewImgUrl && (
                        <div className="fixed inset-0 bg-black bg-opacity-90 z-[200] flex items-center justify-center p-4 cursor-zoom-out" onClick={() => setPreviewImgUrl(null)}>
                            <img src={previewImgUrl} className="max-w-full max-h-full object-contain" />
                            <span className="absolute top-6 right-6 text-white text-3xl font-bold">✖</span>
                        </div>
                    )}

                    <div className="bg-white dark:bg-gray-800 border dark:border-gray-700 flex flex-col h-full overflow-hidden">
                        <div className="p-4 border-b dark:border-gray-700">
                            <div className="flex space-x-2"><input type="email" placeholder="輸入信箱..." className="flex-grow p-2 border dark:border-gray-600 dark:bg-gray-700 dark:text-white text-sm" value={searchEmail} onChange={e=>setSearchEmail(e.target.value)} /><button onClick={handleAddFriend} className="bg-black dark:bg-gray-200 text-white dark:text-black px-3 py-2 text-sm font-bold">加入</button></div>
                        </div>
                        <div className="flex-grow overflow-y-auto p-2 custom-scrollbar">
                            {/* 防白屏：(friends || []) */}
                            {(friends || []).map(f => (
                                <div key={f.uid} onClick={() => setActiveChat(f)} className={`p-3 border-b dark:border-gray-700 cursor-pointer ${activeChat?.uid === f.uid ? 'bg-orange-50 dark:bg-gray-700' : ''}`}>
                                    <div className="font-bold dark:text-white text-sm">{f.name}</div><div className="text-xs text-gray-400">{f.email}</div>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="md:col-span-2 bg-white dark:bg-gray-800 border dark:border-gray-700 flex flex-col h-full overflow-hidden">
                        {activeChat ? (
                            <>
                                <div className="p-4 border-b dark:border-gray-700 font-bold dark:text-white">💬 與 {activeChat.name}</div>
                                <div className="flex-grow overflow-y-auto p-4 space-y-4 bg-gray-50 dark:bg-gray-900 custom-scrollbar">
                                    {/* 防白屏：(messages || []) */}
                                    {(messages || []).map(msg => (
                                        <div key={msg.id} className={`flex flex-col ${msg.senderId === user.uid ? 'items-end' : 'items-start'} mb-4`}>
                                            <div className={`max-w-[70%] p-3 text-sm ${msg.senderId === user.uid ? 'bg-black text-white dark:bg-blue-600' : 'bg-white border dark:border-gray-600 text-black dark:bg-gray-700 dark:text-white'}`}>
                                                {msg.type === 'image' ? 
                                                    <img src={msg.imageUrl} className="max-w-full max-h-48 cursor-zoom-in border dark:border-gray-600" onClick={() => setPreviewImgUrl(msg.imageUrl)} /> : 
                                                    <p>{msg.text}</p>
                                                }
                                            </div>
                                        </div>
                                    ))}
                                    <div ref={messagesEndRef} />
                                </div>
                                <form onSubmit={sendMessage} className="p-3 border-t dark:border-gray-700 flex space-x-2 bg-white dark:bg-gray-800">
                                    <button type="button" onClick={() => fileInputRef.current.click()} className="bg-gray-100 dark:bg-gray-700 px-3 py-2 text-xl border dark:border-gray-600">🖼️</button>
                                    <input type="file" accept="image/*" className="hidden" ref={fileInputRef} onChange={handleImageUpload} />
                                    <input type="text" placeholder="輸入訊息..." className="flex-grow p-2 border dark:border-gray-600 dark:bg-gray-700 dark:text-white" value={newMessage} onChange={e=>setNewMessage(e.target.value)} />
                                    <button type="submit" className="bg-black dark:bg-gray-200 text-white dark:text-black px-4 py-2 font-bold">傳送</button>
                                </form>
                            </>
                        ) : <div className="flex-grow flex items-center justify-center text-gray-400">請選擇好友</div>}
                    </div>
                </div>
            );
        }

        // --- 5. 題庫列表與測驗邏輯 ---
        function Dashboard({ user, userProfile, onStartNew, onContinueQuiz, showAlert, showConfirm, showPrompt }) {
            const [records, setRecords] = useState([]);
            const [loading, setLoading] = useState(true);
            const userFolders = Array.from(new Set(['未分類', ...(userProfile.folders || [])]));
            const [currentFolder, setCurrentFolder] = useState('未分類');

            useEffect(() => {
                const unsubscribe = db.collection('users').doc(user.uid).collection('quizzes').orderBy('createdAt', 'desc')
                    .onSnapshot(snapshot => { setRecords(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))); setLoading(false); });
                return () => unsubscribe();
            }, [user]);

            // 【功能 1】：匯入檢查是否已有相同代碼
            const handleImportCode = () => {
                showPrompt("請輸入 6 碼測驗代碼：", "", async (code) => {
                    const cleanCode = code?.trim().toUpperCase(); if(!cleanCode) return;
                    try {
                        const existing = records.find(r => r.shortCode === cleanCode);
                        if (existing) return showAlert("您已經擁有這份試卷了！(已存在於題庫中)");

                        const codeDoc = await db.collection('shareCodes').doc(cleanCode).get();
                        if(!codeDoc.exists) throw new Error("無效代碼");
                        const doc = await db.collection('users').doc(codeDoc.data().ownerId).collection('quizzes').doc(codeDoc.data().quizId).get();
                        if(!doc.exists) throw new Error('找不到該試卷');
                        
                        const data = doc.data();
                        await db.collection('users').doc(user.uid).collection('quizzes').add({
                            testName: data.testName, numQuestions: data.numQuestions, questionFileUrl: data.questionFileUrl || '',
                            correctAnswersInput: data.correctAnswersInput || '', userAnswers: Array(Number(data.numQuestions)).fill(''),
                            isShared: true, folder: '未分類', shortCode: cleanCode, createdAt: firebase.firestore.FieldValue.serverTimestamp()
                        });
                        showAlert('✅ 已成功匯入！');
                    } catch(e) { showAlert('❌ 匯入失敗：' + e.message); }
                });
            };

            const displayedRecords = records.filter(rec => (rec.folder || '未分類') === currentFolder);

            return (
                <div className="max-w-6xl mx-auto p-4 pt-0 h-[calc(100dvh-100px)] overflow-y-auto custom-scrollbar">
                    <div className="flex justify-between items-center mb-4 pb-2 border-b-2 border-black dark:border-white">
                        <h1 className="text-2xl font-black dark:text-white">我的題庫</h1>
                        <button onClick={() => onStartNew(currentFolder)} className="bg-black dark:bg-gray-200 text-white dark:text-black px-6 py-2 font-bold">+ 新測驗</button>
                    </div>
                    <div className="flex space-x-2 mb-4 overflow-x-auto custom-scrollbar pb-2">
                        {userFolders.map(f => <button key={f} onClick={() => setCurrentFolder(f)} className={`px-4 py-1.5 border dark:border-gray-600 font-bold whitespace-nowrap ${currentFolder === f ? 'bg-black dark:bg-gray-200 text-white dark:text-black' : 'bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300'}`}>{f}</button>)}
                        <button onClick={handleImportCode} className="px-3 py-1.5 border bg-blue-50 dark:bg-blue-900 text-blue-700 dark:text-blue-300 border-blue-200 dark:border-blue-700 font-bold whitespace-nowrap">📥 輸入代碼</button>
                    </div>
                    
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        {displayedRecords.map(rec => (
                            <div key={rec.id} className="bg-white dark:bg-gray-800 border dark:border-gray-700 p-6 flex flex-col justify-between">
                                <div>
                                    <h2 className="font-bold text-lg mb-2 dark:text-white flex items-center justify-between">
                                        <span>{renderTestName(rec.testName || '未命名')} {rec.isShared && <span className="text-xs bg-orange-100 dark:bg-orange-900 text-orange-800 dark:text-orange-200 px-1 ml-1 align-middle">分享</span>}</span>
                                        {rec.results && <span className={`text-xl font-black ${rec.results.score >= 60 ? 'text-green-600' : 'text-red-600'}`}>{rec.results.score}</span>}
                                    </h2>
                                    <p className="text-sm text-gray-600 dark:text-gray-400 mb-4">題數：{rec.numQuestions}</p>
                                </div>
                                <button onClick={() => onContinueQuiz(rec)} className="bg-gray-100 dark:bg-gray-700 text-black dark:text-white px-5 py-2 font-bold border dark:border-gray-600 w-full hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors">進入測驗</button>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function QuizApp({ currentUser, userProfile, activeQuizRecord, onBackToDashboard, showAlert, showConfirm, showPrompt }) {
            const [step, setStep] = useState(activeQuizRecord.results ? 'results' : (activeQuizRecord.id ? 'answering' : 'setup'));
            const [testName, setTestName] = useState(activeQuizRecord.testName || '');
            const [numQuestions, setNumQuestions] = useState(activeQuizRecord.numQuestions || 50);
            const [userAnswers, setUserAnswers] = useState(activeQuizRecord.userAnswers || []);
            const [correctAnswersInput, setCorrectAnswersInput] = useState(activeQuizRecord.correctAnswersInput || '');
            const [results, setResults] = useState(activeQuizRecord.results || null);
            const [questionFileUrl, setQuestionFileUrl] = useState(activeQuizRecord.questionFileUrl || '');
            const [pdfZoom, setPdfZoom] = useState(1); // 【功能 3】：PDF縮放

            useEffect(() => {
                if (activeQuizRecord.id && (step === 'answering' || step === 'setup' || step === 'results')) {
                    if (userAnswers.length === 0 && numQuestions > 0 && step === 'answering') return;
                    db.collection('users').doc(currentUser.uid).collection('quizzes').doc(activeQuizRecord.id).update({ 
                        testName, numQuestions, userAnswers, correctAnswersInput, results, questionFileUrl
                    }).catch(e => console.error(e));
                }
            }, [testName, numQuestions, userAnswers, correctAnswersInput, results, questionFileUrl, currentUser, activeQuizRecord.id, step]);

            const handleStartTest = () => {
                const initialAnswers = Array(Number(numQuestions)).fill('');
                db.collection('users').doc(currentUser.uid).collection('quizzes').add({
                    testName, numQuestions, userAnswers: initialAnswers, correctAnswersInput: '', questionFileUrl,
                    folder: activeQuizRecord.folder || '未分類', createdAt: firebase.firestore.FieldValue.serverTimestamp()
                }).then(docRef => { activeQuizRecord.id = docRef.id; setUserAnswers(initialAnswers); setStep('answering'); });
            };

            const handleGrade = () => {
                const cleanKey = correctAnswersInput.replace(/[^a-zA-Z]/g, '').toUpperCase();
                if (!cleanKey) return showAlert('請輸入標準答案後再批改！');
                let correctCount = 0;
                const data = userAnswers.map((ans, idx) => {
                    const key = cleanKey[idx] || '-'; const isCorrect = ans === key && ans !== '';
                    if (isCorrect) correctCount++; return { number: idx + 1, userAns: ans || '未填', correctAns: key, isCorrect };
                });
                setResults({ score: Math.round((correctCount/numQuestions)*100), correctCount, total: numQuestions, data });
                setStep('results');
            };

            // 【功能 1】：再做一次 (保留成績寫入歷史，不開新檔)
            const handleRetake = () => {
                showConfirm("確定要再做一次嗎？\n先前的分數將保留在試卷歷史中，系統將為您清空目前答案，不再產生新檔案。", () => {
                    const initialAnswers = Array(Number(numQuestions)).fill('');
                    const historyEntry = { score: results.score, date: new Date().toISOString() };
                    db.collection('users').doc(currentUser.uid).collection('quizzes').doc(activeQuizRecord.id).update({
                        userAnswers: initialAnswers,
                        results: firebase.firestore.FieldValue.delete(),
                        history: firebase.firestore.FieldValue.arrayUnion(historyEntry)
                    }).then(() => {
                        setUserAnswers(initialAnswers); setResults(null); setStep('answering');
                    });
                });
            };

            if (step === 'setup') return (
                <div className="flex flex-col items-center p-4 h-[100dvh] overflow-y-auto">
                    <div className="bg-white dark:bg-gray-800 p-8 shadow-md w-full max-w-sm no-round border dark:border-gray-700 mt-10">
                        <h1 className="text-xl font-bold mb-6 border-b dark:border-gray-700 pb-2 dark:text-white">新增測驗</h1>
                        <label className="block text-xs font-bold text-gray-500 mb-1">測驗名稱 (加 [#op] 標記為官方)</label>
                        <input type="text" className="w-full mb-4 p-2 border dark:border-gray-600 bg-white dark:bg-gray-700 dark:text-white no-round text-sm" value={testName} onChange={e => setTestName(e.target.value)} />
                        <label className="block text-xs font-bold text-gray-500 mb-1">題數</label>
                        <input type="number" className="w-full mb-4 p-2 border dark:border-gray-600 bg-white dark:bg-gray-700 dark:text-white no-round text-sm" value={numQuestions} onChange={e => setNumQuestions(e.target.value)} />
                        <label className="block text-xs font-bold text-gray-500 mb-1">試卷網址</label>
                        <input type="text" className="w-full mb-6 p-2 border dark:border-gray-600 bg-white dark:bg-gray-700 dark:text-white no-round text-sm" value={questionFileUrl} onChange={e => setQuestionFileUrl(e.target.value)} />
                        <button onClick={handleStartTest} className="w-full bg-black text-white p-3 font-bold no-round">開始作答</button>
                        <button onClick={onBackToDashboard} className="w-full bg-gray-100 text-black mt-3 p-2 font-bold no-round">返回</button>
                    </div>
                </div>
            );

            if (step === 'grading') return (
                <div className="flex flex-col items-center justify-center p-4 h-[100dvh]">
                    <div className="bg-white dark:bg-gray-800 p-8 shadow-md w-full max-w-lg border dark:border-gray-700">
                        <h2 className="font-bold mb-4 text-lg dark:text-white">輸入標準答案</h2>
                        <textarea className="w-full h-40 p-3 border dark:border-gray-600 no-round font-mono mb-4 text-lg uppercase bg-white dark:bg-gray-700 dark:text-white" value={correctAnswersInput} onChange={e => setCorrectAnswersInput(e.target.value)}></textarea>
                        <button onClick={handleGrade} className="w-full bg-black text-white p-3 font-bold">開始批改</button>
                        <button onClick={() => setStep('answering')} className="w-full bg-gray-100 text-black mt-3 p-2 font-bold">返回作答</button>
                    </div>
                </div>
            );

            return (
                <div className="flex flex-col h-[100dvh] bg-gray-100 dark:bg-gray-900 p-2 sm:p-4">
                    <div className="bg-white dark:bg-gray-800 p-4 flex justify-between items-center mb-2 shrink-0 border dark:border-gray-700">
                        <h2 className="font-bold text-sm sm:text-base dark:text-white pr-4">{renderTestName(testName)} {step==='results' && '- 結果'}</h2>
                        <div className="flex space-x-2 shrink-0">
                            {step === 'answering' && <button onClick={() => setStep('grading')} className="bg-black text-white px-4 py-1.5 text-sm font-bold">交卷</button>}
                            {step === 'results' && <button onClick={handleRetake} className="bg-orange-50 dark:bg-orange-900 border border-orange-200 dark:border-orange-700 text-orange-600 dark:text-orange-300 px-3 py-1.5 text-sm font-bold">再做一次</button>}
                            <button onClick={onBackToDashboard} className="bg-gray-100 dark:bg-gray-700 text-black dark:text-white px-4 py-1.5 text-sm font-bold border dark:border-gray-600">返回</button>
                        </div>
                    </div>
                    
                    <div className="flex flex-col md:flex-row flex-grow overflow-hidden relative">
                        {questionFileUrl && (
                            <div className="md:w-1/2 flex flex-col border dark:border-gray-700 bg-white dark:bg-gray-800 mb-2 md:mb-0 md:mr-2">
                                <div className="bg-gray-200 dark:bg-gray-900 p-2 flex space-x-2 items-center shrink-0 border-b dark:border-gray-700">
                                    <span className="text-xs font-bold dark:text-white">縮放預覽：</span>
                                    <button onClick={() => setPdfZoom(z => Math.max(0.5, z - 0.2))} className="bg-white dark:bg-gray-700 px-2 border dark:border-gray-600 dark:text-white font-bold">-</button>
                                    <span className="text-sm font-bold w-12 text-center dark:text-white">{Math.round(pdfZoom * 100)}%</span>
                                    <button onClick={() => setPdfZoom(z => Math.min(3, z + 0.2))} className="bg-white dark:bg-gray-700 px-2 border dark:border-gray-600 dark:text-white font-bold">+</button>
                                </div>
                                <div className="flex-grow w-full relative overflow-auto bg-gray-50 dark:bg-gray-900 custom-scrollbar">
                                    <div style={{ transform: `scale(${pdfZoom})`, transformOrigin: 'top left', width: `${100/pdfZoom}%`, height: `${100/pdfZoom}%` }}>
                                        <iframe src={getEmbedUrl(questionFileUrl)} className="absolute inset-0 w-full h-full border-0"></iframe>
                                    </div>
                                </div>
                            </div>
                        )}
                        
                        <div className="flex-grow border dark:border-gray-700 bg-white dark:bg-gray-800 p-4 overflow-y-auto custom-scrollbar">
                            {step === 'results' ? (
                                <div className="text-center p-10 border dark:border-gray-700">
                                    <h2 className={`text-6xl font-black ${results.score >= 60 ? 'text-green-600' : 'text-red-600'}`}>{results.score}</h2>
                                    <p className="dark:text-white font-bold tracking-widest mt-2">答對 {results.correctCount} / {results.total} 題</p>
                                </div>
                            ) : (
                                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(200px, 1fr))', gap: '8px 12px' }}>
                                    {userAnswers.map((ans, i) => (
                                        <div key={i} className="flex justify-between p-2 border-b dark:border-gray-700">
                                            <span className="font-bold dark:text-gray-400">{i+1}.</span>
                                            <div className="flex space-x-1">
                                                {['A','B','C','D'].map(o => <button key={o} onClick={() => {let a=[...userAnswers]; a[i]=a[i]===o?'':o; setUserAnswers(a);}} className={`w-8 h-8 font-bold border transition-colors ${ans===o ? 'bg-black text-white dark:bg-gray-200 dark:text-black' : 'bg-white dark:bg-gray-700 dark:border-gray-600 dark:text-gray-400'}`}>{o}</button>)}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // --- 6. 主程式 ---
        function Main() {
            const [user, setUser] = useState(null);
            const [userProfile, setUserProfile] = useState(null);
            const [loadingUser, setLoadingUser] = useState(true);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [activeQuizRecord, setActiveQuizRecord] = useState(null);
            const [isDark, setIsDark] = useState(() => localStorage.getItem('theme') === 'dark');
            
            const [dialog, setDialog] = useState(null);
            const showAlert = (message) => setDialog({ type: 'alert', message });
            const showConfirm = (message, onConfirm) => setDialog({ type: 'confirm', message, onConfirm });
            const showPrompt = (message, defaultValue, onConfirm) => setDialog({ type: 'prompt', message, defaultValue, onConfirm });
            const closeDialog = () => setDialog(null);

            useEffect(() => {
                if (isDark) { document.documentElement.classList.add('dark'); localStorage.setItem('theme', 'dark'); } 
                else { document.documentElement.classList.remove('dark'); localStorage.setItem('theme', 'light'); }
            }, [isDark]);

            useEffect(() => {
                let unsubProfile = null;
                const unsubscribeAuth = auth.onAuthStateChanged(usr => {
                    setUser(usr);
                    if (usr) {
                        unsubProfile = db.collection('users').doc(usr.uid).onSnapshot(doc => {
                            if (doc.exists) setUserProfile(doc.data());
                            setLoadingUser(false);
                        });
                    } else { setUserProfile(null); setLoadingUser(false); }
                });
                return () => { unsubscribeAuth(); if (unsubProfile) unsubProfile(); };
            }, []);

            if (loadingUser) return <div className="flex h-screen items-center justify-center font-bold dark:text-white dark:bg-gray-900">系統載入中...</div>;
            if (!user) return <><DialogOverlay dialog={dialog} onClose={closeDialog} /><AuthScreen showAlert={showAlert} /></>;
            if (!userProfile || !userProfile.displayName) return <><DialogOverlay dialog={dialog} onClose={closeDialog} /><ProfileSetup user={user} onComplete={(name) => setUserProfile({...userProfile, displayName: name})} showAlert={showAlert} /></>;

            const TopNav = () => (
                <div className="bg-black dark:bg-gray-950 text-white px-4 flex justify-between items-center h-14 overflow-x-auto custom-scrollbar shrink-0">
                    <div className="flex space-x-6 items-center h-full whitespace-nowrap">
                        <span className="font-black text-lg mr-4 tracking-widest">JJay</span>
                        <button onClick={() => setActiveTab('dashboard')} className={`h-full font-bold transition-colors ${activeTab === 'dashboard' ? 'border-b-4 border-white' : 'text-gray-400 hover:text-white'}`}>我的題庫</button>
                        <button onClick={() => setActiveTab('social')} className={`h-full font-bold transition-colors ${activeTab === 'social' ? 'border-b-4 border-white' : 'text-gray-400 hover:text-white'}`}>社群交流</button>
                        <button onClick={() => setActiveTab('minecraft')} className={`h-full font-bold transition-colors ${activeTab === 'minecraft' ? 'border-b-4 border-white' : 'text-gray-400 hover:text-white'}`}>⛏️ 史蒂夫養成</button>
                        {/* 【功能 6】：個人檔案入口 */}
                        <button onClick={() => setActiveTab('profile')} className={`h-full font-bold transition-colors ${activeTab === 'profile' ? 'border-b-4 border-white' : 'text-gray-400 hover:text-white'}`}>👤 個人檔案</button>
                    </div>
                    <div className="flex items-center space-x-4 pl-4 shrink-0">
                        <button onClick={() => setIsDark(!isDark)} className="text-lg">{isDark ? '☀️' : '🌙'}</button>
                        {userProfile.avatar && <img src={userProfile.avatar} className="w-8 h-8 rounded-full object-cover border border-gray-500" />}
                        <span className="text-sm font-bold hidden sm:inline">{userProfile.displayName}</span>
                        <button onClick={() => auth.signOut()} className="text-xs bg-white text-black px-3 py-1 font-bold no-round hover:bg-gray-200">登出</button>
                    </div>
                </div>
            );

            return (
                <div className="h-[100dvh] flex flex-col overflow-hidden bg-gray-100 dark:bg-gray-900">
                    <DialogOverlay dialog={dialog} onClose={closeDialog} />
                    {activeTab !== 'activeQuiz' && <TopNav />}
                    
                    {activeTab !== 'activeQuiz' ? (
                        <div className="flex-grow pt-4 sm:pt-6 overflow-hidden bg-gray-50 dark:bg-gray-900">
                            {activeTab === 'dashboard' && <Dashboard user={user} userProfile={userProfile} onStartNew={(f) => { setActiveQuizRecord({ folder: f }); setActiveTab('activeQuiz'); }} onContinueQuiz={(rec) => { setActiveQuizRecord(rec); setActiveTab('activeQuiz'); }} showAlert={showAlert} showConfirm={showConfirm} showPrompt={showPrompt} />}
                            {activeTab === 'social' && <SocialDashboard user={user} userProfile={userProfile} showAlert={showAlert} />}
                            {activeTab === 'minecraft' && <MinecraftDashboard user={user} userProfile={userProfile} showAlert={showAlert} />}
                            {activeTab === 'profile' && <ProfilePage user={user} userProfile={userProfile} showAlert={showAlert} />}
                        </div>
                    ) : (
                        <QuizApp currentUser={user} userProfile={userProfile} activeQuizRecord={activeQuizRecord} onBackToDashboard={() => setActiveTab('dashboard')} showAlert={showAlert} showConfirm={showConfirm} showPrompt={showPrompt} />
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Main />);
    </script>
</body>
</html>
