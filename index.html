function AuthScreen({showAlert}){const[isSignUp,setIsSignUp]=useState(false);const[email,setEmail]=useState('');const[pwd,setPwd]=useState('');const[loading,setLoading]=useState(false);const handleAuth=(e)=>{e.preventDefault();setLoading(true);const safeEmail=email.trim().toLowerCase();const req=isSignUp?auth.createUserWithEmailAndPassword(safeEmail,pwd):auth.signInWithEmailAndPassword(safeEmail,pwd);req.then((cred)=>{if(isSignUp){return db.collection('users').doc(cred.user.uid).set({email:safeEmail,friends:[],unreadChats:{},folders:['жңӘеҲҶйЎһ'],mcData:{diamonds:0,level:1,exp:0,hunger:10,items:[],cats:0,lastCheckIn:null},hasSeenTutorial:false,avatarUrl:'',bio:'йҖҷжҳҜдёҖдҪҚзҶұж„ӣеӯёзҝ’зҡ„зҘһз§ҳзҺ©е®¶гҖӮ'}).catch(err=>showAlert("иЁ»еҶҠжҲҗеҠҹдҪҶе»әжӘ”еӨұж•—: "+err.message));}else{db.collection('users').doc(cred.user.uid).set({email:safeEmail},{merge:true});}}).catch(err=>showAlert('еӨұж•—пјҡ'+err.message)).finally(()=>setLoading(false));};return <div className="flex h-full items-center justify-center p-4"><form onSubmit={handleAuth} className="bg-white dark:bg-gray-800 p-8 shadow-md w-full max-w-sm no-round border border-gray-200 dark:border-gray-700"><h1 className="text-xl font-bold mb-6 text-center dark:text-white">JJayз·ҡдёҠжё¬й©—</h1><input type="email" placeholder="йӣ»еӯҗйғөд»¶" className="w-full mb-3 p-3 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-black dark:text-white no-round" value={email} onChange={e=>setEmail(e.target.value)} required/><input type="password" placeholder="еҜҶзўј" className="w-full mb-6 p-3 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-black dark:text-white no-round" value={pwd} onChange={e=>setPwd(e.target.value)} required/><button type="submit" className="w-full bg-black dark:bg-gray-200 text-white dark:text-black p-3 font-bold no-round" disabled={loading}>{loading?'иҷ•зҗҶдёӯ...':(isSignUp?'иЁ»еҶҠ':'зҷ»е…Ҙ')}</button><button type="button" onClick={()=>setIsSignUp(!isSignUp)} className="w-full mt-4 text-sm text-gray-500 dark:text-gray-400 hover:text-black dark:hover:text-white">{isSignUp?'е·ІжңүеёіиҷҹпјҹеүҚеҫҖзҷ»е…Ҙ':'жІ’жңүеёіиҷҹпјҹеүҚеҫҖиЁ»еҶҠ'}</button></form></div>;}

function ProfilePage({user,userProfile,showAlert}){const[bio,setBio]=useState(userProfile.bio||'');const[editBio,setEditBio]=useState(false);const fileRef=useRef(null);const mcData=userProfile.mcData||{diamonds:0,level:1,exp:0};const upload=(e)=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=(ev)=>{const img=new Image();img.onload=()=>{const cvs=document.createElement('canvas');let w=img.width,h=img.height;if(w>h&&w>200){h*=200/w;w=200;}else if(h>200){w*=200/h;h=200;}cvs.width=w;cvs.height=h;cvs.getContext('2d').drawImage(img,0,0,w,h);db.collection('users').doc(user.uid).update({avatarUrl:cvs.toDataURL('image/jpeg',0.6)}).then(()=>showAlert("вң… жӣҙж–°жҲҗеҠҹ")).catch(e=>showAlert("еӨұж•—:"+e.message));};img.src=ev.target.result;};r.readAsDataURL(f);};const saveBio=()=>{db.collection('users').doc(user.uid).update({bio:bio.trim()}).then(()=>setEditBio(false)).catch(e=>showAlert("еӨұж•—:"+e.message));};return <div className="max-w-2xl mx-auto p-4 pt-10 h-[calc(100dvh-100px)] overflow-y-auto custom-scrollbar"><div className="bg-white dark:bg-gray-800 p-8 border border-gray-200 dark:border-gray-700 shadow-md text-center"><div className="relative inline-block mb-4 cursor-pointer group" onClick={()=>fileRef.current.click()}><img src={userProfile.avatarUrl||"https://minotar.net/helm/Steve/150.png"} className="w-32 h-32 rounded-full border-4 object-cover transition-transform group-hover:scale-105"/><div className="absolute inset-0 bg-black bg-opacity-50 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 text-white font-bold">жӣҙжҸӣ</div><input type="file" accept="image/*" className="hidden" ref={fileRef} onChange={upload}/></div><h1 className="text-3xl font-black mb-1 dark:text-white">{userProfile.displayName}</h1><p className="text-sm text-gray-500 mb-6">{userProfile.email}</p><div className="bg-gray-50 dark:bg-gray-900 p-4 border border-gray-200 dark:border-gray-700 mb-8 text-left"><div className="flex justify-between function SkateboardGame({onGameOver,onQuit}){const cvsRef=useRef(null);const[gs,setGs]=useState('start');const[score,setScore]=useState(0);const bgm=useRef(null);const LOG_W=800;const LOG_H=350;const ref=useRef({id:null,p:{x:50,y:0,w:40,h:40,dy:0,j:0},obs:[],dmds:[],spd:6,sc:0,frm:0,lSp:0,gy:250,lT:0});const imgs=useRef({s:new Image(),st:new Image(),d:new Image(),z:new Image(),h:new Image()});useEffect(()=>{imgs.current.s.src="https://minotar.net/helm/Steve/64.png";imgs.current.st.src="https://raw.githubusercontent.com/InventivetalentDev/minecraft-assets/1.20/assets/minecraft/textures/block/stone.png";imgs.current.d.src="https://raw.githubusercontent.com/InventivetalentDev/minecraft-assets/1.20/assets/minecraft/textures/item/diamond.png";imgs.current.z.src="https://minotar.net/helm/Zombie/64.png";imgs.current.h.src="https://minotar.net/helm/Husk/64.png";bgm.current=new Audio("https://raw.githubusercontent.com/libgdx/libgdx-demo-superjumper/master/android/assets/data/music.mp3");bgm.current.loop=true;bgm.current.volume=0.3;const cvs=cvsRef.current;if(cvs){const dpr=window.devicePixelRatio||1;cvs.width=LOG_W*dpr;cvs.height=LOG_H*dpr;cvs.getContext('2d').scale(dpr,dpr);}return ()=>{if(ref.current.id)cancelAnimationFrame(ref.current.id);if(bgm.current){bgm.current.pause();bgm.current.currentTime=0;}};},[]);const start=()=>{setGs('playing');setScore(0);if(bgm.current){bgm.current.currentTime=0;bgm.current.play().catch(e=>console.log(e));}ref.current={id:null,p:{x:50,y:150,w:40,h:40,dy:0,j:0},obs:[],dmds:[],spd:6.5,sc:0,frm:0,lSp:0,gy:250,lT:performance.now()};ref.current.id=requestAnimationFrame(loop);};const jump=()=>{const p=ref.current.p;if(p.j<2){p.dy=-11.5;p.j++;}};const loop=(t)=>{const cvs=cvsRef.current;if(!cvs)return;const st=ref.current;if(!t)t=performance.now();const int=1000/60;const e=t-st.lT;if(e<int){st.id=requestAnimationFrame(loop);return;}st.lT=t-(e%int);const ctx=cvs.getContext('2d');let pB=st.p.y+st.p.h;st.p.dy+=0.7;st.p.y+=st.p.dy;let iP=false,dead=false;st.obs=st.obs.filter(o=>o.x+o.w>-50);st.dmds=st.dmds.filter(d=>d.x+d.w>-50&&!d.c);st.obs.forEach(o=>{if(o.t==='pit'){let c=st.p.x+st.p.w/2;if(c>o.x+5&&c<o.x+o.w-5)iP=true;}});if(st.p.y+st.p.h>=st.gy){if(!iP){if(pB<=st.gy+10){st.p.y=st.gy-st.p.h;st.p.dy=0;st.p.j=0;}else dead=true;}}if(st.p.y>LOG_H){end();return;}for(let i=0;i<st.obs.length;i++){let o=st.obs[i];if(o.t==='pit'){o.x-=st.spd;continue;}if(o.t==='zombie')o.x-=(st.spd+1.2);else if(o.t==='husk'){o.x-=(st.spd+1.2);let d=o.x-(st.p.x+st.p.w);if(d>10&&d<110&&st.p.y>=st.gy-10&&o.y>=st.gy-o.h-5)o.dy=-13.5;o.dy+=0.7;o.y+=o.dy;if(o.y+o.h>=st.gy){o.y=st.gy-o.h;o.dy=0;}}else o.x-=st.spd;if(st.p.x+8<o.x+o.w-8&&st.p.x+st.p.w-8>o.x+8&&st.p.y+5<o.y+o.h-5&&st.p.y+st.p.h>o.y+5){if(o.t==='stone'){if(st.p.dy>0&&pB<=o.y+15){st.p.y=o.y-st.p.h;st.p.dy=0;st.p.j=0;}else dead=true;}else dead=true;}}st.dmds.forEach(d=>{d.x-=st.spd;if(!d.c&&st.p.x<d.x+d.w&&st.p.x+st.p.w>d.x&&st.p.y<d.y+d.h&&st.p.y+st.p.h>d.y){d.c=true;st.sc+=1;setScore(st.sc);}});if(dead){end();return;}st.frm++;if(st.frm%100===0&&st.spd<15)st.spd+=0.2;let sI=Math.max(40,100-st.spd*4);const lO=st.obs[st.obs.length-1];if(lO&&lO.t==='pit')sI=Math.max(sI,Math.floor((lO.w/st.spd)+20));if(st.frm-st.lSp>sI){if(Math.random()<0.55){st.lSp=st.frm;let r=Math.random();if(r<0.3)st.obs.push({t:'stone',x:LOG_W,y:st.gy-40,w:40,h:40});else if(r<0.6)st.obs.push({t:'pit',x:LOG_W,y:st.gy,w:Math.random()*150+150,h:100});else if(r<0.8)st.obs.push({t:'zombie',x:LOG_W,y:st.gy-40,w:40,h:40});else st.obs.push({t:'husk',x:LOG_W,y:st.gy-40,w:40,h:40,dy:0});}}if(st.frm%Math.floor(Math.random()*300+400)===0){st.dmds.push({x:LOG_W,y:st.gy-50-Math.random()*100,w:24,h:24,c:false});}ctx.clearRect(0,0,LOG_W,LOG_H);ctx.fillStyle='#5A5A5A';ctx.fillRect(0,st.gy,LOG_W,LOG_H-st.gy);ctx.fillStyle='#4A4A4A';ctx.fillRect(0,st.gy,LOG_W,8);st.obs.forEach(o=>{if(o.t==='pit')ctx.clearRect(o.x,st.gy,o.w,LOG_H-st.gy);});st.obs.forEach(o=>{if(o.t==='stone'){if(imgs.current.st.complete)ctx.drawImage(imgs.current
