        // --- 社群模組 ---
        function SocialDashboard({ user, userProfile, showAlert, showConfirm, setActiveQuizRecord, setActiveTab }) {
            const [friends, setFriends] = useState(userProfile.friends || []);
            const [friendEmail, setFriendEmail] = useState('');
            const [activeChat, setActiveChat] = useState(null);
            const [messages, setMessages] = useState([]);
            const [newMessage, setNewMessage] = useState('');
            const [sendingImage, setSendingImage] = useState(false);
            const fileInputRef = useRef(null);
            const [messageLimit, setMessageLimit] = useState(5);
            const [lastMsgIdForScroll, setLastMsgIdForScroll] = useState(null);
            
            // 圖片預覽狀態
            const [previewImage, setPreviewImage] = useState(null);

            const getChatId = (uid1, uid2) => [uid1, uid2].sort().join('_');

            useEffect(() => {
                if (activeChat && userProfile && userProfile.unreadChats && userProfile.unreadChats[activeChat.uid]) {
                    db.collection('users').doc(user.uid).update({
                        [`unreadChats.${activeChat.uid}`]: firebase.firestore.FieldValue.delete()
                    }).catch(e => console.error("清除紅點失敗", e));
                }
            }, [activeChat, userProfile, user.uid]);

            // 自動清除過期圖片與監聽訊息
            useEffect(() => {
                if(!activeChat) return;
                const chatId = getChatId(user.uid, activeChat.uid);
                
                const unsub = db.collection('chats').doc(chatId).collection('messages')
                    .orderBy('timestamp', 'desc')
                    .limit(messageLimit)
                    .onSnapshot(snap => {
                        const msgs = snap.docs.map(doc => ({ id: doc.id, ...doc.data() })).reverse();
                        
                        // 檢查圖片過期
                        const now = Date.now();
                        msgs.forEach(msg => {
                            if (msg.type === 'image' && msg.expiresAt && now > msg.expiresAt) {
                                db.collection('chats').doc(chatId).collection('messages').doc(msg.id).delete();
                            }
                        });
                        
                        setMessages(msgs);
                        if(msgs.length > 0 && msgs[msgs.length-1].id !== lastMsgIdForScroll) {
                            setLastMsgIdForScroll(msgs[msgs.length-1].id);
                        }
                    });
                return () => unsub();
            }, [activeChat, user.uid, messageLimit]);

            // 滾動到底部
            useEffect(() => {
                const el = document.getElementById('chat-end');
                if(el) el.scrollIntoView({ behavior: 'smooth' });
            }, [lastMsgIdForScroll]);

            const handleAddFriend = async (e) => {
                e.preventDefault();
                const targetEmail = friendEmail.trim().toLowerCase();
                if(!targetEmail) return;
                if(targetEmail === user.email) return showAlert('不能加自己為好友！');
                if(friends.some(f => f.email === targetEmail)) return showAlert('已經是好友了！');

                try {
                    const snap = await db.collection('users').where('email', '==', targetEmail).get();
                    if(snap.empty) return showAlert('找不到該用戶，請確認電子郵件是否正確！');
                    
                    const targetUser = snap.docs[0];
                    const targetData = targetUser.data();
                    
                    const newFriendForMe = { uid: targetUser.id, email: targetEmail, displayName: targetData.displayName || '未命名' };
                    const newFriendForTarget = { uid: user.uid, email: user.email, displayName: userProfile.displayName || '未命名' };
                    
                    await db.collection('users').doc(user.uid).update({ friends: [...friends, newFriendForMe] });
                    await db.collection('users').doc(targetUser.id).update({ friends: [...(targetData.friends || []), newFriendForTarget] });
                    
                    setFriends([...friends, newFriendForMe]);
                    setFriendEmail('');
                    showAlert(`成功加入好友：${targetData.displayName || targetEmail}`);
                } catch(e) { showAlert('加入失敗：' + e.message); }
            };

            const handleSendMessage = async (e) => {
                if(e) e.preventDefault();
                if(!newMessage.trim() && !sendingImage) return;
                
                const chatId = getChatId(user.uid, activeChat.uid);
                const msgData = {
                    senderId: user.uid,
                    senderName: userProfile.displayName,
                    text: newMessage.trim(),
                    type: 'text',
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                };

                try {
                    await db.collection('chats').doc(chatId).collection('messages').add(msgData);
                    await db.collection('users').doc(activeChat.uid).update({ [`unreadChats.${user.uid}`]: true });
                    setNewMessage('');
                } catch(err) { showAlert("發送失敗: " + err.message); }
            };

            const handleSendImage = async (e) => {
                const file = e.target.files[0];
                if(!file) return;
                try {
                    setSendingImage(true);
                    const base64Img = await compressImage(file);
                    
                    const chatId = getChatId(user.uid, activeChat.uid);
                    await db.collection('chats').doc(chatId).collection('messages').add({
                        senderId: user.uid,
                        senderName: userProfile.displayName,
                        type: 'image',
                        imageUrl: base64Img,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                        expiresAt: Date.now() + 5 * 60 * 1000 // 5分鐘後過期
                    });
                    await db.collection('users').doc(activeChat.uid).update({ [`unreadChats.${user.uid}`]: true });
                } catch (error) {
                    showAlert("圖片發送失敗：" + error.message);
                } finally {
                    setSendingImage(false);
                    e.target.value = '';
                }
            };

            const handleSendRPS = async () => {
                const choices = ['✊', '🖐️', '✌️'];
                const choice = choices[Math.floor(Math.random() * 3)];
                const chatId = getChatId(user.uid, activeChat.uid);
                await db.collection('chats').doc(chatId).collection('messages').add({
                    senderId: user.uid,
                    senderName: userProfile.displayName,
                    type: 'game_rps',
                    text: `出了 ${choice}`,
                    rpsFace: choice,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                await db.collection('users').doc(activeChat.uid).update({ [`unreadChats.${user.uid}`]: true });
            };

            const handlePlaySharedQuiz = (quizCode) => {
                if (!quizCode) return showAlert('無效的測驗代碼！');
                setActiveQuizRecord({
                    folder: '朋友分享',
                    quizCode: quizCode // 帶入代碼
                });
                setActiveTab('activeQuiz');
            };

            const renderMessage = (msg) => {
                const isMe = msg.senderId === user.uid;
                let content;
                
                if (msg.type === 'text') {
                    content = <p className="whitespace-pre-wrap break-words">{msg.text}</p>;
                } else if (msg.type === 'image') {
                    const minsLeft = Math.max(0, Math.ceil((msg.expiresAt - Date.now()) / 60000));
                    content = (
                        <div className="flex flex-col items-center cursor-pointer" onClick={() => setPreviewImage(msg.imageUrl)}>
                            <img src={msg.imageUrl} className="max-w-[150px] sm:max-w-xs no-round border-2 border-dashed border-gray-400 opacity-90 hover:opacity-100 transition-opacity" alt="已上傳圖片" />
                            <p className="text-[10px] text-orange-400 font-bold mt-1">⏱ 閱後即焚：大約 {minsLeft} 分鐘後刪除</p>
                        </div>
                    );
                } else if (msg.type === 'game_rps') {
                    content = (
                        <div className="text-center py-2 px-4">
                            <span className="text-5xl leading-none">{msg.rpsFace}</span>
                            <p className="mt-2 font-bold">{msg.text}</p>
                        </div>
                    );
                } else if (msg.type === 'score_share') {
                    content = (
                        <div className="text-center px-2 py-1">
                            <p className={`mb-2 font-bold ${isMe ? 'text-yellow-300' : 'text-yellow-400'}`}>🏆 戰績炫耀</p>
                            <QuizNameDisplay name={msg.scoreData?.testName} className="mb-1 text-sm font-bold truncate block" />
                            <h3 className={`text-3xl font-black mb-1 ${isMe ? 'text-white' : 'text-black dark:text-white'}`}>
                                {msg.scoreData?.score} <span className="text-sm">分</span>
                            </h3>
                            <p className="text-[10px] opacity-75">耗時: {formatTime(msg.scoreData?.duration)} | 正確: {msg.scoreData?.correctCount}</p>
                            {msg.scoreData?.quizCode && (
                                <button onClick={() => handlePlaySharedQuiz(msg.scoreData.quizCode)} className={`mt-3 w-full py-1 text-xs font-bold no-round ${isMe ? 'bg-white text-blue-600 hover:bg-gray-100' : 'bg-blue-600 text-white hover:bg-blue-700'} transition-colors`}>
                                    我也要測驗
                                </button>
                            )}
                        </div>
                    );
                } else if (msg.type === 'quiz_share') {
                    content = (
                        <div className="text-center px-2 py-1">
                            <p className="mb-2 text-xl">🎁</p>
                            <p className="mb-1 font-bold">送你一份試卷</p>
                            <QuizNameDisplay name={msg.quizData?.name} className="text-sm truncate opacity-80 block" />
                            <button onClick={() => handlePlaySharedQuiz(msg.quizData?.quizCode)} className={`mt-3 w-full py-1.5 text-xs font-bold no-round ${isMe ? 'bg-white text-green-600 hover:bg-gray-100' : 'bg-green-600 text-white hover:bg-green-700'} transition-colors`}>
                                接受挑戰
                            </button>
                        </div>
                    );
                }

                return (
                    <div key={msg.id} className={`flex ${isMe ? 'justify-end' : 'justify-start'} mb-4 animate-fade-in-up`}>
                        <div className={`max-w-[75%] p-3 no-round shadow-sm text-sm ${isMe ? 'bg-black text-white dark:bg-gray-300 dark:text-black border border-black dark:border-gray-300' : 'bg-white text-gray-800 dark:bg-gray-800 dark:text-gray-100 border border-gray-200 dark:border-gray-700'}`}>
                            {content}
                            <div className={`text-[10px] mt-1 text-right ${isMe ? 'text-gray-400 dark:text-gray-600' : 'text-gray-400 dark:text-gray-500'}`}>
                                {msg.timestamp ? new Date(msg.timestamp.toDate()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '剛剛'}
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="flex flex-col h-full bg-gray-50 dark:bg-gray-900 md:flex-row relative">
                    {/* 左側：好友列表 */}
                    <div className={`w-full md:w-1/3 border-r border-gray-200 dark:border-gray-700 flex flex-col bg-white dark:bg-gray-800 ${activeChat ? 'hidden md:flex' : 'flex'}`}>
                        <div className="p-4 border-b border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-900">
                            <h2 className="text-lg font-black mb-3 dark:text-white flex items-center">
                                <span className="mr-2">💬</span> 社交與好友
                            </h2>
                            <form onSubmit={handleAddFriend} className="flex">
                                <input type="email" placeholder="輸入好友信箱" className="flex-grow p-2 text-sm border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-black dark:text-white no-round outline-none focus:border-black dark:focus:border-white" value={friendEmail} onChange={e=>setFriendEmail(e.target.value)} onFocus={handleFocusScroll} />
                                <button type="submit" className="bg-black dark:bg-gray-200 text-white dark:text-black px-4 font-bold no-round hover:bg-gray-800 dark:hover:bg-gray-300 text-sm">+</button>
                            </form>
                        </div>
                        <div className="flex-grow overflow-y-auto custom-scrollbar">
                            {friends.length === 0 ? (
                                <p className="text-center text-gray-400 mt-10 text-sm p-4">還沒有好友，趕快加一個來炫耀你的成績！</p>
                            ) : (
                                friends.map(f => (
                                    <div key={f.uid} onClick={() => setActiveChat(f)} className={`p-4 border-b border-gray-100 dark:border-gray-700 cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors flex items-center justify-between ${activeChat?.uid === f.uid ? 'bg-gray-100 dark:bg-gray-700 border-l-4 border-black dark:border-white' : 'border-l-4 border-transparent'}`}>
                                        <div className="font-bold dark:text-gray-200">{f.displayName}</div>
                                        {userProfile.unreadChats && userProfile.unreadChats[f.uid] && (
                                            <span className="w-2.5 h-2.5 bg-red-500 rounded-full animate-pulse shadow-sm shadow-red-300"></span>
                                        )}
                                    </div>
                                ))
                            )}
                        </div>
                    </div>

                    {/* 右側：聊天室 */}
                    <div className={`w-full md:w-2/3 flex flex-col bg-gray-50 dark:bg-gray-900 ${!activeChat ? 'hidden md:flex' : 'flex'}`}>
                        {activeChat ? (
                            <>
                                <div className="p-3 bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 flex items-center shadow-sm z-10 sticky top-0">
                                    <button onClick={() => setActiveChat(null)} className="md:hidden mr-3 p-1 text-gray-500 hover:text-black dark:text-gray-400 dark:hover:text-white">
                                        ⬅️ 
                                    </button>
                                    <h3 className="font-bold dark:text-white flex items-center">
                                        <span className="w-2 h-2 bg-green-500 rounded-full mr-2"></span>
                                        {activeChat.displayName}
                                    </h3>
                                </div>
                                
                                <div className="flex-grow overflow-y-auto p-4 custom-scrollbar bg-gray-50 dark:bg-gray-900 flex flex-col">
                                    {messages.length >= messageLimit && (
                                        <button onClick={() => setMessageLimit(prev => prev + 10)} className="text-xs text-gray-500 hover:text-black dark:hover:text-white mb-4 text-center py-2 bg-white dark:bg-gray-800 no-round border border-gray-200 dark:border-gray-700">
                                            載入更多訊息...
                                        </button>
                                    )}
                                    {messages.map(renderMessage)}
                                    <div id="chat-end" />
                                </div>

                                <div className="p-3 bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 sticky bottom-0">
                                    <form onSubmit={handleSendMessage} className="flex flex-col gap-2">
                                        <div className="flex items-center gap-2">
                                            <button type="button" onClick={() => fileInputRef.current.click()} className="p-2 bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-600 no-round transition-colors" title="傳送閱後即焚圖片">
                                                📷
                                            </button>
                                            <input type="file" ref={fileInputRef} accept="image/*" className="hidden" onChange={handleSendImage} />
                                            
                                            <button type="button" onClick={handleSendRPS} className="p-2 bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-600 no-round transition-colors text-sm font-bold" title="猜拳">
                                                ✌️ 猜拳
                                            </button>
                                        </div>
                                        <div className="flex">
                                            <input type="text" className="flex-grow p-3 text-sm border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 text-black dark:text-white no-round outline-none focus:border-black dark:focus:border-white" placeholder="輸入訊息..." value={newMessage} onChange={e=>setNewMessage(e.target.value)} onFocus={handleFocusScroll} disabled={sendingImage} />
                                            <button type="submit" disabled={sendingImage} className="bg-black dark:bg-gray-200 text-white dark:text-black px-6 font-bold no-round hover:bg-gray-800 dark:hover:bg-gray-300 text-sm transition-colors disabled:opacity-50">
                                                {sendingImage ? '傳送中' : '發送'}
                                            </button>
                                        </div>
                                    </form>
                                </div>
                            </>
                        ) : (
                            <div className="flex-grow flex items-center justify-center text-gray-400 flex-col">
                                <span className="text-4xl mb-3 opacity-50">💬</span>
                                <p className="font-bold tracking-widest">選擇好友開始聊天</p>
                            </div>
                        )}
                    </div>

                    {/* 圖片放大預覽 Modal */}
                    {previewImage && (
                        <div className="fixed inset-0 z-[100] bg-black bg-opacity-90 flex items-center justify-center p-4 cursor-pointer" onClick={() => setPreviewImage(null)}>
                            <img src={previewImage} className="max-w-full max-h-full object-contain" alt="預覽" />
                            <div className="absolute top-4 right-4 text-white font-bold text-xl bg-black bg-opacity-50 w-10 h-10 flex items-center justify-center rounded-full">✖</div>
                        </div>
                    )}
                </div>
            );
        }

        function Dashboard({ user, userProfile, onStartNew, onContinueQuiz, showAlert, showConfirm, showPrompt }) {
            const [records, setRecords] = useState([]);
            const [folders, setFolders] = useState(userProfile.folders || ['未分類']);
            const [activeFolder, setActiveFolder] = useState('所有試卷');
            const [filters, setFilters] = useState({ todo: true, doing: true, done: true });
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const unsub = db.collection('users').doc(user.uid).collection('records')
                    .orderBy('lastUpdated', 'desc')
                    .onSnapshot(snap => {
                        setRecords(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                        setLoading(false);
                    }, err => {
                        console.error("載入紀錄失敗:", err);
                        setLoading(false);
                    });
                return () => unsub();
            }, [user.uid]);

            const handleDelete = (id) => showConfirm('確定要刪除這筆紀錄嗎？此動作無法復原。', () => db.collection('users').doc(user.uid).collection('records').doc(id).delete());

            const toggleFilter = (key) => setFilters(prev => ({ ...prev, [key]: !prev[key] }));

            // 將試卷代碼匯入為同一個代碼的測驗
            const handleImportCode = () => {
                showPrompt('請輸入朋友分享的測驗代碼：\n(匯入後將保持原官方代碼，方便比較成績)', (code) => {
                    if(!code) return;
                    onContinueQuiz({ folder: activeFolder === '所有試卷' ? '未分類' : activeFolder, quizCode: code });
                });
            };

            const filteredRecords = records.filter(r => {
                if (activeFolder !== '所有試卷' && r.folder !== activeFolder) return false;
                if (!filters.todo && (r.status === 'todo' || !r.status)) return false;
                if (!filters.doing && r.status === 'doing') return false;
                if (!filters.done && r.status === 'done') return false;
                return true;
            });

            return (
                <div className="flex flex-col h-full overflow-hidden bg-gray-50 dark:bg-gray-900">
                    {/* 頂部工具列 */}
                    <div className="px-4 py-3 bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 shadow-sm shrink-0 flex flex-wrap gap-2 items-center justify-between z-10 sticky top-0">
                        <div className="flex gap-2 w-full sm:w-auto">
                            <button onClick={() => onStartNew(activeFolder === '所有試卷' ? '未分類' : activeFolder)} className="flex-1 sm:flex-none bg-black dark:bg-gray-200 text-white dark:text-black px-4 py-2 no-round font-bold text-sm hover:bg-gray-800 dark:hover:bg-gray-300 shadow-sm transition-colors">
                                ➕ 新增測驗
                            </button>
                            <button onClick={handleImportCode} className="flex-1 sm:flex-none bg-white dark:bg-gray-700 text-black dark:text-white border border-black dark:border-gray-500 px-4 py-2 no-round font-bold text-sm hover:bg-gray-100 dark:hover:bg-gray-600 shadow-sm transition-colors">
                                📥 代碼匯入
                            </button>
                        </div>
                        <div className="flex gap-3 bg-gray-100 dark:bg-gray-800 p-1.5 no-round border border-gray-200 dark:border-gray-700 w-full sm:w-auto overflow-x-auto custom-scrollbar">
                            <span className="font-bold text-gray-500 dark:text-gray-400 border-r border-gray-300 dark:border-gray-600 pr-3">狀態篩選</span>
                            <label className="flex items-center space-x-1.5 text-sm cursor-pointer hover:text-black dark:hover:text-white dark:text-gray-300">
                                <input type="checkbox" checked={filters.todo} onChange={() => toggleFilter('todo')} className="w-4 h-4 accent-black dark:accent-white" />
                                <span className="font-bold">未作測驗</span>
                            </label>
                            <label className="flex items-center space-x-1.5 text-sm cursor-pointer hover:text-black dark:hover:text-white dark:text-gray-300">
                                <input type="checkbox" checked={filters.doing} onChange={() => toggleFilter('doing')} className="w-4 h-4 accent-black dark:accent-white" />
                                <span className="font-bold text-orange-600 dark:text-orange-400">進行中</span>
                            </label>
                            <label className="flex items-center space-x-1.5 text-sm cursor-pointer hover:text-black dark:hover:text-white dark:text-gray-300">
                                <input type="checkbox" checked={filters.done} onChange={() => toggleFilter('done')} className="w-4 h-4 accent-black dark:accent-white" />
                                <span className="font-bold text-green-600 dark:text-green-400">已完成</span>
                            </label>
                        </div>
                    </div>

                    <div className="flex flex-1 overflow-hidden relative">
                        {/* 桌面版左側資料夾導覽 */}
                        <div className="hidden md:flex w-64 flex-col bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 p-4 shrink-0 overflow-y-auto custom-scrollbar">
                            <h3 className="text-xs font-black text-gray-400 dark:text-gray-500 mb-4 tracking-widest uppercase">資料夾分類</h3>
                            <button onClick={() => setActiveFolder('所有試卷')} className={`text-left px-4 py-2 mb-1 no-round font-bold text-sm transition-colors ${activeFolder === '所有試卷' ? 'bg-black text-white dark:bg-gray-300 dark:text-black' : 'text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700'}`}>
                                📁 所有試卷
                            </button>
                            {folders.map(f => (
                                <button key={f} onClick={() => setActiveFolder(f)} className={`text-left px-4 py-2 mb-1 no-round font-bold text-sm transition-colors ${activeFolder === f ? 'bg-black text-white dark:bg-gray-300 dark:text-black' : 'text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700'}`}>
                                    📂 {f}
                                </button>
                            ))}
                        </div>

                        {/* 主要內容區 */}
                        <div className="flex-1 p-4 md:p-6 overflow-y-auto custom-scrollbar bg-gray-50 dark:bg-gray-900">
                            {/* 手機版資料夾選擇 */}
                            <div className="md:hidden mb-4 bg-white dark:bg-gray-800 p-2 border border-gray-200 dark:border-gray-700">
                                <select className="w-full p-2 bg-transparent text-black dark:text-white font-bold outline-none border-b-2 border-black dark:border-gray-500" value={activeFolder} onChange={e => setActiveFolder(e.target.value)}>
                                    <option value="所有試卷" className="dark:bg-gray-800">📁 所有試卷</option>
                                    {folders.map(f => <option key={f} value={f} className="dark:bg-gray-800">📂 {f}</option>)}
                                </select>
                            </div>

                            {loading ? (
                                <div className="text-center py-20 text-gray-400 font-bold animate-pulse tracking-widest">載入中...</div>
                            ) : filteredRecords.length === 0 ? (
                                <div className="text-center py-20 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 shadow-sm">
                                    <span className="text-5xl mb-4 block opacity-50">📭</span>
                                    <p className="text-gray-500 dark:text-gray-400 font-bold tracking-wider">此分類目前沒有試卷</p>
                                    <button onClick={() => onStartNew(activeFolder === '所有試卷' ? '未分類' : activeFolder)} className="mt-4 text-black dark:text-gray-300 font-bold underline hover:text-gray-600 dark:hover:text-white">點我新增一份測驗</button>
                                </div>
                            ) : (
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                                    {filteredRecords.map(r => (
                                        <div key={r.id} className="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 shadow-sm p-5 hover:shadow-md transition-shadow relative group flex flex-col h-full">
                                            <div className="flex justify-between items-start mb-3">
                                                <div className="flex gap-2">
                                                    {!r.status || r.status === 'todo' ? <span className="bg-gray-200 dark:bg-gray-700 text-gray-600 dark:text-gray-300 text-[10px] px-2 py-0.5 font-bold tracking-widest no-round">未作</span> : null}
                                                    {r.status === 'doing' ? <span className="bg-orange-100 dark:bg-orange-900 text-orange-700 dark:text-orange-300 text-[10px] px-2 py-0.5 font-bold tracking-widest no-round border border-orange-200 dark:border-orange-800">進行中</span> : null}
                                                    {r.status === 'done' ? <span className="bg-green-100 dark:bg-green-900 text-green-700 dark:text-green-300 text-[10px] px-2 py-0.5 font-bold tracking-widest no-round border border-green-200 dark:border-green-800">已完成</span> : null}
                                                </div>
                                                <button onClick={(e) => { e.stopPropagation(); handleDelete(r.id); }} className="text-gray-300 dark:text-gray-600 hover:text-red-500 dark:hover:text-red-400 px-2 py-1 transition-colors">✖</button>
                                            </div>
                                            
                                            <h4 className="font-bold text-lg mb-2 line-clamp-2 dark:text-white min-h-[56px]">
                                                <QuizNameDisplay name={r.name || '未命名試卷'} />
                                            </h4>
                                            
                                            <div className="text-xs text-gray-500 dark:text-gray-400 mb-4 space-y-1">
                                                <p>📁 {r.folder || '未分類'}</p>
                                                <p>🕒 {r.lastUpdated ? new Date(r.lastUpdated.toDate()).toLocaleString() : '未知'}</p>
                                                {r.quizCode && <p className="text-[10px] text-gray-400 font-mono mt-1 select-all cursor-pointer bg-gray-50 dark:bg-gray-700 px-1 inline-block" title="雙擊複製">代碼: {r.quizCode}</p>}
                                            </div>
                                            
                                            {r.status === 'done' && r.scores && r.scores.length > 0 && (
                                                <div className="mb-4 bg-gray-50 dark:bg-gray-700 p-2 no-round border border-gray-100 dark:border-gray-600 text-sm">
                                                    <div className="flex justify-between mb-1">
                                                        <span className="font-bold text-gray-600 dark:text-gray-300">最高分：</span>
                                                        <span className="font-black text-black dark:text-white">{Math.max(...r.scores.map(s=>s.score))} 分</span>
                                                    </div>
                                                    <div className="text-[10px] text-gray-500 dark:text-gray-400 text-right">共測驗 {r.scores.length} 次</div>
                                                </div>
                                            )}
                                            
                                            <div className="mt-auto">
                                                <button onClick={() => onContinueQuiz(r)} className="w-full bg-black dark:bg-gray-200 text-white dark:text-black font-bold py-2.5 no-round hover:bg-gray-800 dark:hover:bg-gray-300 transition-colors text-sm">
                                                    {r.status === 'done' ? '查看結果 / 再做一次' : (r.status === 'doing' ? '繼續測驗' : '開始測驗')}
                                                </button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        function QuizApp({ currentUser, userProfile, activeQuizRecord, onBackToDashboard, showAlert, showConfirm, showPrompt }) {
            const [mode, setMode] = useState('setup');
            const [testName, setTestName] = useState('未命名測驗');
            const [folder, setFolder] = useState('未分類');
            const [questionCount, setQuestionCount] = useState(50);
            const [questionFileUrl, setQuestionFileUrl] = useState('');
            const [questionText, setQuestionText] = useState('');
            const [answers, setAnswers] = useState({});
            const [duration, setDuration] = useState(0);
            const [startTime, setStartTime] = useState(null);
            const [timerState, setTimerState] = useState('stopped');
            const [standardAnswers, setStandardAnswers] = useState({});
            const [scoreData, setScoreData] = useState(null);
            const [recordId, setRecordId] = useState(null);
            const [quizCode, setQuizCode] = useState(null);
            
            // 視窗與預覽狀態
            const [previewOpen, setPreviewOpen] = useState(false);
            const [pdfZoom, setPdfZoom] = useState(1);
            const [scoresHistory, setScoresHistory] = useState([]);

            const [friends, setFriends] = useState([]);
            const [showShareModal, setShowShareModal] = useState(false);

            useEffect(() => {
                if (activeQuizRecord) {
                    setTestName(activeQuizRecord.name || '未命名測驗');
                    setFolder(activeQuizRecord.folder || '未分類');
                    setQuestionCount(activeQuizRecord.questionCount || 50);
                    setQuestionFileUrl(activeQuizRecord.questionFileUrl || '');
                    setQuestionText(activeQuizRecord.questionText || '');
                    setAnswers(activeQuizRecord.answers || {});
                    setStandardAnswers(activeQuizRecord.standardAnswers || {});
                    setDuration(activeQuizRecord.duration || 0);
                    setRecordId(activeQuizRecord.id || null);
                    setScoresHistory(activeQuizRecord.scores || []);
                    
                    if (activeQuizRecord.quizCode) {
                        setQuizCode(activeQuizRecord.quizCode);
                    } else if (!activeQuizRecord.id) {
                        setQuizCode(Math.random().toString(36).substring(2, 8).toUpperCase());
                    }

                    if (activeQuizRecord.status === 'done' && activeQuizRecord.scores && activeQuizRecord.scores.length > 0) {
                        setScoreData(activeQuizRecord.scores[activeQuizRecord.scores.length - 1]);
                        setMode('result');
                    } else if (activeQuizRecord.status === 'doing') {
                        setMode('testing');
                    } else {
                        setMode('setup');
                    }
                    
                    if(activeQuizRecord.quizCode && !activeQuizRecord.id) {
                        db.collection('shared_quizzes').doc(activeQuizRecord.quizCode).get().then(doc => {
                            if(doc.exists) {
                                const data = doc.data();
                                setTestName(data.name || '分享的測驗');
                                setQuestionCount(data.questionCount || 50);
                                setQuestionFileUrl(data.questionFileUrl || '');
                                setQuestionText(data.questionText || '');
                                setStandardAnswers(data.standardAnswers || {});
                                showAlert('📥 成功載入試卷設定！');
                            } else {
                                showAlert('❌ 找不到該試卷代碼');
                                onBackToDashboard();
                            }
                        }).catch(e => showAlert('讀取分享試卷失敗：'+e.message));
                    }
                }
            }, [activeQuizRecord]);

            useEffect(() => {
                let interval = null;
                if (timerState === 'running') interval = setInterval(() => setDuration(d => d + 1), 1000);
                return () => clearInterval(interval);
            }, [timerState]);

            useEffect(() => {
                if (currentUser) {
                    db.collection('users').doc(currentUser.uid).get().then(doc => {
                        if (doc.exists) setFriends(doc.data().friends || []);
                    });
                }
            }, [currentUser]);

            const saveRecord = async (statusOverride, customScoreData = null) => {
                const currentStatus = statusOverride || (mode === 'result' ? 'done' : (mode === 'testing' ? 'doing' : 'todo'));
                const newScoresHistory = customScoreData ? [...scoresHistory, customScoreData] : scoresHistory;
                
                const data = {
                    name: testName,
                    folder,
                    questionCount: parseInt(questionCount, 10),
                    questionFileUrl,
                    questionText,
                    answers,
                    standardAnswers,
                    duration,
                    status: currentStatus,
                    lastUpdated: firebase.firestore.FieldValue.serverTimestamp(),
                    scores: newScoresHistory,
                    quizCode: quizCode
                };

                try {
                    let newId = recordId;
                    if (recordId) {
                        await db.collection('users').doc(currentUser.uid).collection('records').doc(recordId).update(data);
                    } else {
                        const ref = await db.collection('users').doc(currentUser.uid).collection('records').add(data);
                        newId = ref.id;
                        setRecordId(newId);
                    }
                    
                    if (quizCode) {
                        await db.collection('shared_quizzes').doc(quizCode).set({
                            name: testName,
                            questionCount: parseInt(questionCount, 10),
                            questionFileUrl,
                            questionText,
                            standardAnswers,
                            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                        }, { merge: true });
                    }
                } catch (e) {
                    showAlert('自動儲存失敗：' + e.message);
                }
            };

            useEffect(() => {
                if (mode === 'testing' || (mode === 'setup' && recordId)) {
                    const timer = setTimeout(() => saveRecord(), 3000);
                    return () => clearTimeout(timer);
                }
            }, [answers, testName, folder, questionCount, questionFileUrl, questionText, standardAnswers]);

            const handleStart = () => {
                setMode('testing');
                setStartTime(Date.now());
                setTimerState('running');
                saveRecord('doing');
                setPreviewOpen(true);
            };

            const toggleTimer = () => setTimerState(prev => prev === 'running' ? 'paused' : 'running');

            const handleAnswerChange = (qIndex, value) => {
                setAnswers(prev => ({ ...prev, [qIndex]: value.toUpperCase() }));
            };

            const handleStandardAnswerChange = (qIndex, value) => {
                setStandardAnswers(prev => ({ ...prev, [qIndex]: value.toUpperCase() }));
            };

            const calculateScore = () => {
                let correct = 0;
                let wrongList = [];
                for (let i = 1; i <= questionCount; i++) {
                    if (standardAnswers[i] && answers[i] === standardAnswers[i]) correct++;
                    else if (standardAnswers[i]) wrongList.push(i);
                }
                const newScoreData = {
                    score: Math.round((correct / questionCount) * 100),
                    correctCount: correct,
                    wrongQuestions: wrongList,
                    duration: duration,
                    date: new Date().toISOString(),
                    testName: testName,
                    quizCode: quizCode
                };
                setScoreData(newScoreData);
                setScoresHistory(prev => [...prev, newScoreData]);
                setMode('result');
                setTimerState('stopped');
                setPreviewOpen(true);
                saveRecord('done', newScoreData);
            };

            const handleRetake = () => {
                showConfirm('確定要再做一次嗎？這會清除目前的畫卡紀錄，但先前的成績會保留在歷史紀錄中。', () => {
                    setAnswers({});
                    setDuration(0);
                    setMode('testing');
                    setStartTime(Date.now());
                    setTimerState('running');
                    saveRecord('doing');
                });
            };

            const shareToChat = async (friendUid) => {
                if (!scoreData) return;
                const chatId = [currentUser.uid, friendUid].sort().join('_');
                try {
                    await db.collection('chats').doc(chatId).collection('messages').add({
                        senderId: currentUser.uid,
                        senderName: userProfile.displayName,
                        type: 'score_share',
                        scoreData: scoreData,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    await db.collection('users').doc(friendUid).update({ [`unreadChats.${currentUser.uid}`]: true });
                    showAlert("炫耀成功！");
                    setShowShareModal(false);
                } catch(e) { showAlert("發送失敗："+e.message); }
            };

            const shareQuizToChat = async (friendUid) => {
                const chatId = [currentUser.uid, friendUid].sort().join('_');
                try {
                    await db.collection('chats').doc(chatId).collection('messages').add({
                        senderId: currentUser.uid,
                        senderName: userProfile.displayName,
                        type: 'quiz_share',
                        quizData: { name: testName, quizCode: quizCode },
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    await db.collection('users').doc(friendUid).update({ [`unreadChats.${currentUser.uid}`]: true });
                    showAlert("已將試卷傳送給好友！");
                    setShowShareModal(false);
                } catch(e) { showAlert("發送失敗："+e.message); }
            };

            const handleSetPdfUrl = () => {
                showPrompt('請貼上 Google Drive 檔案網址 或 PDF 連結：', (url) => {
                    if(url) setQuestionFileUrl(url);
                });
            };

            const handleResetProgress = () => {
                showConfirm('確定要清除所有作答進度與時間嗎？', () => {
                    setAnswers({});
                    setDuration(0);
                });
            };

            const handleSyncQuestionText = async () => {
                if (!quizCode || !questionText) return;
                try {
                    await db.collection('shared_quizzes').doc(quizCode).set({ questionText: questionText }, { merge: true });
                    showAlert('文字已同步到伺服器，好友重整即可看到！');
                } catch (e) { showAlert('同步失敗：' + e.message); }
            };

            const isShared = Boolean(activeQuizRecord && activeQuizRecord.quizCode && !activeQuizRecord.id);

            const renderPreview = () => {
                if (!previewOpen) return null;
                return (
                    <div className="flex-1 border-r border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 flex flex-col min-w-0 transition-all duration-300 w-full md:w-1/2 overflow-hidden shadow-inner">
                        <div className="bg-gray-100 dark:bg-gray-900 border-b border-gray-200 dark:border-gray-700 p-2 flex justify-between items-center shrink-0 transition-colors">
                            <span className="font-bold text-xs text-gray-600 dark:text-gray-300 flex items-center"><span className="text-sm mr-1">📄</span> 試卷預覽區</span>
                            <div className="flex space-x-3 items-center">
                                {!isShared && questionText && (
                                    <button onClick={handleSyncQuestionText} className="text-xs bg-white dark:bg-gray-700 text-blue-600 dark:text-blue-400 border border-blue-200 dark:border-blue-600 px-2 py-1 no-round font-bold hover:bg-blue-50 dark:hover:bg-gray-600 transition-colors" title="將文字同步給已下載的好友">
                                        🔄 同步文字
                                    </button>
                                )}
                                {questionFileUrl && (
                                    <div className="flex space-x-1 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 no-round text-xs">
                                        <button onClick={() => setPdfZoom(z => Math.max(0.5, z - 0.2))} className="px-2 py-1 hover:bg-gray-200 dark:hover:bg-gray-700 border-r border-gray-300 dark:border-gray-600 font-bold">-</button>
                                        <span className="px-2 py-1 font-mono text-gray-600 dark:text-gray-300">{Math.round(pdfZoom * 100)}%</span>
                                        <button onClick={() => setPdfZoom(z => Math.min(3, z + 0.2))} className="px-2 py-1 hover:bg-gray-200 dark:hover:bg-gray-700 font-bold">+</button>
                                    </div>
                                )}
                                {questionFileUrl && (
                                    <a href={questionFileUrl} target="_blank" rel="noopener noreferrer" className="text-xs text-blue-600 dark:text-blue-400 hover:text-blue-800 dark:hover:blue-300 font-bold transition-colors">
                                        ↗ 另開視窗
                                    </a>
                                )}
                                <button onClick={() => setPreviewOpen(false)} className="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200">✖</button>
                            </div>
                        </div>
                        <div className="flex-1 overflow-auto bg-gray-50 dark:bg-gray-900 custom-scrollbar relative">
                            {questionFileUrl ? (
                                <div style={{ width: `${pdfZoom * 100}%`, height: `${pdfZoom * 100}%`, minWidth: '100%', minHeight: '100%', transformOrigin: 'top left', transition: 'width 0.2s, height 0.2s' }}>
                                    <iframe src={getEmbedUrl(questionFileUrl)} className="w-full h-full border-0 bg-white" title="試卷預覽"></iframe>
                                </div>
                            ) : questionText ? (
                                <div className="p-4 sm:p-6 text-sm sm:text-base whitespace-pre-wrap font-serif leading-relaxed dark:text-gray-200 select-text max-w-none">{questionText}</div>
                            ) : (
                                <div className="h-full flex flex-col items-center justify-center text-gray-400 dark:text-gray-500">
                                    <span className="text-5xl mb-2 opacity-50">📑</span>
                                    <p className="font-bold tracking-widest text-sm">尚未設定試卷內容</p>
                                </div>
                            )}
                        </div>
                    </div>
                );
            };

            return (
                <div className="flex flex-col h-full overflow-hidden bg-gray-50 dark:bg-gray-900 transition-colors">
                    <div className="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 px-3 py-2 flex justify-between items-center shadow-sm shrink-0 z-10 sticky top-0">
                        <div className="flex items-center space-x-3 w-full sm:w-auto overflow-hidden">
                            <button onClick={() => { saveRecord(); onBackToDashboard(); }} className="text-gray-500 hover:text-black dark:text-gray-400 dark:hover:text-white px-2 py-1 transition-colors shrink-0">
                                ⬅️ <span className="hidden sm:inline font-bold text-sm">返回</span>
                            </button>
                            <h2 className="font-black text-sm sm:text-base truncate dark:text-white flex-1">
                                <QuizNameDisplay name={testName} />
                            </h2>
                            {mode === 'testing' && (
                                <span className={`font-mono font-bold text-sm sm:text-lg px-2 py-0.5 no-round border ${timerState === 'running' ? 'bg-black text-white dark:bg-gray-300 dark:text-black border-black dark:border-gray-300' : 'bg-white text-red-500 dark:bg-gray-700 dark:text-red-400 border-red-500 dark:border-red-400 animate-pulse'}`}>
                                    {formatTime(duration)}
                                </span>
                            )}
                        </div>
                        {mode === 'testing' && (
                            <div className="hidden sm:flex space-x-2 shrink-0">
                                <button onClick={toggleTimer} className="bg-gray-100 dark:bg-gray-700 text-gray-800 dark:text-gray-200 px-4 py-1.5 no-round font-bold border border-gray-300 dark:border-gray-600 text-sm hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors">
                                    {timerState === 'running' ? '⏸ 暫停' : '▶️ 繼續'}
                                </button>
                                <button onClick={() => showConfirm('確定要交卷嗎？', calculateScore)} className="bg-black dark:bg-gray-200 text-white dark:text-black px-4 py-1.5 no-round font-bold text-sm hover:bg-gray-800 dark:hover:bg-gray-300 transition-colors">
                                    📝 交卷
                                </button>
                            </div>
                        )}
                        {(mode === 'result' || mode === 'setup') && (
                            <button onClick={() => setShowShareModal(true)} className="text-sm font-bold bg-blue-50 dark:bg-gray-700 text-blue-600 dark:text-blue-400 border border-blue-200 dark:border-gray-600 px-3 py-1 no-round hover:bg-blue-100 dark:hover:bg-gray-600 transition-colors">
                                🔗 分享/炫耀
                            </button>
                        )}
                    </div>

                    <div className="flex flex-1 overflow-hidden flex-col md:flex-row relative">
                        {renderPreview()}
                        
                        <div className={`flex-1 overflow-y-auto custom-scrollbar bg-gray-50 dark:bg-gray-900 ${previewOpen ? 'hidden md:block w-full md:w-1/2' : 'w-full'}`}>
                            <div className="max-w-3xl mx-auto p-4 sm:p-6">
                                {mode === 'setup' && (
                                    <div className="bg-white dark:bg-gray-800 p-6 sm:p-8 shadow-sm border border-gray-200 dark:border-gray-700 no-round max-w-xl mx-auto animate-fade-in-up">
                                        <h3 className="text-xl font-black mb-6 border-b-2 border-black dark:border-gray-500 pb-2 dark:text-white tracking-widest uppercase">測驗設定</h3>
                                        
                                        <div className="space-y-5">
                                            <div>
                                                <label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">測驗名稱</label>
                                                <input type="text" className="w-full p-2.5 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-black dark:text-white no-round font-bold focus:border-black dark:focus:border-white outline-none" value={testName} onChange={e => setTestName(e.target.value)} disabled={isShared} />
                                            </div>
                                            
                                            {!isShared && (
                                                <div className="grid grid-cols-2 gap-4">
                                                    <div>
                                                        <label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">資料夾</label>
                                                        <input type="text" className="w-full p-2.5 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-black dark:text-white no-round focus:border-black dark:focus:border-white outline-none" value={folder} onChange={e => setFolder(e.target.value)} />
                                                    </div>
                                                    <div>
                                                        <label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">題數</label>
                                                        <input type="number" className="w-full p-2.5 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-black dark:text-white no-round font-mono focus:border-black dark:focus:border-white outline-none" value={questionCount} onChange={e => setQuestionCount(e.target.value)} min="1" max="200" />
                                                    </div>
                                                </div>
                                            )}

                                            <div>
                                                <div className="flex justify-between items-end mb-1">
                                                    <label className="block text-sm font-bold text-gray-700 dark:text-gray-300">雲端試卷 (選填)</label>
                                                    {!isShared && (
                                                        <button onClick={handleSetPdfUrl} className={`px-2 py-1 ${questionFileUrl ? 'bg-green-50 text-green-700 border-green-200 dark:bg-green-900 dark:text-green-300 dark:border-green-800' : 'bg-gray-50 text-gray-600 border-gray-200 dark:bg-gray-700 dark:text-gray-400 dark:border-gray-600'} border no-round font-bold text-xs transition-colors whitespace-nowrap`}>
                                                            {questionFileUrl ? '🔗 修改/移除網址' : '📎 貼上試卷網址'}
                                                        </button>
                                                    )}
                                                </div>
                                                <textarea 
                                                    className="w-full p-2.5 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-black dark:text-white no-round text-sm h-24 focus:border-black dark:focus:border-white outline-none" 
                                                    placeholder={isShared ? "此試卷沒有純文字內容" : "或直接在此貼上試卷純文字內容..."}
                                                    value={questionText} 
                                                    onChange={e => setQuestionText(e.target.value)}
                                                    disabled={isShared}
                                                />
                                            </div>
                                        </div>

                                        <button onClick={handleStart} className="w-full mt-8 bg-black dark:bg-gray-200 text-white dark:text-black font-black p-3.5 no-round text-lg hover:bg-gray-800 dark:hover:bg-gray-300 transition-colors shadow-sm">
                                            🚀 開始測驗
                                        </button>
                                    </div>
                                )}

                                {mode === 'testing' && (
                                    <div className="bg-white dark:bg-gray-800 p-4 sm:p-6 shadow-sm border border-gray-200 dark:border-gray-700 no-round relative">
                                        <div className="flex justify-between items-center mb-6 border-b border-gray-200 dark:border-gray-700 pb-3 sticky top-0 bg-white dark:bg-gray-800 z-10">
                                            <h3 className="font-black text-lg dark:text-white tracking-widest uppercase flex items-center">
                                                <span className="w-3 h-3 bg-red-500 rounded-full animate-pulse mr-2"></span> 畫卡區
                                            </h3>
                                            <div className="flex space-x-2">
                                                {(questionFileUrl || questionText) && (
                                                    <button onClick={() => setPreviewOpen(!previewOpen)} className="bg-gray-100 dark:bg-gray-700 text-black dark:text-white px-3 py-1.5 no-round font-bold border border-gray-200 dark:border-gray-600 text-xs hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors">
                                                        {previewOpen ? '👀 關閉預覽' : '👀 開啟預覽'}
                                                    </button>
                                                )}
                                                <button onClick={handleResetProgress} className="bg-gray-50 dark:bg-gray-700 text-red-400 dark:text-red-400 px-4 py-1.5 no-round font-bold hover:bg-red-50 dark:hover:bg-gray-600 transition-colors text-xs border border-red-100 dark:border-red-900">
                                                    重設
                                                </button>
                                            </div>
                                        </div>
                                        
                                        <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3 sm:gap-4">
                                            {Array.from({ length: questionCount }).map((_, i) => {
                                                const qNum = i + 1;
                                                return (
                                                    <div key={qNum} className="flex items-center bg-gray-50 dark:bg-gray-700 p-1 sm:p-2 border border-gray-100 dark:border-gray-600 no-round group hover:border-gray-300 dark:hover:border-gray-500 transition-colors">
                                                        <span className="w-6 sm:w-8 font-mono font-bold text-gray-500 dark:text-gray-400 text-xs sm:text-sm text-right pr-2 select-none group-hover:text-black dark:group-hover:text-white">{qNum}.</span>
                                                        <input 
                                                            type="text" 
                                                            maxLength="1" 
                                                            className="w-8 h-8 sm:w-10 sm:h-10 text-center font-bold text-lg border-2 border-gray-300 dark:border-gray-500 bg-white dark:bg-gray-800 text-black dark:text-white focus:border-black dark:focus:border-white focus:ring-0 outline-none uppercase transition-colors"
                                                            value={answers[qNum] || ''} 
                                                            onChange={e => handleAnswerChange(qNum, e.target.value)}
                                                            onFocus={e => e.target.select()}
                                                        />
                                                    </div>
                                                );
                                            })}
                                        </div>

                                        <div className="mt-8 sm:hidden">
                                            <button onClick={() => showConfirm('確定要交卷嗎？', calculateScore)} className="w-full bg-black dark:bg-gray-200 text-white dark:text-black p-4 no-round font-black text-lg">
                                                📝 交卷並結算
                                            </button>
                                        </div>
                                    </div>
                                )}

                                {mode === 'result' && scoreData && (
                                    <div className="bg-white dark:bg-gray-800 p-6 sm:p-8 shadow-sm border border-gray-200 dark:border-gray-700 no-round animate-fade-in-up">
                                        <div className="text-center mb-8 border-b-2 border-black dark:border-gray-500 pb-6">
                                            <h2 className="text-2xl font-black mb-2 dark:text-white tracking-widest uppercase">測驗結果</h2>
                                            <div className="text-6xl sm:text-7xl font-black my-4 text-black dark:text-white drop-shadow-sm">{scoreData.score} <span className="text-2xl sm:text-3xl text-gray-500">分</span></div>
                                            <div className="flex justify-center space-x-6 text-sm sm:text-base font-bold text-gray-600 dark:text-gray-300 bg-gray-50 dark:bg-gray-700 py-3 no-round border border-gray-200 dark:border-gray-600">
                                                <p>耗時: <span className="text-black dark:text-white font-mono">{formatTime(scoreData.duration)}</span></p>
                                                <p>正確: <span className="text-green-600 dark:text-green-400 font-mono">{scoreData.correctCount} / {questionCount}</span></p>
                                            </div>
                                        </div>

                                        <div className="mb-8">
                                            <div className="flex justify-between items-end mb-4">
                                                <h3 className="font-black text-lg dark:text-white flex items-center border-l-4 border-black dark:border-gray-400 pl-2">
                                                    標準答案對照
                                                </h3>
                                                {(questionFileUrl || questionText) && (
                                                    <button onClick={() => setPreviewOpen(!previewOpen)} className="bg-gray-100 dark:bg-gray-700 text-black dark:text-white px-3 py-1.5 no-round font-bold border border-gray-200 dark:border-gray-600 text-xs hover:bg-gray-200 dark:hover:bg-gray-600">
                                                        {previewOpen ? '👀 關閉預覽' : '👀 開啟試卷預覽'}
                                                    </button>
                                                )}
                                            </div>
                                            
                                            <div className="bg-yellow-50 dark:bg-gray-700 border border-yellow-200 dark:border-gray-600 p-3 mb-4 text-xs sm:text-sm font-bold text-yellow-800 dark:text-yellow-400 no-round flex items-start">
                                                <span className="mr-2 text-base">💡</span>
                                                <p>請在下方輸入正確答案。輸入後系統會自動批改並標示錯誤題號。答案會自動儲存。</p>
                                            </div>
                                            
                                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3">
                                                {Array.from({ length: questionCount }).map((_, i) => {
                                                    const qNum = i + 1;
                                                    const myAns = answers[qNum] || '-';
                                                    const stdAns = standardAnswers[qNum];
                                                    const isWrong = stdAns && myAns !== stdAns;
                                                    
                                                    return (
                                                        <div key={qNum} className={`flex items-center p-2 border no-round transition-colors ${isWrong ? 'bg-red-50 border-red-200 dark:bg-red-900 dark:border-red-800' : (stdAns ? 'bg-green-50 border-green-200 dark:bg-green-900 dark:border-green-800' : 'bg-gray-50 border-gray-200 dark:bg-gray-700 dark:border-gray-600')}`}>
                                                            <span className="w-8 font-mono font-bold text-gray-500 dark:text-gray-400 text-sm text-right pr-2">{qNum}.</span>
                                                            <div className="flex-1 flex space-x-2 items-center">
                                                                <span className={`w-8 text-center font-bold ${isWrong ? 'text-red-500 dark:text-red-400 line-through' : 'text-gray-800 dark:text-gray-200'}`}>{myAns}</span>
                                                                <span className="text-gray-300 dark:text-gray-500">→</span>
                                                                <input 
                                                                    type="text" 
                                                                    maxLength="1"
                                                                    placeholder="正解"
                                                                    className={`w-10 h-8 text-center font-bold border-b-2 bg-transparent outline-none uppercase text-sm ${isWrong ? 'border-red-400 text-red-600 dark:text-red-300' : (stdAns ? 'border-green-400 text-green-600 dark:text-green-300' : 'border-gray-300 dark:border-gray-500 text-black dark:text-white')}`}
                                                                    value={stdAns || ''}
                                                                    onChange={e => handleStandardAnswerChange(qNum, e.target.value)}
                                                                    onBlur={() => calculateScore()}
                                                                />
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>

                                        <div className="flex gap-4 border-t border-gray-200 dark:border-gray-700 pt-6">
                                            <button onClick={handleRetake} className="flex-1 bg-white dark:bg-gray-700 text-black dark:text-white border-2 border-black dark:border-gray-500 p-3 no-round font-bold hover:bg-gray-100 dark:hover:bg-gray-600 transition-colors">
                                                🔄 再做一次
                                            </button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>

                    {showShareModal && (
                        <div className="fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-[90] p-4">
                            <div className="bg-white dark:bg-gray-800 p-6 w-full max-w-sm no-round shadow-2xl relative">
                                <button onClick={() => setShowShareModal(false)} className="absolute top-3 right-3 text-gray-400 hover:text-black dark:hover:text-white text-xl">✖</button>
                                <h3 className="font-bold text-lg mb-4 dark:text-white border-b pb-2 dark:border-gray-700">🔗 分享與炫耀</h3>
                                
                                <div className="mb-6">
                                    <p className="text-sm font-bold text-gray-500 dark:text-gray-400 mb-2">試卷代碼 (可給朋友匯入)</p>
                                    <div className="flex">
                                        <input type="text" readOnly value={quizCode} className="w-full p-2 bg-gray-100 dark:bg-gray-700 font-mono font-bold text-center border border-gray-300 dark:border-gray-600 text-black dark:text-white no-round select-all" />
                                    </div>
                                </div>

                                <div className="space-y-3 max-h-60 overflow-y-auto custom-scrollbar">
                                    <p className="text-sm font-bold text-gray-500 dark:text-gray-400">傳送給好友</p>
                                    {friends.length === 0 ? (
                                        <p className="text-xs text-gray-400 text-center py-4">還沒有好友可以分享</p>
                                    ) : (
                                        friends.map(f => (
                                            <div key={f.uid} className="flex items-center justify-between bg-gray-50 dark:bg-gray-700 p-2 border border-gray-100 dark:border-gray-600">
                                                <span className="font-bold text-sm truncate w-24 dark:text-gray-200">{f.displayName}</span>
                                                <div className="flex space-x-2">
                                                    <button onClick={() => shareQuizToChat(f.uid)} className="text-xs bg-green-100 dark:bg-green-900 text-green-700 dark:text-green-300 px-2 py-1 font-bold hover:bg-green-200 dark:hover:bg-green-800 transition-colors">送試卷</button>
                                                    {scoreData && <button onClick={() => shareToChat(f.uid)} className="text-xs bg-yellow-100 dark:bg-yellow-900 text-yellow-700 dark:text-yellow-300 px-2 py-1 font-bold hover:bg-yellow-200 dark:hover:bg-yellow-800 transition-colors">炫耀成績</button>}
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function TopNav({ activeTab, setActiveTab }) {
            return (
                <div className="bg-black dark:bg-gray-800 text-white flex justify-between px-4 py-3 shrink-0 shadow-md z-20 sticky top-0 border-b border-gray-800 dark:border-gray-700">
                    <h1 className="font-black text-xl tracking-tighter flex items-center">
                        <span className="bg-white text-black px-1.5 py-0.5 mr-2 text-sm">JJ</span>
                        ONLINE
                    </h1>
                    <div className="flex space-x-1 sm:space-x-2">
                        <button onClick={() => setActiveTab('dashboard')} className={`px-3 sm:px-4 py-1.5 text-sm font-bold transition-colors ${activeTab === 'dashboard' ? 'bg-white text-black dark:bg-gray-200' : 'text-gray-300 hover:text-white hover:bg-gray-800 dark:hover:bg-gray-700'} no-round`}>題庫</button>
                        <button onClick={() => setActiveTab('social')} className={`px-3 sm:px-4 py-1.5 text-sm font-bold transition-colors ${activeTab === 'social' ? 'bg-white text-black dark:bg-gray-200' : 'text-gray-300 hover:text-white hover:bg-gray-800 dark:hover:bg-gray-700'} no-round`}>社群</button>
                        <button onClick={() => setActiveTab('minecraft')} className={`px-3 sm:px-4 py-1.5 text-sm font-bold transition-colors ${activeTab === 'minecraft' ? 'bg-white text-black dark:bg-gray-200' : 'text-gray-300 hover:text-white hover:bg-gray-800 dark:hover:bg-gray-700'} no-round hidden sm:block`}>MC養成</button>
                        <button onClick={() => setActiveTab('minecraft')} className={`px-2 py-1.5 text-sm font-bold transition-colors ${activeTab === 'minecraft' ? 'bg-white text-black dark:bg-gray-200' : 'text-gray-300 hover:text-white hover:bg-gray-800 dark:hover:bg-gray-700'} no-round sm:hidden`}>MC</button>
                        <button onClick={() => setActiveTab('profile')} className={`px-3 sm:px-4 py-1.5 text-sm font-bold transition-colors ${activeTab === 'profile' ? 'bg-white text-black dark:bg-gray-200' : 'text-gray-300 hover:text-white hover:bg-gray-800 dark:hover:bg-gray-700'} no-round`}>個人</button>
                    </div>
                </div>
            );
        }

        function Main() {
            const [user, setUser] = useState(null);
            const [userProfile, setUserProfile] = useState(null);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [activeQuizRecord, setActiveQuizRecord] = useState(null);
            const [dialog, setDialog] = useState(null);
            const [showTutorial, setShowTutorial] = useState(false);

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(usr => {
                    if (usr) {
                        setUser(usr);
                        db.collection('users').doc(usr.uid).onSnapshot(doc => {
                            if (doc.exists) {
                                const data = doc.data();
                                setUserProfile(data);
                                if (!data.hasSeenTutorial && data.displayName) setShowTutorial(true);
                            } else {
                                setUserProfile({ displayName: '' });
                            }
                            setLoading(false);
                        });
                    } else {
                        setUser(null);
                        setUserProfile(null);
                        setLoading(false);
                    }
                });
                return unsubscribe;
            }, []);

            const showAlert = (message) => setDialog({ type: 'alert', message });
            const showConfirm = (message, onConfirm) => setDialog({ type: 'confirm', message, onConfirm });
            const showPrompt = (message, onConfirm, defaultValue = '') => setDialog({ type: 'prompt', message, onConfirm, defaultValue });

            const finishTutorial = () => {
                db.collection('users').doc(user.uid).update({ hasSeenTutorial: true });
                setShowTutorial(false);
            };

            if (loading) return <div className="flex h-full items-center justify-center bg-gray-100 dark:bg-gray-900"><div className="text-2xl font-black animate-pulse tracking-widest dark:text-white">載入中...</div></div>;
            if (!user) return <AuthScreen showAlert={showAlert} />;
            if (userProfile && !userProfile.displayName) return <ProfileSetup user={user} onComplete={() => {}} showAlert={showAlert} />;

            return (
                <div className="flex flex-col h-full bg-gray-100 dark:bg-gray-900">
                    <DialogOverlay dialog={dialog} onClose={() => setDialog(null)} />
                    {showTutorial && <TutorialOverlay onComplete={finishTutorial} />}
                    
                    {activeTab !== 'activeQuiz' && <TopNav activeTab={activeTab} setActiveTab={setActiveTab} />}
                    
                    {activeTab !== 'activeQuiz' ? (
                        <div className="flex-grow pt-0 overflow-hidden bg-gray-50 dark:bg-gray-900 transition-colors">
                            {activeTab === 'dashboard' && <Dashboard user={user} userProfile={userProfile} onStartNew={(folderName) => { setActiveQuizRecord({ folder: folderName }); setActiveTab('activeQuiz'); }} onContinueQuiz={(rec) => { setActiveQuizRecord(rec); setActiveTab('activeQuiz'); }} showAlert={showAlert} showConfirm={showConfirm} showPrompt={showPrompt} />}
                            {activeTab === 'social' && <SocialDashboard user={user} userProfile={userProfile} showAlert={showAlert} showConfirm={showConfirm} setActiveQuizRecord={setActiveQuizRecord} setActiveTab={setActiveTab} />}
                            {activeTab === 'minecraft' && <MinecraftDashboard user={user} userProfile={userProfile} showAlert={showAlert} />}
                            {activeTab === 'profile' && <ProfileDashboard user={user} userProfile={userProfile} showAlert={showAlert} />}
                        </div>
                    ) : (
                        <QuizApp key={activeQuizRecord ? activeQuizRecord.id : 'new-quiz'} currentUser={user} userProfile={userProfile} activeQuizRecord={activeQuizRecord} onBackToDashboard={() => setActiveTab('dashboard')} showAlert={showAlert} showConfirm={showConfirm} showPrompt={showPrompt} />
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Main />);
    </script>
</body>
</html>
